  function renderForceChange(user){
    document.title='Aggiorna Password'
    const shell=el('div',{class:'lg2-login-shell fade-in'})

    /* left hero (same) */
    const hero=el('div',{class:'lg2-login-hero'})
    const logoEl=el('img',{src:LOGO_WHITE,alt:'UNITRANS',class:'lg2-hero-logo'})
    const title=el('h1',{class:'lg2-hero-title'},'Sicurezza prima di tutto.')
    const subtitle=el('p',{class:'lg2-hero-subtitle'},'Imposta una password personale per proteggere il tuo account.')
    hero.append(logoEl,title,subtitle)

    /* right form */
    const formPane=el('div',{class:'lg2-login-form'})
    const h2=el('h2',{class:'lg2-form-title'},'Imposta la tua password')
    const sub=el('p',{class:'lg2-form-subtitle'},'Per motivi di sicurezza è richiesta una password personale al primo accesso.')

    const makePassField=(placeholder,autocomplete)=>{
      const wrap=el('div',{class:'lg2-input-wrapper'})
      const lockEl=el('div',{class:'lg2-input-icon'},icon('M12 2a4 4 0 014 4v2h2a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2v-8a2 2 0 012-2h2V6a4 4 0 014-4zm0 10a2 2 0 100 4 2 2 0 000-4z'))
      const inp=el('input',{class:'lg2-input input',type:'password',placeholder,autocomplete})
      const eye=el('button',{type:'button',class:'lg2-eye-toggle'},'👁')
      eye.onclick=()=>{const t=inp.type==='text';inp.type=t?'password':'text';eye.textContent=t?'👁':'🙈'}
      wrap.append(lockEl,inp,eye)
      return {wrap,inp}
    }
    const {wrap:pwdWrap,inp:pwdInput}=makePassField('Nuova password (min 8 caratteri)','new-password')
    const {wrap:confirmWrap,inp:confirmInput}=makePassField('Conferma password','new-password')

    const submitBtn=el('button',{class:'lg2-submit',type:'button'},'Salva e accedi →')
    const feedback=el('div',{class:'lg2-login-feedback'})

    const doSave=()=>{
      feedback.textContent=''
      const p1=pwdInput.value
      const p2=confirmInput.value
      if(!p1||p1.length<8){feedback.textContent='La password deve contenere almeno 8 caratteri';pwdInput.focus();return}
      if(p1!==p2){feedback.textContent='Le password non coincidono';confirmInput.focus();return}
      submitBtn.disabled=true
      submitBtn.textContent='Salvataggio…'
      setTimeout(()=>{
        put('users',user.id,{pass:p1.trim(),forceChange:false})
        logEvent('user_password_initialized',{username:user.username||user.email||''},{actorId:user.id,targetId:user.id})
        const updated={...user,forceChange:false}
        sessionStorage.setItem(SESSION,JSON.stringify(updated))
        feedback.style.color='#6ee7b7'
        feedback.textContent='Password aggiornata!'
        setTimeout(()=>renderApp(),800)
      },260)
    }
    submitBtn.onclick=doSave
    confirmInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSave()}})

    formPane.append(h2,sub,pwdWrap,confirmWrap,submitBtn,feedback)
    shell.append(hero,formPane)
    app.replaceChildren(shell)
  }

  function renderApp(){
    const user=me(); if(!user) return renderLogin()
    if(user.forceChange) return renderForceChange(user)
    function renderRoute(targetRoute){
      const requested=(targetRoute||'dashboard').toString().replace('#','').trim()||'dashboard'
      const guard=guardRoute(requested,user)
      const main=qs('#main')
      if(!main) return
      if(!guard.ok){
        if(guard.reason==='route_not_found'){
          navigateTo(guard.redirectTo||'dashboard')
          const fallback=componentFor(guard.redirectTo||'dashboard')
          main.replaceChildren(fallback)
          setActive(guard.redirectTo||'dashboard')
          APP_STATE.currentRoute=guard.redirectTo||'dashboard'
          return
        }
        main.replaceChildren(AccessDenied(requested))
        setActive('__denied__')
        APP_STATE.currentRoute=requested
        return
      }
      let component
      try{
        component=componentFor(requested)
      }catch{
        component=null
      }
      if(!component){
        navigateTo('dashboard')
        main.replaceChildren(componentFor('dashboard'))
        setActive('dashboard')
        APP_STATE.currentRoute='dashboard'
        return
      }
      navigateTo(requested)
      /* fatture gets full-bleed layout (no padding) */
      if(requested==='fatture') main.classList.remove('padded'); else main.classList.add('padded')
      main.replaceChildren(component)
      setActive(requested)
      APP_STATE.currentRoute=requested
    }
    const shell=mountAppShell({
      user,
      onLogout:()=>{logout(); renderLogin()},
      onRouteChange:(id)=>renderRoute(id)
    })
    app.replaceChildren(shell)
    const hashHandler=()=>renderRoute((window.location.hash||'').replace('#','')||'dashboard')
    window.addEventListener('hashchange',hashHandler)
    const previousCleanup=APP_STATE.shell?.cleanup
    APP_STATE.shell={cleanup:()=>{previousCleanup?.(); window.removeEventListener('hashchange',hashHandler)}}
    hashHandler()
  }
  renderApp()
  </script>
</body>
</html>
