    }

    function fmtDate(d){
      if(!d) return '-'
      return fmtDateDisplay(d)
    }

    function describeTariff(t){
      if(!t) return '-'
      if(t.tipo==='A tonnellata'){
        return t.prezzoTonnellata!=null ? `A tonnellata · ${formatCurrencyValue(t.prezzoTonnellata)} / t` : 'A tonnellata · da definire'
      }
      return t.prezzo!=null ? `A viaggio · ${formatCurrencyValue(t.prezzo)}` : 'A viaggio · da definire'
    }
    const validateTripPayload=(payload)=>{
      const errors=[]
      const cliente=(payload?.cliente||'').trim()
      const origine=(payload?.origine||'').trim()
      const arrivo=(payload?.arrivo||'').trim()
      if(!cliente) errors.push('Cliente obbligatorio.')
      if(!origine) errors.push('Origine obbligatoria.')
      if(!arrivo) errors.push('Arrivo obbligatorio.')
      const dataCarico=(payload?.dataCarico||'').trim()
      const dataScarico=(payload?.dataScarico||'').trim()
      if(!dataCarico && !dataScarico){
        errors.push('Indica almeno una data tra carico e scarico.')
      }
      if(dataCarico && dataScarico && dataCarico>dataScarico){
        errors.push('La data di carico non può essere successiva alla data di scarico.')
      }
      const weightUnit=(payload?.pesoUnit||'').trim()||'t'
      if(!['kg','q','t'].includes(weightUnit)){
        errors.push('Unità peso non valida. Usa kg, q o t.')
      }
      if(payload?.peso!=null && payload?.peso!=='' && !(Number(payload.peso)>0)){
        errors.push('Il peso, se indicato, deve essere maggiore di zero.')
      }
      const tariffa=payload?.tariffa||{}
      if((tariffa.tipo||'A tonnellata')==='A tonnellata'){
        if(!(Number(tariffa.prezzoTonnellata)>0)){
          errors.push('Tariffa "A tonnellata": inserisci un prezzo/tonnellata maggiore di zero.')
        }
        if(!(Number(payload?.peso)>0)){
          errors.push('Tariffa "A tonnellata": il peso è obbligatorio.')
        }
      }else{
        if(!(Number(tariffa.prezzo)>0)){
          errors.push('Tariffa "A viaggio": inserisci un prezzo maggiore di zero.')
        }
      }
      return errors
    }
    const openTripWizard = (trip = null) => {
  const DRAFT_KEY = 'unitrans-wiz-' + (trip?.id || 'new');
  
  let currentState = {
    cliente: '', clienteId: '', saveCliente: false, azienda: 'Unitrans Srl',
    caricoAzienda: '', origine: '', dataCarico: '', oraCarico: '',
    scaricoAzienda: '', arrivo: '', dataScarico: '', oraScarico: '',
    autista: '', camion: '', rimorchio: '',
    tipoTrasporto: '', peso: null, pesoUnit: 't',
    tariffaTipo: 'A tonnellata', prezzoTonnellata: null, prezzoViaggio: null,
    iva: '22%', pagamento: 'Da definire',
    documentoTipo: 'DDT', documentoNumero: '', riferimento: '',
    priorita: 'Normale', stato: 'Da fare',
    note: '', noteAutista: '', attachments: []
  };

  if (trip) {
    currentState = {
      ...currentState,
      cliente: trip.cliente || '', clienteId: trip.clienteId || '',
      azienda: trip.azienda || 'Unitrans Srl',
      caricoAzienda: trip.caricoAzienda || '', origine: trip.origine || '',
      dataCarico: trip.dataCarico || '', oraCarico: trip.oraCarico || '',
      scaricoAzienda: trip.scaricoAzienda || '', arrivo: trip.arrivo || '',
      dataScarico: trip.dataScarico || '', oraScarico: trip.oraScarico || '',
      autista: trip.autista || '', camion: trip.camion || '', rimorchio: trip.rimorchio || '',
      tipoTrasporto: trip.tipoTrasporto || '', peso: trip.peso || null, pesoUnit: trip.pesoUnit || 't',
      tariffaTipo: trip.tariffa?.tipo || 'A tonnellata',
      prezzoTonnellata: trip.tariffa?.prezzoTonnellata || null,
      prezzoViaggio: trip.tariffa?.prezzo || null,
      iva: trip.iva || '22%', pagamento: trip.pagamento || 'Da definire',
      documentoTipo: trip.documento?.tipo || 'DDT',
      documentoNumero: trip.documento?.numero || '',
      riferimento: trip.riferimento || '', priorita: trip.priorita || 'Normale',
      stato: trip.stato || 'Da fare',
      note: trip.note || '', noteAutista: trip.noteAutista || '',
      attachments: trip.attachments || []
    };
  } else {
    const draft = parseStoredJson(DRAFT_KEY, null);
    if (draft) currentState = { ...currentState, ...draft };
  }

  let stepIndex = 0;
  let hasUnsavedChanges = false;
  let debTimer = null;

  const updState = (u) => {
    currentState = { ...currentState, ...u };
    hasUnsavedChanges = true;
    clearTimeout(debTimer);
    debTimer = setTimeout(() => writeStoredJson(DRAFT_KEY, currentState), 500);
  };

  // ── MODALE ──────────────────────────────────────────────────────────────
  const overlay = el('div', { class: 'wiz-overlay', tabindex: '-1' });
  const card = el('div', { class: 'wiz-card' });

  const titleEl = el('div', { class: 'wiz-title' }, trip ? 'Modifica viaggio' : 'Nuovo viaggio');
  const stepInfo = el('div', { class: 'wiz-step-info' });
  const progressFill = el('div', { class: 'wiz-progress-fill' });
  const progressBar = el('div', { class: 'wiz-progress-bar' }, progressFill);
  const hdr = el('div', { class: 'wiz-hdr' }, titleEl, stepInfo, progressBar);

  const body = el('div', { class: 'wiz-body' });
  const errEl = el('div', { class: 'wiz-err' });

  const cancelBtn = el('button', { class: 'btn ghost', type: 'button' }, 'Chiudi');
  const saveDraftBtn = el('button', { class: 'btn ghost wiz-sm', type: 'button', onclick: () => {
    writeStoredJson(DRAFT_KEY, currentState);
    showToast({ message: 'Bozza salvata', type: 'success' });
  }}, 'Salva bozza');
  const backBtn = el('button', { class: 'btn ghost', type: 'button' }, '← Indietro');
  const nextBtn = el('button', { class: 'btn brand', type: 'button' }, 'Avanti →');
  const ftrL = el('div', { class: 'wiz-ftr-l' }, cancelBtn, saveDraftBtn);
  const ftrR = el('div', { class: 'wiz-ftr-r' }, backBtn, nextBtn);
  const ftr = el('div', { class: 'wiz-ftr' }, ftrL, ftrR);

  card.append(hdr, body, errEl, ftr);
  overlay.append(card);
  document.body.append(overlay);
  setTimeout(() => overlay.focus(), 50);

  const closeWizard = async () => {
    if (hasUnsavedChanges) {
      const ok = await askConfirm({ title: 'Uscire senza salvare?', message: 'Le modifiche al viaggio andranno perse.', confirmLabel: 'Esci senza salvare', tone: 'danger' });
      if (!ok) return;
    }
    overlay.remove();
  };
  cancelBtn.onclick = closeWizard;
  overlay.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { e.preventDefault(); closeWizard(); return; }
    if (e.key === 'Enter' && !e.defaultPrevented) {
      // Non avanzare se un dropdown è aperto o se il target è un button/textarea
      const inDropdown = e.target.closest('.dropdown.open')
      const inTextarea = e.target.tagName === 'TEXTAREA'
      const inBtn = e.target.tagName === 'BUTTON'
      if (!inDropdown && !inTextarea && !inBtn) {
        e.preventDefault();
        nextBtn.click();
      }
    }
  });

  // ── HELPER FIELD ────────────────────────────────────────────────────────
  const fld = (label, input, hint) => {
    const wrap = el('div', { class: 'wiz-field' });
    wrap.append(el('label', { class: 'wiz-label' }, label));
    wrap.append(input);
    if (hint) wrap.append(el('div', { class: 'wiz-hint' }, hint));
    return wrap;
  };

  // ── AUTOCOMPLETE GENERICO ───────────────────────────────────────────────
  const mkAC = (opts) => {
    const inp = el('input', { class: 'input', type: 'text', placeholder: opts.placeholder || '', value: opts.value || '' });
    const panel = el('div', { class: 'wiz-ac-panel' });
    const wrap = el('div', { class: 'wiz-ac-wrap' }, inp, panel);
    let timer = null;
    const close = () => { panel.replaceChildren(); panel.classList.remove('open'); };
    inp.addEventListener('input', () => {
      clearTimeout(timer);
      const q = inp.value.trim();
      if (opts.onChange) opts.onChange(q);
      if (q.length < 2) { close(); return; }
      timer = setTimeout(async () => {
        const results = opts.getSuggestions ? await opts.getSuggestions(q) : [];
        panel.replaceChildren();
        if (!results.length) { close(); return; }
        results.slice(0, 6).forEach(r => {
          const item = el('div', { class: 'wiz-ac-item' });
          item.append(el('div', { class: 'wiz-ac-main' }, r.main));
          if (r.sub) item.append(el('div', { class: 'wiz-ac-sub' }, r.sub));
          item.addEventListener('mousedown', (e) => {
            e.preventDefault();
            inp.value = r.main;
            if (opts.onSelect) opts.onSelect(r);
            close();
          });
          panel.append(item);
        });
        panel.classList.add('open');
      }, opts.debounce || 350);
    });
    inp.addEventListener('blur', () => setTimeout(close, 150));
    return { wrap, inp };
  };

  // ── STEP 0 — CLIENTE ────────────────────────────────────────────────────
  const renderStep0 = () => {
    const container = el('div', { class: 'step-wrap' });

    const { wrap: clienteWrap, inp: clienteInp } = mkAC({
      placeholder: 'Nome cliente o ragione sociale',
      value: currentState.cliente,
      onChange: (v) => updState({ cliente: v }),
      getSuggestions: (q) => {
        const custs = list('customers') || [];
        return custs.filter(c => (c.name || '').toLowerCase().includes(q.toLowerCase()))
          .map(c => ({ main: c.name, sub: c.vat || '', id: c.id }))
          .concat(
            custs.some(c => c.name.toLowerCase() === q.toLowerCase())
              ? []
              : [{ main: `+ Aggiungi "${q}" come nuovo cliente`, sub: '', _new: q }]
          );
      },
      onSelect: (r) => {
        if (r._new) {
          const newId = 'CUST-' + crypto.randomUUID();
          add('customers', { id: newId, name: r._new, vat: '', phone: '', email: '' });
          updState({ cliente: r._new, clienteId: newId });
          showToast({ message: 'Cliente aggiunto', type: 'success' });
        } else {
          updState({ cliente: r.main, clienteId: r.id || '' });
        }
      }
    });

    const aziendaDD = createDropdown({
      value: currentState.azienda,
      options: [{ value: 'Unitrans Srl', label: 'Unitrans Srl' }, { value: 'Adritrans Srls', label: 'Adritrans Srls' }],
      onSelect: (v) => updState({ azienda: v })
    });

    container.append(
      fld('Cliente / Committente *', clienteWrap, 'Inizia a digitare e scegli dalla lista'),
      fld('Società che esegue', aziendaDD.root)
    );
    return container;
  };

  // ── STEP 1 — PERCORSO ───────────────────────────────────────────────────
  const renderStep1 = () => {
    const container = el('div', { class: 'step-wrap' });
    const grid = el('div', { class: 'wiz-route-grid' });

    const mkNominatim = (value, onChange) => mkAC({
      placeholder: 'Digita indirizzo o città...',
      value,
      onChange,
      getSuggestions: async (q) => {
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=it&addressdetails=1`);
          const data = await r.json();
          return data.map(d => ({ main: (d.display_name || '').slice(0, 60), sub: d.type || '', lat: d.lat, lon: d.lon }));
        } catch { return []; }
      },
      debounce: 450
    });

    const usedCarico = [...new Set((list('trips') || []).map(t => t.caricoAzienda).filter(Boolean))];
    const usedScarico = [...new Set((list('trips') || []).map(t => t.scaricoAzienda).filter(Boolean))];

    const mkSimpleAC = (value, suggestions, onChange) => mkAC({
      placeholder: 'Es. Acciaierie Arvedi...',
      value,
      onChange,
      getSuggestions: (q) => Promise.resolve(
        suggestions.filter(s => s.toLowerCase().includes(q.toLowerCase())).map(s => ({ main: s, sub: '' }))
      ),
      debounce: 0
    });

    const { wrap: caricoAzWrap, inp: caricoAzInp } = mkSimpleAC(currentState.caricoAzienda, usedCarico, (v) => updState({ caricoAzienda: v }));
    const { wrap: origineWrap } = mkNominatim(currentState.origine, (v) => updState({ origine: v }));
    const dataCaricoF = createDateField({ value: currentState.dataCarico, placeholder: 'Data carico', onChange: (v) => updState({ dataCarico: v }) });
    const oraCaricoInp = el('input', { class: 'input', type: 'time', value: currentState.oraCarico });
    oraCaricoInp.addEventListener('change', (e) => updState({ oraCarico: e.target.value }));

    const { wrap: scaricoAzWrap } = mkSimpleAC(currentState.scaricoAzienda, usedScarico, (v) => updState({ scaricoAzienda: v }));
    const { wrap: arrivoWrap } = mkNominatim(currentState.arrivo, (v) => updState({ arrivo: v }));
    const dataScaricoF = createDateField({ value: currentState.dataScarico, placeholder: 'Data scarico', onChange: (v) => updState({ dataScarico: v }) });
    const oraScaricoInp = el('input', { class: 'input', type: 'time', value: currentState.oraScarico });
    oraScaricoInp.addEventListener('change', (e) => updState({ oraScarico: e.target.value }));

    const caricoCol = el('div', { class: 'wiz-route-col' },
      el('div', { class: 'wiz-route-label' }, 'Carico'),
      fld('Azienda di carico', caricoAzWrap),
      fld('Luogo di carico *', origineWrap),
      fld('Data carico', dataCaricoF.root),
      fld('Ora carico', oraCaricoInp)
    );
    const scaricoCol = el('div', { class: 'wiz-route-col' },
      el('div', { class: 'wiz-route-label' }, 'Scarico'),
      fld('Azienda di scarico', scaricoAzWrap),
      fld('Luogo di scarico *', arrivoWrap),
      fld('Data scarico', dataScaricoF.root),
      fld('Ora scarico', oraScaricoInp)
    );

    grid.append(caricoCol, scaricoCol);
    container.append(grid);
    return container;
  };

  // ── STEP 2 — MERCE E MEZZI ──────────────────────────────────────────────
  const renderStep2 = () => {
    const container = el('div', { class: 'step-wrap' });
    const grid = el('div', { class: 'wiz-2col' });

    const usedMerce = [...new Set((list('trips') || []).map(t => t.tipoTrasporto).filter(Boolean))];
    const { wrap: merceWrap } = mkAC({
      placeholder: 'Es. Bobine acciaio, Rottame ferroso...',
      value: currentState.tipoTrasporto,
      onChange: (v) => updState({ tipoTrasporto: v }),
      getSuggestions: (q) => Promise.resolve(usedMerce.filter(s => s.toLowerCase().includes(q.toLowerCase())).map(s => ({ main: s, sub: '' }))),
      debounce: 0
    });

    const pesoInp = el('input', { class: 'input', type: 'number', placeholder: '0', value: currentState.peso || '', min: '0' });
    pesoInp.addEventListener('input', (e) => updState({ peso: e.target.value ? Number(e.target.value) : null }));
    const pesoUnitDD = createDropdown({
      value: currentState.pesoUnit,
      options: [{ value: 'kg', label: 'kg' }, { value: 'q', label: 'q' }, { value: 't', label: 't' }],
      onSelect: (v) => updState({ pesoUnit: v })
    });

    const drivers = list('drivers') || [];
    const fleet = list('fleet') || [];
    const autistaDD = createDropdown({
      value: currentState.autista,
      options: [{ value: '', label: 'Seleziona autista...' }].concat(drivers.map(d => ({ value: d.id, label: d.name || d.id }))),
      onSelect: (v) => updState({ autista: v })
    });
    const camionDD = createDropdown({
      value: currentState.camion,
      options: [{ value: '', label: 'Seleziona camion...' }].concat(fleet.filter(f => f.tipo !== 'rimorchio').map(f => ({ value: f.id, label: `${f.targa || ''} ${f.modello || ''}`.trim() || f.id }))),
      onSelect: (v) => updState({ camion: v })
    });
    const rimorchioDD = createDropdown({
      value: currentState.rimorchio,
      options: [{ value: '', label: 'Nessun rimorchio' }].concat(fleet.filter(f => f.tipo === 'rimorchio').map(f => ({ value: f.id, label: f.targa || f.id }))),
      onSelect: (v) => updState({ rimorchio: v })
    });

    const merceCol = el('div', {},
      fld('Tipo merce / trasporto *', merceWrap),
      fld('Peso', el('div', { class: 'wiz-peso-row' }, pesoInp, pesoUnitDD.root))
    );
    const mezziCol = el('div', {},
      fld('Autista *', autistaDD.root),
      fld('Camion *', camionDD.root),
      fld('Rimorchio', rimorchioDD.root)
    );

    grid.append(merceCol, mezziCol);
    container.append(grid);
    return container;
  };

  // ── STEP 3 — TARIFFA E DOCUMENTO ────────────────────────────────────────
  const renderStep3 = () => {
    const container = el('div', { class: 'step-wrap' });
    const grid = el('div', { class: 'wiz-2col' });

    // Colonna tariffa — ricostruibile al cambio tipo
    const tariffaCol = el('div', {});
    const buildTariffaCol = () => {
      tariffaCol.replaceChildren();
      const tariffaDD = createDropdown({
        value: currentState.tariffaTipo,
        options: [
          { value: 'A tonnellata', label: 'A tonnellata' },
          { value: 'A viaggio', label: 'A viaggio' },
          { value: 'Da definire', label: 'Da definire' }
        ],
        onSelect: (v) => { updState({ tariffaTipo: v }); buildTariffaCol(); }
      });
      tariffaCol.append(fld('Tipo tariffa', tariffaDD.root));

      if (currentState.tariffaTipo === 'A tonnellata') {
        const inp = el('input', { class: 'input', type: 'number', placeholder: '0.00', min: '0', step: '0.01', value: currentState.prezzoTonnellata || '' });
        inp.addEventListener('input', (e) => { updState({ prezzoTonnellata: e.target.value ? Number(e.target.value) : null }); aggiorna(); });
        tariffaCol.append(fld('€ per tonnellata', inp));
      } else if (currentState.tariffaTipo === 'A viaggio') {
        const inp = el('input', { class: 'input', type: 'number', placeholder: '0.00', min: '0', step: '0.01', value: currentState.prezzoViaggio || '' });
        inp.addEventListener('input', (e) => { updState({ prezzoViaggio: e.target.value ? Number(e.target.value) : null }); aggiorna(); });
        tariffaCol.append(fld('Importo fisso €', inp));
      }

      tariffaCol.append(importoBox);
    };

    const importoBox = el('div', { class: 'wiz-importo-box' });
    const aggiorna = () => {
      let imp = 0;
      if (currentState.tariffaTipo === 'A tonnellata' && currentState.peso && currentState.prezzoTonnellata)
        imp = Number(currentState.peso) * Number(currentState.prezzoTonnellata);
      else if (currentState.tariffaTipo === 'A viaggio' && currentState.prezzoViaggio)
        imp = Number(currentState.prezzoViaggio);
      const iva22 = imp * 0.22;
      const totale = imp + iva22;
      importoBox.replaceChildren(
        el('div', { style: 'display:grid;gap:3px;flex:1' },
          el('div', { class: 'wiz-importo-label' }, 'Importo stimato'),
          imp > 0 ? el('div', { style: 'font-size:11px;color:var(--muted)' }, `+ IVA 22% ${fmtMoney(iva22)}`) : null
        ),
        el('div', { style: 'text-align:right' },
          el('div', { class: 'wiz-importo-val' }, imp > 0 ? fmtMoney(imp) : '—'),
          imp > 0 ? el('div', { style: 'font-size:11px;color:var(--muted);margin-top:2px' }, `Totale ${fmtMoney(totale)}`) : null
        )
      );
    };
    aggiorna();

    const ivaDD = createDropdown({
      value: currentState.iva || '22%',
      options: [{ value: 'Esente', label: 'Esente' }, { value: '4%', label: '4%' }, { value: '10%', label: '10%' }, { value: '22%', label: '22%' }],
      onSelect: (v) => updState({ iva: v })
    });
    const pagDD = createDropdown({
      value: currentState.pagamento || 'Da definire',
      options: [{ value: 'Bonifico', label: 'Bonifico bancario' }, { value: 'Contanti', label: 'Contanti' }, { value: 'Da definire', label: 'Da definire' }],
      onSelect: (v) => updState({ pagamento: v })
    });
    tariffaCol.append(fld('IVA', ivaDD.root), fld('Pagamento', pagDD.root));

    buildTariffaCol();

    const docDD = createDropdown({
      value: currentState.documentoTipo,
      options: [
        { value: 'DDT', label: 'DDT', color: '#3b82f6' },
        { value: 'Formulario Rifiuti', label: 'Formulario Rifiuti', color: '#22c55e' },
        { value: 'Altro', label: 'Altro', color: '#94a3b8' }
      ],
      onSelect: (v) => updState({ documentoTipo: v })
    });
    const docNumInp = el('input', { class: 'input', placeholder: 'Es. 00123', value: currentState.documentoNumero });
    docNumInp.addEventListener('input', (e) => updState({ documentoNumero: e.target.value }));
    const rifInp = el('input', { class: 'input', placeholder: 'Es. ordine cliente', value: currentState.riferimento });
    rifInp.addEventListener('input', (e) => updState({ riferimento: e.target.value }));
    const priorDD = createDropdown({
      value: currentState.priorita,
      options: [
        { value: 'Normale', label: 'Normale', color: '#94a3b8' },
        { value: 'Alta', label: 'Alta', color: '#f59e0b' },
        { value: 'Urgente', label: 'Urgente', color: '#ef4444' }
      ],
      onSelect: (v) => updState({ priorita: v })
    });
    const statoDD2 = createDropdown({
      value: currentState.stato,
      options: [
        { value: 'Da fare', label: 'Da fare', color: '#94a3b8' },
        { value: 'In corso', label: 'In corso', color: '#ff1744' }
      ],
      onSelect: (v) => updState({ stato: v })
    });

    const docCol = el('div', {},
      fld('Tipo documento', docDD.root),
      fld('Numero documento', docNumInp),
      fld('Riferimento interno', rifInp),
      fld('Priorità', priorDD.root),
      fld('Stato iniziale', statoDD2.root)
    );

    grid.append(tariffaCol, docCol);
    container.append(grid);
    return container;
  };

  // ── STEP 4 — RIEPILOGO ──────────────────────────────────────────────────
  const renderStep4 = () => {
    const container = el('div', { class: 'step-wrap' });
    const grid = el('div', { class: 'wiz-summary-grid' });

    const drivers = list('drivers') || [];
    const fleet = list('fleet') || [];
    const drvName = drivers.find(d => d.id === currentState.autista)?.name || currentState.autista || '—';
    const camName = fleet.find(f => f.id === currentState.camion)?.targa || currentState.camion || '—';
    const rimName = fleet.find(f => f.id === currentState.rimorchio)?.targa || '';

    let imp = 0;
    if (currentState.tariffaTipo === 'A tonnellata' && currentState.peso && currentState.prezzoTonnellata)
      imp = Number(currentState.peso) * Number(currentState.prezzoTonnellata);
    else if (currentState.tariffaTipo === 'A viaggio' && currentState.prezzoViaggio)
      imp = Number(currentState.prezzoViaggio);

    const mkCard = (title, rows, stepTarget) => {
      const card = el('div', { class: 'wiz-sum-card' });
      const cardHdr = el('div', { class: 'wiz-sum-card-hdr' },
        el('div', { class: 'wiz-sum-card-title' }, title),
        el('button', { class: 'btn ghost wiz-sm', type: 'button', onclick: () => { stepIndex = stepTarget; renderStep(); } }, 'Modifica')
      );
      const cardBody = el('div', { class: 'wiz-sum-card-body' });
      rows.forEach(([l, v]) => {
        if (!v && v !== 0) return;
        cardBody.append(
          el('div', { class: 'wiz-sum-row' },
            el('span', { class: 'wiz-sum-lbl' }, l),
            el('span', { class: 'wiz-sum-val' }, v || '—')
          )
        );
      });
      card.append(cardHdr, cardBody);
      return card;
    };

    grid.append(
      mkCard('Cliente', [
        ['Cliente', currentState.cliente],
        ['Società', currentState.azienda]
      ], 0),
      mkCard('Percorso', [
        ['Carico', [currentState.caricoAzienda, currentState.origine, fmtDateDisplay(currentState.dataCarico), currentState.oraCarico].filter(Boolean).join(' · ')],
        ['Scarico', [currentState.scaricoAzienda, currentState.arrivo, fmtDateDisplay(currentState.dataScarico), currentState.oraScarico].filter(Boolean).join(' · ')]
      ], 1),
      mkCard('Merce e mezzi', [
        ['Merce', currentState.tipoTrasporto],
        ['Peso', currentState.peso != null ? formatWeight(currentState.peso, currentState.pesoUnit) : null],
        ['Autista', drvName],
        ['Camion', camName + (rimName ? ' + ' + rimName : '')]
      ], 2),
      mkCard('Tariffa', [
        ['Tipo', currentState.tariffaTipo],
        ['Importo', imp > 0 ? fmtMoney(imp) : (currentState.tariffaTipo === 'Da definire' ? 'Da definire' : null)],
        ['IVA', currentState.iva],
        ['Pagamento', currentState.pagamento]
      ], 3),
      mkCard('Documento', [
        ['Tipo', currentState.documentoTipo + (currentState.documentoNumero ? ' ' + currentState.documentoNumero : '')],
        ['Riferimento', currentState.riferimento],
        ['Priorità', currentState.priorita],
        ['Stato iniziale', currentState.stato]
      ], 3)
    );

    container.append(grid);

    const missing = [];
    if (!currentState.cliente) missing.push('Cliente');
    if (!currentState.origine) missing.push('Luogo di carico');
    if (!currentState.arrivo) missing.push('Luogo di scarico');
    if (!currentState.tipoTrasporto) missing.push('Tipo merce');
    if (!currentState.autista) missing.push('Autista');

    if (missing.length) {
      container.append(el('div', { class: 'wiz-missing' },
        el('div', { class: 'wiz-missing-title' }, '⚠ Campi obbligatori mancanti:'),
        el('div', { class: 'wiz-missing-list' }, missing.join(', '))
      ));
    }
    return container;
  };

  // ── NAVIGAZIONE ─────────────────────────────────────────────────────────
  const STEPS = [
    { title: 'Cliente', render: renderStep0, validate: () => {
      if (!currentState.cliente.trim()) return ['Cliente obbligatorio'];
      return [];
    }},
    { title: 'Percorso', render: renderStep1, validate: () => {
      const errs = [];
      if (!currentState.origine.trim()) errs.push('Luogo di carico obbligatorio');
      if (!currentState.arrivo.trim()) errs.push('Luogo di scarico obbligatorio');
      if (currentState.dataCarico && currentState.dataScarico && currentState.dataCarico > currentState.dataScarico)
        errs.push('Data carico non può essere successiva alla data scarico');
      return errs;
    }},
    { title: 'Merce e Mezzi', render: renderStep2, validate: () => {
      const errs = [];
      if (!currentState.tipoTrasporto.trim()) errs.push('Tipo merce obbligatorio');
      if (!currentState.autista) errs.push('Autista obbligatorio');
      return errs;
    }},
    { title: 'Tariffa e Documento', render: renderStep3, validate: () => [] },
    { title: 'Riepilogo', render: renderStep4, validate: () => {
      const errs = [];
      if (!currentState.cliente) errs.push('Cliente obbligatorio');
      if (!currentState.origine) errs.push('Luogo di carico obbligatorio');
      if (!currentState.arrivo) errs.push('Luogo di scarico obbligatorio');
      if (!currentState.tipoTrasporto) errs.push('Tipo merce obbligatorio');
      if (!currentState.autista) errs.push('Autista obbligatorio');
      return errs;
    }}
  ];

  const renderStep = () => {
    const s = STEPS[stepIndex];
    stepInfo.textContent = `Passo ${stepIndex + 1} di 5 · ${s.title}`;
    progressFill.style.width = `${((stepIndex + 1) / 5) * 100}%`;
    backBtn.style.visibility = stepIndex === 0 ? 'hidden' : 'visible';
    nextBtn.textContent = stepIndex === 4 ? 'Salva viaggio' : 'Avanti →';
    nextBtn.className = stepIndex === 4 ? 'btn brand' : 'btn brand';
    errEl.replaceChildren();
    body.replaceChildren(s.render());
    body.scrollTop = 0;
  };

  backBtn.onclick = () => { if (stepIndex > 0) { stepIndex--; renderStep(); } };
  nextBtn.onclick = () => {
    errEl.replaceChildren();
    const errs = STEPS[stepIndex].validate();
    if (errs.length) {
      errEl.append(el('div', { class: 'wiz-err-list' }, ...errs.map(e => el('div', { class: 'wiz-err-item' }, e))));
      return;
    }
    if (stepIndex === 4) { saveTrip(); return; }
    stepIndex++;
    renderStep();
  };

  // ── SALVATAGGIO ─────────────────────────────────────────────────────────
  const saveTrip = () => {
    const errs = STEPS[4].validate();
    if (errs.length) {
      errEl.append(el('div', { class: 'wiz-err-list' }, ...errs.map(e => el('div', { class: 'wiz-err-item' }, e))));
      return;
    }
    const id = trip?.id || 'TRIP-' + crypto.randomUUID();
    const payload = {
      id, draft: false,
      cliente: currentState.cliente, clienteId: currentState.clienteId || '',
      azienda: currentState.azienda,
      caricoAzienda: currentState.caricoAzienda, origine: currentState.origine,
      dataCarico: currentState.dataCarico, oraCarico: currentState.oraCarico,
      scaricoAzienda: currentState.scaricoAzienda, arrivo: currentState.arrivo,
      dataScarico: currentState.dataScarico, oraScarico: currentState.oraScarico,
      autista: currentState.autista, camion: currentState.camion, rimorchio: currentState.rimorchio,
      tipoTrasporto: currentState.tipoTrasporto, peso: currentState.peso, pesoUnit: currentState.pesoUnit,
      tariffa: { tipo: currentState.tariffaTipo, prezzoTonnellata: currentState.prezzoTonnellata, prezzo: currentState.prezzoViaggio },
      iva: currentState.iva, pagamento: currentState.pagamento,
      documento: { tipo: currentState.documentoTipo, numero: currentState.documentoNumero },
      riferimento: currentState.riferimento, priorita: currentState.priorita, stato: currentState.stato,
      note: currentState.note, noteAutista: currentState.noteAutista,
      attachments: currentState.attachments,
      createdAt: trip?.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    if (trip) put('trips', trip.id, payload);
    else add('trips', payload);
    logEvent('trip_saved', { tripId: id, cliente: currentState.cliente }, { actorId: me()?.id });
    writeStoredJson(DRAFT_KEY, null);
    showToast({ message: 'Viaggio salvato', type: 'success' });
    overlay.remove();
    renderApp();
  };

  renderStep();
};

  return wrap
}

  /* ================================================================
     FLOTTA LIVE — monitoraggio posizioni e stato veicoli
     ================================================================ */
  const Paghe=()=>{
    const current=me()
    const wrap=el('div',{class:'pag-suite'})

    /* ── helpers ─────────────────────────────────────────────────── */
    const now=new Date()
    let selectedMonth=toLocalISO(now).slice(0,7)

    const getDrivers=()=>{
      const drv=list('drivers')
      if(drv && drv.length) return drv
      return (list('users')||[]).filter(u=>u.id!=='u-admin' && u.active!==false)
    }
    const driverName=(id)=>{
      const d=(list('drivers')||[]).find(x=>x.id===id)
      if(d) return d.name||d.id
      const u=(list('users')||[]).find(x=>x.id===id)
      return u?.name||u?.username||u?.email||id||'-'
    }
    const payrollForMonth=()=>(list('payroll')||[]).filter(p=>(p.mese||p.month||'')===selectedMonth)
    const allPayroll=()=>(list('payroll')||[])
    const calcNetto=(p)=>Number(p.pagaBase||0)+Number(p.trasferte||0)+Number(p.straordinari||0)-Number(p.detrazioni||0)

    const monthLabel=(m)=>{
      if(!m||!/^\d{4}-\d{2}$/.test(m)) return '-'
      const [y,mo]=m.split('-').map(Number)
      return new Date(y,mo-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'})
    }

    /* ── hero ────────────────────────────────────────────────────── */
    const monthInput=el('input',{class:'input',type:'month',value:selectedMonth})
    monthInput.addEventListener('change',()=>{selectedMonth=monthInput.value;refresh()})

    const hero=el('div',{class:'pag-hero'},
      el('div',{class:'pag-hero-left'},
        el('div',{class:'pag-hero-title'},'Paghe'),
        el('div',{class:'pag-hero-sub'},'Retribuzioni mensili e costi personale')
      ),
      monthInput
    )

    /* ── KPI ─────────────────────────────────────────────────────── */
    const kpiGrid=el('div',{class:'pag-kpi-grid'})

    /* ── card grid ───────────────────────────────────────────────── */
    const cardGrid=el('div',{class:'pag-grid'})

    /* ── storico table ───────────────────────────────────────────── */
    const storicoTable=el('table',{class:'table'})
    const storicoWrap=el('div',{class:'table-card',style:'margin-top:12px'},storicoTable)

    /* ── PDF busta paga modal ────────────────────────────────────── */
    const showPdfModal=(rec)=>{
      const name=driverName(rec.autista||rec.userId)
      const netto=rec.netto!=null?Number(rec.netto):calcNetto(rec)
      const rows=[
        ['Paga base',fmtMoney(rec.pagaBase||0)],
        ['Trasferte',fmtMoney(rec.trasferte||0)],
        ['Straordinari',fmtMoney(rec.straordinari||0)],
        ['Detrazioni','- '+fmtMoney(rec.detrazioni||0)],
        ['Netto',fmtMoney(netto)]
      ]
      const frame=el('div',{class:'pag-pdf-frame'})
      frame.append(
        el('div',{style:'text-align:center;margin-bottom:16px'},
          el('div',{style:'font-size:18px;font-weight:700'},'UNITRANS S.R.L.'),
          el('div',{style:'font-size:13px;color:var(--muted)'},'Busta paga \u2014 '+monthLabel(rec.mese||rec.month||selectedMonth))
        ),
        el('div',{style:'margin-bottom:12px'},
          el('strong',{},'Dipendente: '),el('span',{},name)
        )
      )
      const tbl=el('table',{style:'width:100%;border-collapse:collapse;font-size:14px'})
      rows.forEach(([lab,val],i)=>{
        const isLast=i===rows.length-1
        tbl.append(el('tr',{style:isLast?'font-weight:700;border-top:2px solid var(--border)':''},
          el('td',{style:'padding:6px 8px'},lab),
          el('td',{style:'padding:6px 8px;text-align:right'},val)
        ))
      })
      frame.append(tbl)
      const printBtn=el('button',{class:'btn brand',type:'button',onclick:()=>{
        const win=window.open('','_blank')
        if(!win){showToast({message:'Popup bloccato dal browser',type:'error'});return}

        win.document.write('<div class="hdr"><h1>UNITRANS S.R.L.</h1><p>Busta paga &mdash; '+monthLabel(rec.mese||rec.month||selectedMonth)+'</p></div>')
        win.document.write('<p><strong>Dipendente:</strong> '+name+'</p>')
        win.document.write('<table>'+rows.map(([l,v],idx)=>'<tr'+(idx===rows.length-1?' style="font-weight:700;border-top:2px solid #333"':'')+'><td>'+l+'</td><td style="text-align:right">'+v+'</td></tr>').join('')+'</table>')
        win.document.write('</body></html>')
