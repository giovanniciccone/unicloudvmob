        title:'Busta paga \u2014 '+name,
        body:frame,
        footer:el('div',{class:'modal-footer'},el('div',{}),printBtn)
      })
    }

    /* ── refresh ─────────────────────────────────────────────────── */
    const refresh=()=>{
      const drivers=getDrivers()
      const monthRows=payrollForMonth()
      const all=allPayroll()
      const year=selectedMonth.slice(0,4)

      // KPI
      const totalNettoMonth=monthRows.reduce((s,p)=>s+(p.netto!=null?Number(p.netto):calcNetto(p)),0)
      const pagati=monthRows.filter(p=>p.stato==='pagata').length
      const daPagare=monthRows.filter(p=>p.stato!=='pagata').length
      const costoAnno=all.filter(p=>(p.mese||p.month||'').startsWith(year)).reduce((s,p)=>s+(p.netto!=null?Number(p.netto):calcNetto(p)),0)

      kpiGrid.replaceChildren(
        el('div',{class:'pag-kpi'},
          el('div',{class:'pag-kpi-label'},'Totale netto mese'),
          el('div',{class:'pag-kpi-value'},fmtMoney(totalNettoMonth))
        ),
        el('div',{class:'pag-kpi'},
          el('div',{class:'pag-kpi-label'},'Autisti pagati / da pagare'),
          el('div',{class:'pag-kpi-value'},pagati+' / '+daPagare)
        ),
        el('div',{class:'pag-kpi'},
          el('div',{class:'pag-kpi-label'},'Costo personale anno'),
          el('div',{class:'pag-kpi-value'},fmtMoney(costoAnno))
        )
      )

      // Card grid - one card per driver
      const cards=drivers.map(drv=>{
        const drvId=drv.id
        const existing=monthRows.find(p=>(p.autista||p.userId)===drvId)
        let pagaBase=existing?Number(existing.pagaBase||0):0
        let trasferte=existing?Number(existing.trasferte||0):0
        let straordinari=existing?Number(existing.straordinari||0):0
        let detrazioni=existing?Number(existing.detrazioni||0):0
        let stato=existing?.stato||'da_pagare'

        const card=el('div',{class:'pag-card'})
        const badge=el('span',{class:'badge '+(stato==='pagata'?'green':'yellow'),style:'font-size:12px'},stato==='pagata'?'Pagata':'Da pagare')
        const head=el('div',{class:'pag-card-head'},
          el('div',{class:'pag-card-name'},driverName(drvId)),
          badge
        )

        const mkInput=(label,val,onChange)=>{
          const inp=el('input',{class:'input',type:'number',step:'0.01',value:val||'',placeholder:'0.00'})
          inp.addEventListener('input',()=>{onChange(Number(inp.value)||0);updateNetto()})
          return el('div',{class:'pag-field'},el('label',{},label),inp)
        }

        const nettoEl=el('div',{class:'pag-netto'},'Netto: '+fmtMoney(pagaBase+trasferte+straordinari-detrazioni))
        const updateNetto=()=>{nettoEl.textContent='Netto: '+fmtMoney(pagaBase+trasferte+straordinari-detrazioni)}

        const fields=el('div',{class:'pag-card-fields'},
          mkInput('Paga base',pagaBase,(v)=>{pagaBase=v}),
          mkInput('Trasferte',trasferte,(v)=>{trasferte=v}),
          mkInput('Straordinari',straordinari,(v)=>{straordinari=v}),
          mkInput('Detrazioni',detrazioni,(v)=>{detrazioni=v})
        )

        const saveBtn=el('button',{class:'btn brand',type:'button',onclick:()=>{
          const netto=pagaBase+trasferte+straordinari-detrazioni
          const stamp=new Date().toISOString()
          if(existing){
            put('payroll',existing.id,{pagaBase,trasferte,straordinari,detrazioni,netto,stato,updatedAt:stamp})
            logEvent('payroll_updated',{mese:selectedMonth,autista:drvId},{actorId:current?.id,targetId:existing.id})
          }else{
            const id='PAY-'+crypto.randomUUID()
            add('payroll',{id,autista:drvId,mese:selectedMonth,anno:Number(selectedMonth.slice(0,4)),pagaBase,trasferte,straordinari,detrazioni,netto,stato,createdAt:stamp,updatedAt:stamp})
            logEvent('payroll_created',{mese:selectedMonth,autista:drvId},{actorId:current?.id,targetId:id})
          }
          showToast({message:'Paga salvata per '+driverName(drvId),type:'success'})
          refresh()
        }},'Salva')

        const pdfBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>{
          const rec=existing||{autista:drvId,mese:selectedMonth,pagaBase,trasferte,straordinari,detrazioni}
          showPdfModal(rec)
        }},'PDF')

        const toggleBtn=el('button',{class:'btn '+(stato==='pagata'?'ghost':'brand'),type:'button',style:'font-size:12px',onclick:()=>{
          const newStato=stato==='pagata'?'da_pagare':'pagata'
          if(existing){
            const patch={stato:newStato,updatedAt:new Date().toISOString()}
            if(newStato==='pagata') patch.dataPagamento=new Date().toISOString()
            put('payroll',existing.id,patch)
            logEvent('payroll_status_changed',{mese:selectedMonth,autista:drvId,from:stato,to:newStato},{actorId:current?.id,targetId:existing.id})
          }
          stato=newStato
          showToast({message:driverName(drvId)+' \u2014 '+(newStato==='pagata'?'pagata':'da pagare'),type:'success'})
          refresh()
        }},stato==='pagata'?'Segna da pagare':'Segna pagata')

        const actions=el('div',{class:'pag-card-actions'},saveBtn,pdfBtn,toggleBtn)
        card.append(head,fields,nettoEl,actions)
        return card
      })

      cardGrid.replaceChildren(...cards)
      if(!cards.length) cardGrid.replaceChildren(el('div',{style:'padding:24px;text-align:center;color:var(--muted)'},'Nessun autista/dipendente trovato.'))

      // Storico table
      const sorted=all.slice().sort((a,b)=>(b.mese||b.month||'').localeCompare(a.mese||a.month||''))
      const storicoRows=sorted.map(p=>el('tr',{},
        el('td',{},driverName(p.autista||p.userId)),
        el('td',{},monthLabel(p.mese||p.month||'')),
        el('td',{},fmtMoney(p.netto!=null?p.netto:calcNetto(p))),
        el('td',{},el('span',{class:'badge '+(p.stato==='pagata'?'green':'yellow')},p.stato==='pagata'?'Pagata':'Da pagare')),
        el('td',{},p.dataPagamento?fmtDateDisplay(p.dataPagamento):'-')
      ))
      if(!storicoRows.length) storicoRows.push(el('tr',{},el('td',{colspan:'5',style:'text-align:center;padding:24px;color:var(--muted)'},'Nessuno storico disponibile.')))
      storicoTable.replaceChildren(
        el('thead',{},el('tr',{},
          el('th',{},'Autista'),el('th',{},'Mese'),el('th',{},'Netto'),el('th',{},'Stato'),el('th',{},'Data pagamento')
        )),
        el('tbody',{},...storicoRows)
      )
    }

    refresh()
    wrap.append(hero,kpiGrid,cardGrid,el('div',{style:'margin-top:32px'},el('h3',{style:'margin:0 0 12px'},'Storico paghe'),storicoWrap))
    return wrap
  }

  const MODULES=[
    {id:'dashboard',label:'Situazione'},
    {id:'viaggi',   label:'Viaggi'},
    {id:'fatture',  label:'Fatture'},
    {id:'clienti',  label:'Clienti'},
    {id:'autisti',  label:'Autisti'},
    {id:'flotta',   label:'Flotta'},
    {id:'spese',    label:'Spese'},
    {id:'paghe',    label:'Paghe'},
    {id:'report',   label:'Report'},
    {id:'sicurezza',label:'Sicurezza'}
  ]

  const Sicurezza=()=>{
    const current=me()
    if(!current) return el('div',{class:'sec-wrap'},el('div',{class:'muted'},'Sessione non valida.'))
    return current.role==='admin'?SecurityAdmin(current):SecurityOperator(current)
  }

  const SecurityOperator=(current)=>{
    const wrap=el('div',{class:'sec-wrap'})
    wrap.append(
      el('div',{class:'sec-page-hdr'},
        el('div',{class:'sec-page-title'},'Account personale'),
        el('div',{class:'sec-page-sub'},'Visualizza il tuo profilo e aggiorna la password di accesso.')
      )
    )
    // Card profilo
    const profilo=el('div',{class:'sec-card'},
      el('div',{class:'sec-card-title'},'Profilo'),
      el('div',{class:'sec-info-grid'},
        el('div',{class:'sec-info-row'},el('span',{class:'sec-info-label'},'Nome'),el('span',{},current.name||'—')),
        el('div',{class:'sec-info-row'},el('span',{class:'sec-info-label'},'Nome utente'),el('span',{},current.username?'@'+current.username:'—')),
        el('div',{class:'sec-info-row'},el('span',{class:'sec-info-label'},'Ruolo'),el('span',{},el('span',{class:'sec-role-badge sec-role-'+current.role},ROLE_LABELS[current.role]||current.role))),
        el('div',{class:'sec-info-row'},el('span',{class:'sec-info-label'},'Stato'),el('span',{style:'display:flex;align-items:center;gap:6px'},el('span',{style:'width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block'}),'Attivo'))
      )
    )
    // Card cambio password
    const passInp=el('input',{class:'input',type:'password',autocomplete:'new-password',placeholder:'Nuova password (min 8 caratteri)'})
    const confInp=el('input',{class:'input',type:'password',autocomplete:'new-password',placeholder:'Conferma password'})
    const togglePass=(inp,btn)=>{const show=inp.type==='text';inp.type=show?'password':'text';btn.textContent=show?'Mostra':'Nascondi'}
    const showBtn1=el('button',{class:'btn ghost',type:'button',style:'flex-shrink:0'},'Mostra')
    const showBtn2=el('button',{class:'btn ghost',type:'button',style:'flex-shrink:0'},'Mostra')
    showBtn1.onclick=()=>togglePass(passInp,showBtn1)
    showBtn2.onclick=()=>togglePass(confInp,showBtn2)
    const fb=el('div',{class:'sec-feedback'})
    const submitBtn=el('button',{class:'btn brand',type:'button'},'Aggiorna password')
    const doSave=()=>{
      fb.className='sec-feedback'
      fb.textContent=''
      const p1=passInp.value, p2=confInp.value
      if(!p1||p1.length<8){fb.classList.add('error');fb.textContent='Min 8 caratteri';passInp.focus();return}
      if(p1!==p2){fb.classList.add('error');fb.textContent='Le password non coincidono';confInp.focus();return}
      submitBtn.disabled=true;submitBtn.textContent='Salvataggio...'
      setTimeout(()=>{
        put('users',current.id,{pass:p1,forceChange:false})
        logEvent('user_password_change_self',{username:current.username||''},{actorId:current.id,targetId:current.id})
        const upd={...current,forceChange:false}
        sessionStorage.setItem(SESSION,JSON.stringify(upd))
        Object.assign(current,upd)
        submitBtn.disabled=false;submitBtn.textContent='Aggiorna password'
        passInp.value='';confInp.value=''
        fb.classList.add('success');fb.textContent='Password aggiornata con successo'
      },280)
    }
    submitBtn.onclick=doSave
    confInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSave()}})
    const passCard=el('div',{class:'sec-card'},
      el('div',{class:'sec-card-title'},'Cambio password'),
      el('div',{class:'sec-pass-row'},passInp,showBtn1),
      el('div',{class:'sec-pass-row'},confInp,showBtn2),
      fb,
      el('div',{},submitBtn)
    )
    wrap.append(profilo,passCard)
    return wrap
  }

  const SecurityAdmin=(current)=>{
    const wrap=el('div',{class:'sec-wrap'})
    const TABS=[{id:'utenti',label:'Utenti'},{id:'log',label:'Log attività'},{id:'account',label:'Il mio account'}]
    let activeTab='utenti'

    // Header
    const hdr=el('div',{class:'sec-page-hdr'},
      el('div',{class:'sec-page-title'},'Sicurezza'),
      el('div',{class:'sec-page-sub'},'Gestione accessi, utenti e attività del portale.')
    )
    // Tab bar
    const tabBar=el('div',{class:'sec-tabbar'})
    const content=el('div',{class:'sec-content'})
    const renderTab=id=>{
      activeTab=id
      tabBar.querySelectorAll('.sec-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id))
      content.replaceChildren()
      if(id==='utenti') content.append(buildUtenti())
      else if(id==='log') content.append(buildLog())
      else content.append(SecurityOperator(current))
    }
    TABS.forEach(t=>{
      const btn=el('button',{class:'sec-tab'+(t.id===activeTab?' active':''),'data-tab':t.id,type:'button'},t.label)
      btn.onclick=()=>renderTab(t.id)
      tabBar.append(btn)
    })
    wrap.append(hdr,tabBar,content)
    renderTab('utenti')
    return wrap

    // ── TAB UTENTI ──────────────────────────────────────────────────────
    function buildUtenti(){
      const genPass=()=>(Math.random().toString(36).slice(2,7)+Math.random().toString(36).slice(2,7)).slice(0,10)
      let allUsers=()=>list('users').filter(u=>u.id!==ADMIN_ID)
      let selId=allUsers()[0]?.id||null
      let creating=false

      const pane=el('div',{class:'sec-split'})
      const listPane=el('div',{class:'sec-list-pane'})
      const detailPane=el('div',{class:'sec-detail-pane'})
      pane.append(listPane,detailPane)

      const roleBadge=role=>el('span',{class:'sec-role-badge sec-role-'+role},ROLE_LABELS[role]||role)

      const renderList=()=>{
        const users=allUsers()
        const addBtn=el('button',{class:'btn brand',type:'button',style:'width:100%'},'+ Nuovo utente')
        addBtn.onclick=()=>{creating=true;selId=null;renderList();renderDetail()}
        listPane.replaceChildren(addBtn)
        if(!users.length){
          listPane.append(el('div',{class:'sec-empty'},'Nessun utente aggiunto'))
          return
        }
        users.sort((a,b)=>(a.name||a.username||'').localeCompare(b.name||b.username||'','it',{sensitivity:'base'}))
        users.forEach(u=>{
          const active=u.active!==false
          const init=(u.name||u.username||'?').slice(0,2).toUpperCase()
          const card=el('div',{class:'sec-user-card'+((!creating&&u.id===selId)?' active':'')})
          card.append(
            el('div',{class:'sec-user-row'},
              el('div',{class:'sec-user-avatar'},init),
              el('div',{style:'flex:1;min-width:0'},
                el('div',{style:'font-weight:600;font-size:14px'},u.name||u.username||'—'),
                el('div',{class:'sec-user-username'},u.username?'@'+u.username:'—')
              ),
              roleBadge(u.role)
            ),
            el('div',{class:'sec-user-meta'},
              el('span',{style:`display:inline-flex;align-items:center;gap:5px`},
                el('span',{style:`width:6px;height:6px;border-radius:50%;background:${active?'#22c55e':'#94a3b8'};display:inline-block`}),
                active?'Attivo':'Disabilitato'
              )
            )
          )
          card.onclick=()=>{creating=false;selId=u.id;renderList();renderDetail()}
          listPane.append(card)
        })
      }

      const mkToggle=(on,onChange)=>{
        let state=on
        const btn=el('button',{class:'sec-toggle'+(state?' on':''),type:'button'})
        const handle=el('span',{class:'sec-toggle-handle'})
        btn.append(handle)
        btn.onclick=()=>{state=!state;btn.classList.toggle('on',state);onChange(state)}
        btn.setValue=v=>{state=v;btn.classList.toggle('on',v)}
        return btn
      }

      const mkModulesGrid=(perms,onChange)=>{
        const current=[...perms]
        const wrap=el('div',{})
        const allBtn=el('button',{class:'btn ghost',type:'button',style:'font-size:12px'},'Tutti')
        const noneBtn=el('button',{class:'btn ghost',type:'button',style:'font-size:12px'},'Nessuno')
        const btns=el('div',{style:'display:flex;gap:8px;margin-bottom:10px'},allBtn,noneBtn)
        const grid=el('div',{class:'sec-modules-grid'})
        const toggles={}
        MODULES.forEach(m=>{
          const row=el('div',{class:'sec-module-row'})
          const lbl=el('span',{style:'font-size:13px'},m.label)
          const t=mkToggle(current.includes(m.id),on=>{
            if(on){if(!current.includes(m.id))current.push(m.id)}
            else{const i=current.indexOf(m.id);if(i>-1)current.splice(i,1)}
            onChange(current)
          })
          toggles[m.id]=t
          row.append(lbl,t)
          grid.append(row)
        })
        allBtn.onclick=()=>{MODULES.forEach(m=>{if(!current.includes(m.id))current.push(m.id);toggles[m.id].setValue(true)});onChange(current)}
        noneBtn.onclick=()=>{current.length=0;MODULES.forEach(m=>toggles[m.id].setValue(false));onChange(current)}
        wrap.append(btns,grid)
        return wrap
      }

      const renderDetail=()=>{
        detailPane.replaceChildren()

        // NUOVO UTENTE
        if(creating){
          let tempRole='operatore'
          let tempPerms=[...permissionsForRole('operatore')]
          const nameI=el('input',{class:'input',placeholder:'Nome completo'})
          const userI=el('input',{class:'input',placeholder:'Nome utente (senza spazi)'})
          const roleS=el('select',{class:'input'})
          roleS.append(el('option',{value:'operatore'},'Operatore'),el('option',{value:'autista'},'Autista'))
          roleS.value='operatore'
          const genderS=el('select',{class:'input'})
          genderS.append(el('option',{value:'male'},'Lui (Operatore)'),el('option',{value:'female'},'Lei (Operatrice)'))
          const passI=el('input',{class:'input',type:'text',value:genPass(),placeholder:'Password temporanea'})
          const genBtn=el('button',{class:'btn ghost',type:'button'},'Genera')
          genBtn.onclick=()=>{passI.value=genPass()}
          const modulesWrap=el('div',{})
          const refreshModules=()=>{
            modulesWrap.replaceChildren()
            if(tempRole==='operatore'){
              modulesWrap.append(
                el('div',{class:'sec-field-label'},'Moduli abilitati'),
                mkModulesGrid(tempPerms,p=>{tempPerms=[...p]})
              )
            }
          }
          roleS.onchange=()=>{tempRole=roleS.value;tempPerms=[...permissionsForRole(tempRole)];refreshModules()}
          refreshModules()
          const fb=el('div',{class:'sec-feedback'})
          const saveBtn=el('button',{class:'btn brand',type:'button'},'Crea utente')
          saveBtn.onclick=()=>{
            fb.className='sec-feedback';fb.textContent=''
            const name=nameI.value.trim()
            const username=userI.value.trim().toLowerCase()
            const pass=passI.value.trim()
            const role=roleS.value
            if(!username){fb.classList.add('error');fb.textContent='Inserisci un nome utente';userI.focus();return}
            if(username.includes(' ')){fb.classList.add('error');fb.textContent='Nessuno spazio nel nome utente';userI.focus();return}
            if(allUsers().some(u=>u.username&&u.username.toLowerCase()===username)){fb.classList.add('error');fb.textContent='Nome utente già in uso';userI.focus();return}
            if(!pass||pass.length<8){fb.classList.add('error');fb.textContent='Password min 8 caratteri';passI.focus();return}
            const id='USR-'+crypto.randomUUID()
            add('users',{id,name,username,role,gender:genderS.value,pass,active:true,forceChange:true,permissions:role==='autista'?[]:tempPerms,createdAt:new Date().toISOString()})
            logEvent('user_created',{username,role},{actorId:current.id})
            showToast({message:'Utente creato',type:'success'})
            creating=false;selId=id
            renderList();renderDetail()
          }
          const cancelBtn=el('button',{class:'btn ghost',type:'button'},'Annulla')
          cancelBtn.onclick=()=>{creating=false;renderList();renderDetail()}
          detailPane.append(
            el('div',{class:'sec-detail-title'},'Nuovo utente'),
            el('div',{class:'sec-field-label'},'Nome completo'),nameI,
            el('div',{class:'sec-field-label'},'Nome utente'),userI,
            el('div',{class:'sec-field-label'},'Ruolo'),roleS,
            el('div',{class:'sec-field-label'},'Genere'),genderS,
            el('div',{class:'sec-field-label'},'Password temporanea'),
            el('div',{style:'display:flex;gap:8px'},passI,genBtn),
            modulesWrap,
            fb,
            el('div',{style:'display:flex;gap:10px;margin-top:4px'},saveBtn,cancelBtn)
          )
          return
        }

        // NESSUNA SELEZIONE
        const users=allUsers()
        if(!selId||!users.find(u=>u.id===selId)){
          detailPane.append(el('div',{class:'sec-placeholder'},'Seleziona un utente o creane uno nuovo'))
          return
        }

        // MODIFICA UTENTE
        const user=list('users').find(u=>u.id===selId)
        if(!user){detailPane.append(el('div',{class:'sec-placeholder'},'Utente non trovato'));return}

        const nameI=el('input',{class:'input',value:user.name||''})
        const userI=el('input',{class:'input',value:user.username||''})
        const roleS=el('select',{class:'input'})
        roleS.append(el('option',{value:'operatore'},'Operatore'),el('option',{value:'autista'},'Autista'))
        roleS.value=user.role||'operatore'
        const genderS=el('select',{class:'input'})
        genderS.append(el('option',{value:'male'},'Lui (Operatore)'),el('option',{value:'female'},'Lei (Operatrice)'))
        genderS.value=user.gender||'male'

        let activeState=user.active!==false
        let forceState=!!user.forceChange
        let curPerms=Array.isArray(user.permissions)?[...user.permissions]:[...permissionsForRole(user.role||'operatore')]

        const activeToggle=mkToggle(activeState,v=>{activeState=v})
        const forceToggle=mkToggle(forceState,v=>{forceState=v})

        const modulesWrap=el('div',{})
        const refreshModules=()=>{
          modulesWrap.replaceChildren()
          if(roleS.value==='operatore'){
            modulesWrap.append(
              el('div',{class:'sec-field-label',style:'margin-top:4px'},'Moduli abilitati'),
              mkModulesGrid(curPerms,p=>{curPerms=[...p]})
            )
          }
        }
        roleS.onchange=()=>{curPerms=[...permissionsForRole(roleS.value)];refreshModules()}
        refreshModules()

        // Reset password
        const resetI=el('input',{class:'input',type:'text',placeholder:'Nuova password temporanea'})
        const resetGen=el('button',{class:'btn ghost',type:'button'},'Genera')
        resetGen.onclick=()=>{resetI.value=genPass()}
        const resetBtn=el('button',{class:'btn ghost',type:'button'},'Applica reset')
        const resetFb=el('div',{class:'sec-feedback'})
        resetBtn.onclick=()=>{
          const v=resetI.value.trim()
          if(!v||v.length<8){resetFb.className='sec-feedback error';resetFb.textContent='Min 8 caratteri';return}
          put('users',user.id,{pass:v,forceChange:true})
          logEvent('user_password_reset',{username:user.username||''},{actorId:current.id,targetId:user.id})
          resetI.value='';resetFb.className='sec-feedback success';resetFb.textContent='Password resettata. Al prossimo login verrà richiesto il cambio.'
          showToast({message:'Password resettata',type:'success'})
        }

        const fb=el('div',{class:'sec-feedback'})
        const saveBtn=el('button',{class:'btn brand',type:'button'},'Salva modifiche')
        saveBtn.onclick=()=>{
          fb.className='sec-feedback';fb.textContent=''
          const username=userI.value.trim().toLowerCase()
          if(!username){fb.classList.add('error');fb.textContent='Inserisci il nome utente';userI.focus();return}
          if(username.includes(' ')){fb.classList.add('error');fb.textContent='Nessuno spazio nel nome utente';userI.focus();return}
          if(allUsers().some(u=>u.id!==user.id&&u.username&&u.username.toLowerCase()===username)){fb.classList.add('error');fb.textContent='Nome utente già in uso';return}
          const role=roleS.value
          const payload={name:nameI.value.trim(),username,role,gender:genderS.value,active:activeState,forceChange:forceState,permissions:role==='autista'?[]:curPerms}
          put('users',user.id,payload)
          logEvent('user_updated',{username,role},{actorId:current.id,targetId:user.id})
          if(user.id===current.id){
            const s={...me(),...payload}
            sessionStorage.setItem(SESSION,JSON.stringify(s))
            Object.assign(current,payload)
          }
          fb.classList.add('success');fb.textContent='Modifiche salvate'
          showToast({message:'Dati aggiornati',type:'success'})
          renderList()
        }

        const delBtn=el('button',{class:'btn red',type:'button'},'Elimina utente')
        delBtn.onclick=async()=>{
          if(user.id===current.id){showToast({message:'Non puoi eliminare te stesso',type:'error'});return}
          const ok=await askConfirm({title:'Elimina utente',message:`Eliminare ${user.name||user.username}?`,confirmLabel:'Elimina',cancelLabel:'Annulla',tone:'danger'})
          if(!ok) return
          remove('users',user.id)
          logEvent('user_deleted',{username:user.username||''},{actorId:current.id,targetId:user.id})
          showToast({message:'Utente eliminato'})
          selId=allUsers()[0]?.id||null
          renderList();renderDetail()
        }

        detailPane.append(
          el('div',{class:'sec-detail-title'},user.name||user.username||'—'),
          el('div',{class:'sec-field-label'},'Nome completo'),nameI,
          el('div',{class:'sec-field-label'},'Nome utente'),userI,
          el('div',{class:'sec-field-label'},'Ruolo'),roleS,
          el('div',{class:'sec-field-label'},'Genere'),genderS,
          el('div',{class:'sec-toggle-row'},el('span',{class:'sec-field-label',style:'margin:0'},'Account attivo'),activeToggle),
          el('div',{class:'sec-toggle-row'},el('span',{class:'sec-field-label',style:'margin:0'},'Forza cambio password'),forceToggle),
          modulesWrap,
          el('div',{class:'sec-card',style:'margin-top:4px'},
            el('div',{class:'sec-card-title'},'Reset password'),
            el('div',{style:'display:flex;gap:8px;flex-wrap:wrap'},resetI,resetGen,resetBtn),
            resetFb
          ),
          fb,
          el('div',{style:'display:flex;gap:10px;margin-top:4px'},saveBtn,delBtn)
        )
      }

      renderList();renderDetail()
      return pane
    }

    // ── TAB LOG ────────────────────────────────────────────────────────
    function buildLog(){
      const wrap=el('div',{class:'sec-log-wrap'})
      let page=0
      const PAGE=30
      let filterText=''
      let filterUser=''
      let filterType=''

      const searchI=el('input',{class:'input',placeholder:'Cerca nel log...',style:'flex:1 1 200px'})
      const userS=el('select',{class:'input',style:'flex:0 0 180px'})
      userS.append(el('option',{value:''},'Tutti gli utenti'))
      list('users').forEach(u=>userS.append(el('option',{value:u.id},u.name||u.username||u.id)))
      const typeS=el('select',{class:'input',style:'flex:0 0 160px'})
      ;[['','Tutti i tipi'],['login','Login'],['trip','Viaggi'],['user','Utenti'],['invoice','Fatture']].forEach(([v,l])=>typeS.append(el('option',{value:v},l)))
      const resetBtn=el('button',{class:'btn ghost',type:'button'},'Azzera filtri')
      const toolbar=el('div',{style:'display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px'},searchI,userS,typeS,resetBtn)

      searchI.oninput=()=>{filterText=searchI.value.toLowerCase();page=0;renderLog()}
      userS.onchange=()=>{filterUser=userS.value;page=0;renderLog()}
      typeS.onchange=()=>{filterType=typeS.value;page=0;renderLog()}
      resetBtn.onclick=()=>{searchI.value='';userS.value='';typeS.value='';filterText='';filterUser='';filterType='';page=0;renderLog()}

      const clearAllBtn=el('button',{class:'btn red',type:'button',style:'margin-bottom:14px'},'Svuota tutto il registro')
      clearAllBtn.onclick=async()=>{
        const ok=await askConfirm({title:'Svuota registro',message:'Eliminare tutto il registro attività?',confirmLabel:'Svuota',cancelLabel:'Annulla',tone:'danger'})
        if(!ok) return
        list('users').forEach(u=>clearLogsForUser(u.id))
        clearLogsForUser(ADMIN_ID)
        showToast({message:'Registro svuotato'})
        renderLog()
      }

      const tableWrap=el('div',{})
      const pagerWrap=el('div',{style:'display:flex;gap:8px;align-items:center;margin-top:12px;justify-content:flex-end'})

      const renderLog=()=>{
        let logs=listLogs()
        if(filterUser) logs=logs.filter(l=>l.actorId===filterUser||l.targetId===filterUser)
        if(filterType) logs=logs.filter(l=>(l.action||'').startsWith(filterType))
        if(filterText) logs=logs.filter(l=>describeLogAction(l).toLowerCase().includes(filterText))
        logs.sort((a,b)=>new Date(b.ts)-new Date(a.ts))
        const total=logs.length
        const pages=Math.max(1,Math.ceil(total/PAGE))
        if(page>=pages) page=pages-1
        const slice=logs.slice(page*PAGE,(page+1)*PAGE)

        tableWrap.replaceChildren()
        if(!total){tableWrap.append(el('div',{class:'empty-state'},'Nessun evento nel registro'));pagerWrap.replaceChildren();return}

        const table=el('table',{class:'log-table'})
        table.append(el('thead',{},el('tr',{},el('th',{},'Data/ora'),el('th',{},'Utente'),el('th',{},'Azione'),el('th',{},'—'))))
        const tbody=el('tbody',{})
        slice.forEach(log=>{
          const actor=getUserById(log.actorId)
          const actorLabel=actor?actor.name||actor.username||actor.id:'Sistema'
          const rmBtn=el('button',{class:'btn ghost',type:'button',style:'font-size:11px;padding:3px 8px'},'Rimuovi')
          rmBtn.onclick=async()=>{
            const ok=await askConfirm({title:'Rimuovi voce',message:'Eliminare questa voce dal registro?',confirmLabel:'Rimuovi',cancelLabel:'Annulla',tone:'danger'})
            if(!ok) return
            removeLogEntry(log.id)
            renderLog()
          }
          tbody.append(el('tr',{},el('td',{},fmtDateTime(log.ts)),el('td',{},actorLabel),el('td',{},describeLogAction(log)),el('td',{},rmBtn)))
        })
        table.append(tbody)
        tableWrap.append(table)

        pagerWrap.replaceChildren()
        if(pages>1){
          const prev=el('button',{class:'btn ghost',type:'button',disabled:page===0?'':null},'← Prec')
          prev.onclick=()=>{page--;renderLog()}
          const info=el('span',{style:'font-size:12px;color:var(--muted)'},`Pag. ${page+1} / ${pages} · ${total} eventi`)
          const next=el('button',{class:'btn ghost',type:'button',disabled:page>=pages-1?'':null},'Succ →')
          next.onclick=()=>{page++;renderLog()}
          pagerWrap.append(prev,info,next)
        }
      }

      renderLog()
      wrap.append(toolbar,clearAllBtn,tableWrap,pagerWrap)
      return wrap
    }
  }


  /* =========================================================================
   *  SPESE
   * ========================================================================= */
  const Spese=()=>{
    const wrap=el('div',{class:'spe-suite'})
    const categorie=['Carburante','Pedaggi','Manutenzione','Vitto','Alloggio','Assicurazioni','Tasse','Altro']
    const catClass=c=>(c||'altro').toLowerCase()

    const state={mese:'',categoria:'',autista:'',veicolo:'',search:''}

    /* ---------- helpers ---------- */
    const thisMonth=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
    const inMonth=(iso,ym)=>{if(!ym)return true;return(iso||'').slice(0,7)===ym}
    const filtered=()=>{
      const ym=state.mese||thisMonth()
      return(list('expenses')||[]).filter(e=>{
        if(!inMonth(e.data,ym))return false
        if(state.categoria&&e.categoria!==state.categoria)return false
        if(state.autista&&e.autista!==state.autista)return false
        if(state.veicolo&&e.veicolo!==state.veicolo)return false
        if(state.search){
          const q=state.search.toLowerCase()
          if(!(e.descrizione||'').toLowerCase().includes(q)&&!(e.categoria||'').toLowerCase().includes(q))return false
        }
        return true
      })
    }

    /* ---------- hero ---------- */
    const addBtn=el('button',{class:'btn brand',type:'button',onclick:()=>openModal(null)},'+ Nuova spesa')
    const hero=el('div',{class:'spe-hero'},
      el('div',{class:'spe-hero-left'},
        el('div',{class:'spe-hero-title'},'Spese'),
        el('div',{class:'spe-hero-sub'},'Controllo costi operativi e rimborsi')
      ),addBtn
    )

    /* ---------- KPI ---------- */
    const kpiGrid=el('div',{class:'spe-kpi-grid'})

    /* ---------- toolbar ---------- */
    const meseInput=el('input',{class:'input',type:'month',value:thisMonth(),onchange(e){state.mese=e.target.value;refresh()}})
    const catDrop=createDropdown({value:'',placeholder:'Categoria',options:categorie.map(c=>({value:c,label:c})),onSelect(v){state.categoria=v;refresh()},allowEmpty:true})
    const autDrop=createDropdown({value:'',placeholder:'Autista',options:(list('drivers')||[]).map(d=>({value:d.id,label:d.name||d.id})),onSelect(v){state.autista=v;refresh()},allowEmpty:true})
    const vehDrop=createDropdown({value:'',placeholder:'Veicolo',options:(list('fleet')||[]).map(v=>({value:v.id,label:v.targa||v.id})),onSelect(v){state.veicolo=v;refresh()},allowEmpty:true})
    const searchInput=el('input',{class:'input',type:'search',placeholder:'Cerca spesa\u2026',oninput(e){state.search=e.target.value.trim();refresh()}})
    const toolbar=el('div',{class:'spe-toolbar'},meseInput,catDrop,autDrop,vehDrop,searchInput)

    /* ---------- table ---------- */
    const tableWrap=el('div',{})

    /* ---------- chart ---------- */
    const chartWrap=el('div',{class:'spe-chart'})

    /* ---------- refresh ---------- */
    const refresh=()=>{
      const rows=filtered()
      const ym=state.mese||thisMonth()
      const allMonth=(list('expenses')||[]).filter(e=>inMonth(e.data,ym))
      const tot=allMonth.reduce((s,e)=>s+(+e.importo||0),0)
      const carb=allMonth.filter(e=>e.categoria==='Carburante').reduce((s,e)=>s+(+e.importo||0),0)
      const ped=allMonth.filter(e=>e.categoria==='Pedaggi').reduce((s,e)=>s+(+e.importo||0),0)
      const man=allMonth.filter(e=>e.categoria==='Manutenzione').reduce((s,e)=>s+(+e.importo||0),0)
      kpiGrid.replaceChildren(
        el('div',{class:'spe-kpi'},el('div',{class:'spe-kpi-label'},'Spese totali mese'),el('div',{class:'spe-kpi-value'},fmtMoney(tot))),
        el('div',{class:'spe-kpi'},el('div',{class:'spe-kpi-label'},'Carburante mese'),el('div',{class:'spe-kpi-value'},fmtMoney(carb))),
        el('div',{class:'spe-kpi'},el('div',{class:'spe-kpi-label'},'Pedaggi mese'),el('div',{class:'spe-kpi-value'},fmtMoney(ped))),
        el('div',{class:'spe-kpi'},el('div',{class:'spe-kpi-label'},'Manutenzione mese'),el('div',{class:'spe-kpi-value'},fmtMoney(man)))
      )
      /* table */
      const drivers=list('drivers')||[], fleet=list('fleet')||[]
      const drvName=id=>(drivers.find(d=>d.id===id)||{}).name||'-'
      const vehName=id=>{const v=fleet.find(f=>f.id===id);return v?(v.targa||v.id):'-'}
      const tbl=el('table',{class:'table'})
      const thead=el('thead',{},el('tr',{},
        el('th',{},'Data'),el('th',{},'Categoria'),el('th',{},'Descrizione'),el('th',{},'Autista'),el('th',{},'Veicolo'),el('th',{style:'text-align:right'},'Importo'),el('th',{},'Azioni')
      ))
      const tbody=el('tbody',{})
      if(!rows.length){
        tbody.append(el('tr',{},el('td',{colspan:'7',class:'empty-state'},'Nessuna spesa trovata.')))
      }else{
        rows.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).forEach(exp=>{
          const tr=el('tr',{},
            el('td',{},fmtDateDisplay(exp.data)),
            el('td',{},el('span',{class:'spe-cat-badge '+catClass(exp.categoria)},exp.categoria||'-')),
            el('td',{},exp.descrizione||'-'),
            el('td',{},drvName(exp.autista)),
            el('td',{},vehName(exp.veicolo)),
            el('td',{style:'text-align:right;font-weight:600'},fmtMoney(+exp.importo||0)),
            el('td',{},
              el('button',{class:'btn ghost',type:'button',onclick:()=>openModal(exp)},'\u270E'),
              el('button',{class:'btn ghost red',type:'button',onclick:async()=>{
                if(await askConfirm({title:'Elimina spesa',message:'Eliminare questa spesa?',confirmLabel:'Elimina',tone:'danger'})){
                  remove('expenses',exp.id);showToast({message:'Spesa eliminata',type:'success'});refresh()
                }
              }},'\u2716')
            )
          )
          tbody.append(tr)
        })
      }
      tbl.append(thead,tbody)
      tableWrap.replaceChildren(tbl)

      /* chart — last 6 months by category */
      const allExp=list('expenses')||[]
      const months=[]
      {const d=new Date();for(let i=5;i>=0;i--){const m=new Date(d.getFullYear(),d.getMonth()-i,1);months.push(m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0'))}}
      const maxVal=Math.max(1,...categorie.map(c=>months.reduce((s,ym)=>s+allExp.filter(e=>e.categoria===c&&(e.data||'').slice(0,7)===ym).reduce((a,e)=>a+(+e.importo||0),0),0)))
      chartWrap.replaceChildren(el('div',{class:'spe-chart-title'},'Spese per categoria (ultimi 6 mesi)'))
      categorie.forEach(cat=>{
        const total=months.reduce((s,ym)=>s+allExp.filter(e=>e.categoria===cat&&(e.data||'').slice(0,7)===ym).reduce((a,e)=>a+(+e.importo||0),0),0)
        if(total===0)return
        const pct=Math.round(total/maxVal*100)
        chartWrap.append(el('div',{class:'spe-bar-row'},
          el('div',{class:'spe-bar-label'},cat),
          el('div',{class:'spe-bar-track'},el('div',{class:'spe-bar-fill '+catClass(cat),style:'width:'+pct+'%'})),
          el('div',{class:'spe-bar-val'},fmtMoney(total))
        ))
      })
    }

    /* ---------- modal ---------- */
    const openModal=(existing)=>{
      const isEdit=!!existing
      const dataF=createDateField({value:existing?.data||toLocalISO(new Date()),placeholder:'Data',onChange(){}})
      const catF=createDropdown({value:existing?.categoria||'',placeholder:'Categoria',options:categorie.map(c=>({value:c,label:c})),onSelect(){}})
      const descF=el('input',{class:'input',value:existing?.descrizione||'',placeholder:'Descrizione'})
      const impF=el('input',{class:'input',type:'number',step:'0.01',value:existing?.importo||'',placeholder:'Importo \u20AC'})
      const autF=createDropdown({value:existing?.autista||'',placeholder:'Autista (opz.)',options:(list('drivers')||[]).map(d=>({value:d.id,label:d.name||d.id})),onSelect(){},allowEmpty:true})
      const vehF=createDropdown({value:existing?.veicolo||'',placeholder:'Veicolo (opz.)',options:(list('fleet')||[]).map(v=>({value:v.id,label:v.targa||v.id})),onSelect(){},allowEmpty:true})
      const body=el('div',{},
        field('Data',dataF),field('Categoria',catF),field('Descrizione',descF),field('Importo',impF),field('Autista',autF),field('Veicolo',vehF)
      )
      const save=()=>{
        const obj={
          data:dataF.value||dataF.querySelector?.('input')?.value||'',
          categoria:catF.value||catF.querySelector?.('.dropdown-value')?.textContent||'',
          descrizione:descF.value.trim(),
          importo:parseFloat(impF.value)||0,
          autista:autF.value||autF.querySelector?.('.dropdown-value')?.dataset?.value||'',
          veicolo:vehF.value||vehF.querySelector?.('.dropdown-value')?.dataset?.value||''
        }
        if(!obj.descrizione){showToast({message:'Inserisci una descrizione',type:'warning'});return}
        if(!obj.importo){showToast({message:'Inserisci un importo',type:'warning'});return}
        if(isEdit){put('expenses',existing.id,obj)}
        else{obj.id='EXP-'+crypto.randomUUID();obj.createdAt=new Date().toISOString();add('expenses',obj)}
        showToast({message:isEdit?'Spesa aggiornata':'Spesa aggiunta',type:'success'})
        refresh()
      }
      uiModalOpen({title:isEdit?'Modifica spesa':'Nuova spesa',body,footer:el('button',{class:'btn brand',type:'button',onclick:save},isEdit?'Salva':'Aggiungi'),closeOnOverlay:true})
    }

    wrap.append(hero,kpiGrid,toolbar,tableWrap,chartWrap)
    refresh()
    return wrap
  }

  /* =========================================================================
   *  NOTIFICHE
   * ========================================================================= */
  const Notifiche=()=>{
    const wrap=el('div',{class:'not-suite'})
    const stored=()=>list('notifications')||[]
    const isRead=(key)=>stored().some(n=>n.entityKey===key&&n.letta)
    const isDismissed=(key)=>stored().some(n=>n.entityKey===key&&n.dismissed)
    const markRead=(key)=>{
      const ex=stored().find(n=>n.entityKey===key)
      if(ex){put('notifications',ex.id,{letta:true})}
      else{add('notifications',{id:'NOT-'+crypto.randomUUID(),entityKey:key,letta:true})}
    }
    const dismiss=(key)=>{
      const ex=stored().find(n=>n.entityKey===key)
      if(ex){put('notifications',ex.id,{dismissed:true})}
      else{add('notifications',{id:'NOT-'+crypto.randomUUID(),entityKey:key,dismissed:true})}
    }
    const entityKey=(a)=>a.type+':'+a.title+':'+a.detail

    const refresh=()=>{
      wrap.replaceChildren()
      const alerts=buildNotifications().filter(a=>!isDismissed(entityKey(a)))
      const unread=alerts.filter(a=>!isRead(entityKey(a)))
      const urgent=alerts.filter(a=>a.severity==='high')

      /* hero */
      const markAllBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>{
        alerts.forEach(a=>markRead(entityKey(a)));refresh();updateBadge()
      }},'Segna tutte come lette')
      const delReadBtn=el('button',{class:'btn ghost red',type:'button',onclick:()=>{
        alerts.filter(a=>isRead(entityKey(a))).forEach(a=>dismiss(entityKey(a)));refresh();updateBadge()
      }},'Elimina lette')
      const hero=el('div',{class:'not-hero'},
        el('div',{class:'not-hero-left'},
          el('div',{class:'not-hero-title'},'Notifiche'),
          el('div',{class:'not-hero-sub'},'Avvisi automatici e promemoria')
        ),markAllBtn,delReadBtn
      )

      /* KPI */
      const kpi=el('div',{class:'not-kpi-grid'},
        el('div',{class:'not-kpi'},el('div',{class:'not-kpi-label'},'Non lette'),el('div',{class:'not-kpi-value'},String(unread.length))),
        el('div',{class:'not-kpi'},el('div',{class:'not-kpi-label'},'Urgenti'),el('div',{class:'not-kpi-value'},String(urgent.length))),
        el('div',{class:'not-kpi'},el('div',{class:'not-kpi-label'},'Totali'),el('div',{class:'not-kpi-value'},String(alerts.length)))
      )

      /* group by severity */
      const groups=[
        {key:'high',label:'Urgenti',color:'red'},
        {key:'medium',label:'In arrivo',color:'yellow'},
        {key:'low',label:'Info',color:'blue'}
      ]
      const content=el('div',{})
      groups.forEach(g=>{
        const items=alerts.filter(a=>a.severity===g.key)
        if(!items.length)return
        content.append(el('div',{class:'not-group-title'},g.label+' ('+items.length+')'))
        items.forEach(a=>{
          const key=entityKey(a)
          const read=isRead(key)
          const card=el('div',{class:'not-card'+(read?' read':''),onclick:()=>{
            if(!read){markRead(key);refresh();updateBadge()}
          }},
            el('div',{class:'not-dot '+g.key}),
            el('div',{class:'not-body'},
              el('div',{class:'not-title'},a.title),
              el('div',{class:'not-msg'},a.detail||''),
              el('div',{class:'not-date muted'},a.when||'')
            ),
            el('div',{class:'not-actions'},
              (()=>{const route=a.type==='invoice'?'fatture':a.type==='receivable'?'clienti':(a.type==='insurance'||a.type==='revisione'||a.type==='bollo'||a.type==='roadside'||a.type==='tachigrafo')?'flotta':a.type==='driver_doc'?'autisti':null;return route?el('button',{class:'btn ghost',style:'font-size:11px',type:'button',onclick:(ev)=>{ev.stopPropagation();markRead(key);updateBadge();window.location.hash=route}},'Vai →'):null})(),
              read?null:el('button',{class:'btn ghost',type:'button',onclick:(ev)=>{ev.stopPropagation();markRead(key);refresh();updateBadge()}},'Segna letta'),
              el('button',{class:'btn ghost red',type:'button',onclick:async(ev)=>{
                ev.stopPropagation()
                dismiss(key);refresh();updateBadge()
              }},'\u2716')
            )
          )
          content.append(card)
        })
      })
      if(!alerts.length){
        content.append(el('div',{class:'empty-state'},'Nessuna notifica.'))
      }
      wrap.append(hero,kpi,content)
    }

    const updateBadge=()=>{
      const alerts=buildNotifications().filter(a=>!isDismissed(entityKey(a)))
      const count=alerts.filter(a=>!isRead(entityKey(a))).length
      if(window._notifBadge)window._notifBadge(count)
    }

    refresh()
    return wrap
  }

  /* =========================================================================
   *  FILES
   * ========================================================================= */
  const Files=()=>{
    const wrap=el('div',{class:'fil-suite'})
    const categorie=['Contratti','Assicurazioni','Documenti veicoli','Documenti autisti','Fatture','Altro']
    const state={search:'',categoria:'',view:'grid'}
    const fmtSize=(bytes)=>{if(!bytes)return'-';if(bytes<1024)return bytes+' B';if(bytes<1048576)return(bytes/1024).toFixed(1)+' KB';return(bytes/1048576).toFixed(1)+' MB'}

    const fileIcon=(type)=>{
      if((type||'').startsWith('image/'))return '\uD83D\uDDBC\uFE0F'
      if((type||'').includes('pdf'))return '\uD83D\uDCC4'
      return '\uD83D\uDCC1'
    }

    /* ---------- hero ---------- */
    const uploadBtn=el('button',{class:'btn brand',type:'button',onclick:()=>openUpload()},'+ Carica file')
    const hero=el('div',{class:'fil-hero'},
      el('div',{class:'fil-hero-left'},
        el('div',{class:'fil-hero-title'},'File'),
        el('div',{class:'fil-hero-sub'},'Archivio documenti e allegati aziendali')
      ),uploadBtn
    )

    /* ---------- KPI ---------- */
    const kpiGrid=el('div',{class:'fil-kpi-grid'})

    /* ---------- toolbar ---------- */
    const searchInput=el('input',{class:'input',type:'search',placeholder:'Cerca file\u2026',oninput(e){state.search=e.target.value.trim().toLowerCase();refresh()}})
    const catDrop=createDropdown({value:'',placeholder:'Categoria',options:categorie.map(c=>({value:c,label:c})),onSelect(v){state.categoria=v;refresh()},allowEmpty:true})
    const toggleBtn=el('button',{class:'fil-toggle btn ghost',type:'button',onclick:()=>{state.view=state.view==='grid'?'list':'grid';toggleBtn.textContent=state.view==='grid'?'\u25A6':'\u2261';refresh()}},'\u25A6')
    const toolbar=el('div',{class:'fil-toolbar'},searchInput,catDrop,toggleBtn)

    /* ---------- content ---------- */
    const content=el('div',{})

    /* ---------- refresh ---------- */
    const refresh=()=>{
      let files=listFiles()
      if(state.search)files=files.filter(f=>(f.name||'').toLowerCase().includes(state.search)||(f.categoria||'').toLowerCase().includes(state.search))
      if(state.categoria)files=files.filter(f=>f.categoria===state.categoria)
      files.sort((a,b)=>(b.dataUpload||'').localeCompare(a.dataUpload||''))

      const now=new Date(), ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')
      const thisMonthFiles=files.filter(f=>(f.dataUpload||'').slice(0,7)===ym)
      const topCats=[...new Set(files.map(f=>f.categoria).filter(Boolean))].slice(0,3).join(', ')||'-'
      kpiGrid.replaceChildren(
        el('div',{class:'fil-kpi'},el('div',{class:'fil-kpi-label'},'File totali'),el('div',{class:'fil-kpi-value'},String(files.length))),
        el('div',{class:'fil-kpi'},el('div',{class:'fil-kpi-label'},'Caricati questo mese'),el('div',{class:'fil-kpi-value'},String(thisMonthFiles.length))),
        el('div',{class:'fil-kpi'},el('div',{class:'fil-kpi-label'},'Categorie principali'),el('div',{class:'fil-kpi-value'},topCats))
      )

      content.replaceChildren()
      if(!files.length){content.append(el('div',{class:'empty-state'},'Nessun file caricato.'));return}

      if(state.view==='grid'){
        const grid=el('div',{class:'fil-grid'})
        files.forEach(f=>{
          const card=el('div',{class:'fil-card',onclick:()=>previewFile(f)},
            el('div',{class:'fil-card-icon'},fileIcon(f.type)),
            el('div',{class:'fil-card-name'},f.name||'file'),
            el('div',{class:'fil-card-meta muted'},fmtDateDisplay(f.dataUpload))
          )
          grid.append(card)
        })
        content.append(grid)
      }else{
        const tbl=el('table',{class:'table'})
        const thead=el('thead',{},el('tr',{},el('th',{},'Nome'),el('th',{},'Categoria'),el('th',{},'Dimensione'),el('th',{},'Data'),el('th',{},'Azioni')))
        const tbody=el('tbody',{})
        files.forEach(f=>{
          tbody.append(el('tr',{},
            el('td',{style:'cursor:pointer',onclick:()=>previewFile(f)},f.name||'-'),
            el('td',{},f.categoria||'-'),
            el('td',{},fmtSize(f.size)),
            el('td',{},fmtDateDisplay(f.dataUpload)),
            el('td',{},
              el('button',{class:'btn ghost',type:'button',onclick:()=>downloadFile(f)},'\u2B07'),
              el('button',{class:'btn ghost red',type:'button',onclick:async()=>{
                if(await askConfirm({title:'Elimina file',message:'Eliminare "'+f.name+'"?',confirmLabel:'Elimina',tone:'danger'})){
                  deleteFile(f.id);showToast({message:'File eliminato',type:'success'});refresh()
                }
              }},'\u2716')
            )
          ))
        })
        tbl.append(thead,tbody)
        content.append(tbl)
      }
    }

    /* ---------- preview ---------- */
    const previewFile=(f)=>{
      if(!f.data){showToast({message:'Nessun contenuto disponibile',type:'warning'});return}
      let body
      if((f.type||'').startsWith('image/')){
        body=el('div',{style:'text-align:center'},el('img',{src:'data:'+f.type+';base64,'+f.data,style:'max-width:100%;max-height:70vh;border-radius:8px'}))
      }else if((f.type||'').includes('pdf')){
        const blob=base64ToBlob(f.data,f.type)
        const url=URL.createObjectURL(blob)
        body=el('div',{},el('iframe',{src:url,style:'width:100%;height:70vh;border:none;border-radius:8px'}))
      }else{
        body=el('div',{class:'empty-state'},'Anteprima non disponibile per questo tipo di file.')
      }
      const dlBtn=el('button',{class:'btn brand',type:'button',onclick:()=>downloadFile(f)},'Scarica')
      uiModalOpen({title:f.name||'File',body,footer:dlBtn,closeOnOverlay:true})
    }

    /* ---------- download ---------- */
    const downloadFile=(f)=>{
      if(!f.data){showToast({message:'Nessun dato',type:'warning'});return}
      downloadBase64File({base64:f.data,name:f.name||'file',type:f.type||'application/octet-stream'})
    }

    /* ---------- upload modal ---------- */
    const openUpload=()=>{
      const picker=el('input',{type:'file',class:'input'})
      const nameF=el('input',{class:'input',placeholder:'Nome file'})
      const catF=createDropdown({value:'',placeholder:'Categoria',options:categorie.map(c=>({value:c,label:c})),onSelect(){}})
      const noteF=el('input',{class:'input',placeholder:'Note (opz.)'})
      const warn=el('div',{class:'muted',style:'margin-top:4px'})
      picker.addEventListener('change',()=>{
        const f=picker.files[0]
        if(f){
          nameF.value=nameF.value||f.name
          if(f.size>2*1048576)warn.textContent='\u26A0 Il file supera 2 MB, potrebbe rallentare il salvataggio.'
          else warn.textContent=''
        }
      })
      const body=el('div',{},field('File',picker),warn,field('Nome',nameF),field('Categoria',catF),field('Note',noteF))
      const save=async()=>{
        const f=picker.files[0]
        if(!f){showToast({message:'Seleziona un file',type:'warning'});return}
        const base64=await fileToBase64(f)
        const obj={
          id:'FILE-'+crypto.randomUUID(),
          name:nameF.value.trim()||f.name,
          type:f.type,
          categoria:catF.value||catF.querySelector?.('.dropdown-value')?.textContent||'Altro',
          size:f.size,
          dataUpload:toLocalISO(new Date()),
          uploadedBy:me()?.name||me()?.username||'',
          data:base64,
          note:noteF.value.trim()
        }
        saveFile(obj)
        showToast({message:'File caricato',type:'success'})
        refresh()
      }
      uiModalOpen({title:'Carica file',body,footer:el('button',{class:'btn brand',type:'button',onclick:save},'Carica'),closeOnOverlay:true})
    }

    wrap.append(hero,kpiGrid,toolbar,content)
    refresh()
    return wrap
  }


  const Report=()=>{
    const wrap=el('div',{class:'rep-suite'})
    const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']
    let currentYear=new Date().getFullYear()
    const BRAND='#ff1744'
    const GREEN='#16a34a'
    const RED='#dc2626'

    /* -- data helpers -- */
    const trips=()=>(list('trips')||[])
    const completedTrips=()=>trips().filter(t=>t.stato==='Completato')
    const invoicesData=()=>(list('invoices')||[])
    const expensesData=()=>(list('expenses')||[])
    const fleetData=()=>(list('fleet')||[])
    const driversData=()=>(list('drivers')||[])
    const customersData=()=>(list('customers')||[])

    const parseDate=(d)=>{if(!d)return null;return new Date(String(d).includes('T')?d:d+'T00:00:00')}
    const tripYear=(t)=>{const dt=parseDate(t.dataScarico||t.dataCarico);return dt?dt.getFullYear():null}
    const tripMonth=(t)=>{const dt=parseDate(t.dataScarico||t.dataCarico);return dt?dt.getMonth():null}
    const expYear=(e)=>{const dt=parseDate(e.data);return dt?dt.getFullYear():null}
    const expMonth=(e)=>{const dt=parseDate(e.data);return dt?dt.getMonth():null}

    const yearTrips=()=>completedTrips().filter(t=>tripYear(t)===currentYear)
    const yearExpenses=()=>expensesData().filter(e=>expYear(e)===currentYear)

    const csvFromTable=(headers,rows)=>{
      const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`
      const lines=[headers.map(esc).join(',')]
      rows.forEach(r=>lines.push(headers.map((_,i)=>esc(r[i])).join(',')))
      return lines.join('\n')
    }

    /* -- hero -- */
    const yearLabel=el('span',{class:'rep-year-label'},String(currentYear))
    const prevBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>{currentYear--;render()}},'<')
    const nextBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>{currentYear++;render()}},'>')
    const yearNav=el('div',{class:'rep-year-nav'},prevBtn,yearLabel,nextBtn)

    const hero=el('div',{class:'rep-hero'},
      el('div',{class:'rep-hero-left'},
        el('div',{class:'rep-hero-title'},'Report'),
        el('div',{class:'rep-hero-sub'},'Analisi operative e finanziarie')
      ),
      yearNav
    )

    /* -- containers -- */
    const kpiGrid=el('div',{class:'rep-kpi-grid'})
    const chartsWrap=el('div',{class:'rep-charts'})
    const tablesWrap=el('div',{class:'rep-tables'})

    /* -- SVG chart builders -- */
    const svgNS='http://www.w3.org/2000/svg'
    const mkSvg=(vb)=>{const s=document.createElementNS(svgNS,'svg');s.setAttribute('viewBox',vb);s.setAttribute('preserveAspectRatio','xMidYMid meet');s.style.width='100%';s.style.height='auto';return s}
    const svgEl=(tag,attrs={})=>{const e=document.createElementNS(svgNS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,String(v)));return e}

    const buildVerticalBars=(data,color,chartLabel)=>{
      const card=el('div',{class:'rep-chart-card'})
      card.append(el('div',{class:'rep-chart-title'},chartLabel))
      const W=600,H=300,PAD=50,BAR_GAP=8
      const max=Math.max(...data,1)
      const svg=mkSvg('0 0 '+W+' '+H)
      svg.classList.add('rep-chart-svg')
      const barW=(W-PAD*2-BAR_GAP*11)/12
      const tooltip=svgEl('text',{x:0,y:0,'font-size':'12',fill:'#333','text-anchor':'middle',visibility:'hidden'})
      data.forEach((val,i)=>{
        const x=PAD+i*(barW+BAR_GAP)
        const barH=max>0?(val/max)*(H-PAD*2):0
        const y=H-PAD-barH
        const rect=svgEl('rect',{x:x,y:y,width:barW,height:Math.max(barH,1),fill:color,rx:3})
        rect.addEventListener('mouseover',()=>{tooltip.textContent=typeof val==='number'&&val>999?fmtMoney(val):String(val);tooltip.setAttribute('x',String(x+barW/2));tooltip.setAttribute('y',String(y-8));tooltip.setAttribute('visibility','visible')})
        rect.addEventListener('mouseout',()=>{tooltip.setAttribute('visibility','hidden')})
        svg.append(rect)
        const lbl=svgEl('text',{x:x+barW/2,y:H-PAD+16,'font-size':'10','text-anchor':'middle',fill:'#666'})
        lbl.textContent=MONTHS_IT[i].slice(0,3)
        svg.append(lbl)
      })
      for(let i=0;i<=4;i++){
        const val=max*i/4
        const y=H-PAD-(i/4)*(H-PAD*2)
        const t=svgEl('text',{x:PAD-6,y:y+4,'font-size':'10','text-anchor':'end',fill:'#999'})
        t.textContent=val>=1000?(val/1000).toFixed(0)+'k':val.toFixed(0)
        svg.append(t)
        if(i>0){svg.append(svgEl('line',{x1:PAD,y1:y,x2:W-PAD,y2:y,stroke:'#e5e7eb','stroke-dasharray':'4'}))}
      }
      svg.append(tooltip)
      card.append(svg)
      return card
    }

    const buildHorizontalBars=(entries,chartLabel)=>{
      const card=el('div',{class:'rep-chart-card'})
      card.append(el('div',{class:'rep-chart-title'},chartLabel))
      if(!entries.length){card.append(el('div',{style:'padding:20px;color:var(--muted);text-align:center'},'Nessun dato'));return card}
      const max=Math.max(...entries.map(e=>e.value),1)
      const ROW_H=32,PAD_L=140,PAD_R=60,W=600
      const H=PAD_R+entries.length*ROW_H
      const svg=mkSvg('0 0 '+W+' '+H)
      svg.classList.add('rep-chart-svg')
      entries.forEach((entry,i)=>{
        const y=10+i*ROW_H
        const barW=max>0?(entry.value/max)*(W-PAD_L-PAD_R):0
        const lbl=svgEl('text',{x:PAD_L-8,y:y+ROW_H/2+4,'font-size':'12','text-anchor':'end',fill:'#333'})
        lbl.textContent=entry.label.length>18?entry.label.slice(0,18)+'...':entry.label
        svg.append(lbl)
        svg.append(svgEl('rect',{x:PAD_L,y:y+4,width:Math.max(barW,2),height:ROW_H-10,fill:BRAND,rx:3}))
        const valTxt=svgEl('text',{x:PAD_L+barW+6,y:y+ROW_H/2+4,'font-size':'11',fill:'#666'})
        valTxt.textContent=fmtMoney(entry.value)
        svg.append(valTxt)
      })
      card.append(svg)
      return card
    }

    const buildLineChart=(data,chartLabel)=>{
      const card=el('div',{class:'rep-chart-card'})
      card.append(el('div',{class:'rep-chart-title'},chartLabel))
      const W=600,H=300,PAD=50
      const max=Math.max(...data.map(Math.abs),1)
      const svg=mkSvg('0 0 '+W+' '+H)
      svg.classList.add('rep-chart-svg')
      const midY=H/2
      const scaleY=(v)=>midY-(v/max)*(midY-PAD)
      svg.append(svgEl('line',{x1:PAD,y1:midY,x2:W-PAD,y2:midY,stroke:'#cbd5e1','stroke-width':'1'}))
      const stepX=(W-PAD*2)/11
      let pathD=''
      const tooltip=svgEl('text',{x:0,y:0,'font-size':'12',fill:'#333','text-anchor':'middle',visibility:'hidden'})
      data.forEach((val,i)=>{
        const x=PAD+i*stepX
        const y=scaleY(val)
        pathD+=(i===0?'M':'L')+x+','+y
        const dotColor=val>=0?GREEN:RED
        const dot=svgEl('circle',{cx:x,cy:y,r:5,fill:dotColor,stroke:'#fff','stroke-width':'2',style:'cursor:pointer'})
        dot.addEventListener('mouseover',()=>{tooltip.textContent=fmtMoney(val);tooltip.setAttribute('x',String(x));tooltip.setAttribute('y',String(y-14));tooltip.setAttribute('visibility','visible')})
        dot.addEventListener('mouseout',()=>{tooltip.setAttribute('visibility','hidden')})
        svg.append(dot)
        const lbl=svgEl('text',{x:x,y:H-PAD+16,'font-size':'10','text-anchor':'middle',fill:'#666'})
        lbl.textContent=MONTHS_IT[i].slice(0,3)
        svg.append(lbl)
      })
      const pathLine=svgEl('path',{d:pathD,fill:'none',stroke:BRAND,'stroke-width':'2'})
      svg.prepend(pathLine)
      for(let i=-2;i<=2;i++){
        const val=max*i/2
        const y=scaleY(val)
        const t=svgEl('text',{x:PAD-6,y:y+4,'font-size':'10','text-anchor':'end',fill:'#999'})
        t.textContent=val>=1000||val<=-1000?(val/1000).toFixed(0)+'k':val.toFixed(0)
        svg.append(t)
      }
      svg.append(tooltip)
      card.append(svg)
      return card
    }

    /* -- tab state for analytical tables -- */
    let activeTab='clienti'

    /* -- render -- */
    const render=()=>{
      yearLabel.textContent=String(currentYear)
      const yt=yearTrips()
      const ye=yearExpenses()
      const curMonth=new Date().getMonth()

      const fattAnno=yt.reduce((s,t)=>s+estimateTripRevenue(t),0)
      const fattMese=yt.filter(t=>tripMonth(t)===curMonth).reduce((s,t)=>s+estimateTripRevenue(t),0)
      const viaggiAnno=yt.length
      const speseAnno=ye.reduce((s,e)=>s+Number(e.importo||0),0)
      const margineAnno=fattAnno-speseAnno
      const kmAnno=fleetData().reduce((s,f)=>s+Number(f.km||0),0)

      kpiGrid.replaceChildren(
        el('div',{class:'rep-kpi'},el('div',{class:'rep-kpi-label'},'Fatturato anno'),el('div',{class:'rep-kpi-value'},fmtMoney(fattAnno))),
        el('div',{class:'rep-kpi'},el('div',{class:'rep-kpi-label'},'Fatturato mese corrente'),el('div',{class:'rep-kpi-value'},fmtMoney(fattMese))),
        el('div',{class:'rep-kpi'},el('div',{class:'rep-kpi-label'},'Viaggi anno'),el('div',{class:'rep-kpi-value'},viaggiAnno.toLocaleString('it-IT'))),
        el('div',{class:'rep-kpi'},el('div',{class:'rep-kpi-label'},'Margine anno'),el('div',{class:'rep-kpi-value',style:margineAnno>=0?'color:'+GREEN:'color:'+RED},fmtMoney(margineAnno))),
        el('div',{class:'rep-kpi'},el('div',{class:'rep-kpi-label'},'Spese anno'),el('div',{class:'rep-kpi-value'},fmtMoney(speseAnno))),
        el('div',{class:'rep-kpi'},el('div',{class:'rep-kpi-label'},'Km anno (flotta)'),el('div',{class:'rep-kpi-value'},kmAnno.toLocaleString('it-IT')+' km'))
      )

      /* -- charts data -- */
      const monthlyRev=Array(12).fill(0)
      yt.forEach(t=>{const m=tripMonth(t);if(m!=null) monthlyRev[m]+=estimateTripRevenue(t)})

      const monthlyTrips=Array(12).fill(0)
      yt.forEach(t=>{const m=tripMonth(t);if(m!=null) monthlyTrips[m]++})

      const catMap={}
      ye.forEach(e=>{const c=e.categoria||'Altro';catMap[c]=(catMap[c]||0)+Number(e.importo||0)})
      const catEntries=Object.entries(catMap).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,10)

      const monthlyExp=Array(12).fill(0)
      ye.forEach(e=>{const m=expMonth(e);if(m!=null) monthlyExp[m]+=Number(e.importo||0)})
      const monthlyMargin=monthlyRev.map((r,i)=>r-monthlyExp[i])

      chartsWrap.replaceChildren(
        buildVerticalBars(monthlyRev,BRAND,'Fatturato mensile'),
        buildVerticalBars(monthlyTrips,GREEN,'Viaggi per mese'),
        buildHorizontalBars(catEntries,'Spese per categoria'),
        buildLineChart(monthlyMargin,'Margine mensile')
      )

      /* -- analytical tables -- */
      const tabStrip=el('div',{style:'display:flex;gap:4px;margin-bottom:16px'})
      const tableArea=el('div')
      let currentHeaders=[]
      let currentRows=[]

      const renderTable=()=>{
        if(activeTab==='clienti'){
          const cMap={}
          yt.forEach(t=>{
            const c=t.cliente||'Sconosciuto'
            if(!cMap[c]) cMap[c]={viaggi:0,fatturato:0}
            cMap[c].viaggi++
            cMap[c].fatturato+=estimateTripRevenue(t)
          })
          const totFatt=Object.values(cMap).reduce((s,v)=>s+v.fatturato,0)||1
          const sorted=Object.entries(cMap).sort((a,b)=>b[1].fatturato-a[1].fatturato)
          currentHeaders=['Cliente','Viaggi','Fatturato','% del totale']
          currentRows=sorted.map(([name,v])=>[name,v.viaggi,fmtMoney(v.fatturato),(v.fatturato/totFatt*100).toFixed(1)+'%'])
          const tbl=el('table',{class:'table'})
          tbl.append(el('thead',{},el('tr',{},...currentHeaders.map(h=>el('th',{},h)))))
          const tbody=el('tbody')
          currentRows.forEach(r=>tbody.append(el('tr',{},...r.map(c=>el('td',{},String(c))))))
          if(!currentRows.length) tbody.append(el('tr',{},el('td',{colspan:'4',style:'text-align:center;padding:20px;color:var(--muted)'},'Nessun dato')))
          tbl.append(tbody)
          tableArea.replaceChildren(tbl)
        } else if(activeTab==='autisti'){
          const aMap={}
          yt.forEach(t=>{
            const a=t.autista||'Sconosciuto'
            if(!aMap[a]) aMap[a]={viaggi:0,km:0,fatturato:0}
            aMap[a].viaggi++
            aMap[a].km+=Number(t.km||0)
            aMap[a].fatturato+=estimateTripRevenue(t)
          })
          const drvList=driversData()
          const drvName=(id)=>{const d=drvList.find(x=>x.id===id);return d?.name||id||'-'}
          const sorted=Object.entries(aMap).sort((a,b)=>b[1].fatturato-a[1].fatturato)
          currentHeaders=['Autista','Viaggi','Km','Fatturato generato']
          currentRows=sorted.map(([id,v])=>[drvName(id),v.viaggi,v.km.toLocaleString('it-IT'),fmtMoney(v.fatturato)])
          const tbl=el('table',{class:'table'})
          tbl.append(el('thead',{},el('tr',{},...currentHeaders.map(h=>el('th',{},h)))))
          const tbody=el('tbody')
          currentRows.forEach(r=>tbody.append(el('tr',{},...r.map(c=>el('td',{},String(c))))))
          if(!currentRows.length) tbody.append(el('tr',{},el('td',{colspan:'4',style:'text-align:center;padding:20px;color:var(--muted)'},'Nessun dato')))
          tbl.append(tbody)
          tableArea.replaceChildren(tbl)
        } else {
          currentHeaders=['Mese','Fatturato','Spese','Margine','Viaggi']
          currentRows=MONTHS_IT.map((name,i)=>{
            const rev=monthlyRev[i]
            const exp=monthlyExp[i]
            return [name,fmtMoney(rev),fmtMoney(exp),fmtMoney(rev-exp),monthlyTrips[i]]
          })
          const tbl=el('table',{class:'table'})
          tbl.append(el('thead',{},el('tr',{},...currentHeaders.map(h=>el('th',{},h)))))
          const tbody=el('tbody')
          currentRows.forEach(r=>tbody.append(el('tr',{},...r.map(c=>el('td',{},String(c))))))
          tbl.append(tbody)
          tableArea.replaceChildren(tbl)
        }
      }

      const tabs=[
        {id:'clienti',label:'Top Clienti'},
        {id:'autisti',label:'Top Autisti'},
        {id:'mensile',label:'Dettaglio mensile'}
      ]
      tabs.forEach(t=>{
        const btn=el('button',{class:'btn '+(activeTab===t.id?'brand':'ghost'),type:'button',onclick:()=>{activeTab=t.id;render()}},t.label)
        tabStrip.append(btn)
      })

      const exportCsvBtn=el('button',{class:'btn ghost',type:'button',style:'margin-left:auto',onclick:()=>{
        if(!currentRows.length){showToast({message:'Nessun dato da esportare',type:'error'});return}
        const csv=csvFromTable(currentHeaders,currentRows)
        const stamp=new Date().toISOString().slice(0,10)
        blobDownload(new Blob([csv],{type:'text/csv;charset=utf-8;'}),'report-'+activeTab+'-'+stamp+'.csv')
        showToast({message:'CSV esportato',type:'success'})
      }},'Esporta CSV')

      _ddCleanup.forEach(fn=>fn());_ddCleanup.length=0
    }
    const _ddCleanup=[]
    const openDropdown=(panel,toggleBtn)=>{
      const already=document.body.contains(panel.parentElement?panel:null)||document.querySelector('.'+panel.className.split(' ')[0])
      closeAllDropdowns()
      if(already) return
      ;(toggleBtn.closest('.app-year-wrap')||toggleBtn.closest('.app-avatar-wrap')||document.body).append(panel)
      const handler=(e)=>{if(!panel.contains(e.target)&&!toggleBtn.contains(e.target)){closeAllDropdowns()}}
      document.addEventListener('mousedown',handler)
      _ddCleanup.push(()=>document.removeEventListener('mousedown',handler))
    }

    /* ── notification bell ── */
    const _getNotifs=()=>{
      const alerts=buildNotifications()
      const stored=list('notifications')||[]
      const isDismissed=(key)=>stored.some(n=>n.entityKey===key&&n.dismissed)
      const isRead=(key)=>stored.some(n=>n.entityKey===key&&n.letta)
      const entityKey=(a)=>a.type+':'+a.title+':'+a.detail
      const active=alerts.filter(a=>!isDismissed(entityKey(a)))
      const unread=active.filter(a=>!isRead(entityKey(a)))
      return unread
    }

      } else {
        items.slice(0,15).forEach(n=>{
          const sevColor=n.severity==='high'?'#dc2626':n.severity==='medium'?'#d97706':n.severity==='low'?'#16a34a':'#6b7280'
          const row=el('div',{class:'notif-dropdown-item'})

      }
      panel.append(head,body)

        dd.append(opt)

      const logoutItem=el('div',{class:'app-profile-item danger'})

    /* ── HAMBURGER / SIDEBAR DRAWER ── */

    document.addEventListener('keydown',(e)=>{if(e.key==='Escape') closeSidebar()})
    const hamburger=el('button',{class:'app-hamburger','aria-label':'Apri menu'})
    hamburger.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>'
    hamburger.onclick=()=>sidebar.classList.contains('sidebar-open')?closeSidebar():openSidebar()

    /* flat navigation list */
    const NAV_ORDER=['dashboard','viaggi','fatture','flotta','autisti','clienti','spese','paghe','report','notifiche','file','sicurezza']

    /* caret arrow helper */
    const makeCaret=(visible)=>{
      const wrap=el('span',{class:'nav-caret'+(visible?'':' hidden')})
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg')
      svg.setAttribute('viewBox','0 0 256 512')
      const path=document.createElementNS('http://www.w3.org/2000/svg','path')
      path.setAttribute('fill','currentColor')
      path.setAttribute('d','M246.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-128-128c-9.2-9.2-22.9-11.9-34.9-6.9s-19.8 16.6-19.8 29.6l0 256c0 12.9 7.8 24.6 19.8 29.6s25.7 2.2 34.9-6.9l128-128z')
      svg.appendChild(path)

    NAV_ORDER.forEach(id=>{
      const item=routeMap[id]
      if(!item) return
      if(item.perm&&!hasPermission(user,item.perm)) return
      const isExpandable=EXPANDABLE.has(item.id)
      const caret=makeCaret(isExpandable)

      const link=el('a',{

          if(isExpandable){

              caret.classList.remove('open')
              link.classList.remove('expanded')
            } else {

            navigateTo(item.id)

      }, caret, icon(item.icon), el('span',{},displayLabel))

      nav.append(link)

      /* fatture sub-items */

    /* sidebar footer */

    shell.append(header,body)

  const showToast=({message='',type='info',duration=3500}={})=>{
    let container=document.getElementById('toast-container')
    if(!container){
      container=el('div',{id:'toast-container',class:'toast-container'})
      document.body.append(container)
    }
    const iconMap={success:'✓',error:'✕',warning:'⚠',info:'ℹ'}
    const toast=el('div',{class:`toast toast-${type}`})
    const closeBtn=el('button',{class:'toast-close',type:'button','aria-label':'Chiudi'},'✕')
    toast.append(
      el('span',{class:'toast-icon'},iconMap[type]||'ℹ'),
      el('div',{class:'toast-message'},message),
      closeBtn
    )
    container.append(toast)
    requestAnimationFrame(()=>toast.classList.add('toast-enter'))
    const dismiss=()=>{
      clearTimeout(timer)
      toast.classList.remove('toast-enter')
      toast.classList.add('toast-exit')
      setTimeout(()=>{
        toast.remove()
        if(container&&!container.hasChildNodes()) container.remove()
      },260)
    }
    closeBtn.onclick=dismiss
    const timer=setTimeout(dismiss,duration)
  }

  function renderLogin(){
    document.title='Portale Operativo Trasporti'
    const shell=el('div',{class:'ln-shell'})

    /* logo — outside card, large, centered */
    const logoWrap=el('div',{class:'ln-logo-wrap'},
      el('img',{src:LOGO_WHITE,alt:'UNITRANS',class:'ln-logo'})
    )

    /* card */
    const card=el('div',{class:'ln-card'})

    /* inputs */
    const userInput=el('input',{class:'ln-input',type:'text',autocomplete:'username'})
    const passInput=el('input',{class:'ln-input ln-input-pass',type:'password',autocomplete:'current-password'})

    /* step 1 — username */
    const title1=el('h2',{class:'ln-title'},'Accedi')
    const step1=el('div',{class:'ln-step'})
    const fb1=el('div',{class:'ln-feedback'})
    const continueBtn=el('button',{class:'ln-btn',type:'button'},'Continua')
    step1.append(
      title1,
      el('label',{class:'ln-label'},'Nome utente'),
      userInput,
      continueBtn,
      fb1
    )

    /* step 2 — password (Fatture in Cloud style) */
    const title2=el('h2',{class:'ln-title'},'Bentornato!')
    const identitySub=el('div',{class:'ln-subtitle2'})
    const step2=el('div',{class:'ln-step',style:'display:none'})
    const fb2=el('div',{class:'ln-feedback'})

    /* eye toggle inside input */
    const eyeSvgShow='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 100 6 3 3 0 000-6z'
    const eyeSvgHide='M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22'
    const passWrap=el('div',{class:'ln-input-wrap'})
    const passToggle=el('button',{type:'button',class:'ln-eye-btn','aria-label':'Mostra password'})
    const eyeIcon=icon(eyeSvgShow)
    passToggle.append(eyeIcon)
    passToggle.onclick=()=>{
      const isText=passInput.type==='text'
      passInput.type=isText?'password':'text'
      passToggle.setAttribute('aria-label',isText?'Mostra password':'Nascondi password')
      eyeIcon.querySelector('path').setAttribute('d',isText?eyeSvgShow:eyeSvgHide)
    }
    passWrap.append(passInput,passToggle)

    const submitBtn=el('button',{class:'ln-btn',type:'button'},'Accedi')
    const backBtn=el('button',{class:'ln-btn ln-btn-back',type:'button'},'Indietro')

    step2.append(
      title2,
      identitySub,
      el('label',{class:'ln-label'},'Password'),
      passWrap,
      submitBtn,
      backBtn,
      fb2
    )

    const footer=el('div',{class:'ln-footer'},`\u00a9 ${new Date().getFullYear()} UNITRANS S.R.L.`)

    /* ── step transitions ── */
    let savedIdentity=''

    const goToStep2=()=>{
      fb1.textContent=''
      const val=userInput.value.trim()
      if(!val){fb1.textContent='Inserisci il nome utente';userInput.focus();return}
      savedIdentity=val
      identitySub.textContent=`Accedi a ${val}`
      step1.style.display='none'
      step2.style.display='block'
      passInput.value=''
      passInput.type='password'
      eyeIcon.querySelector('path').setAttribute('d',eyeSvgShow)
      fb2.textContent=''
      setTimeout(()=>passInput.focus(),50)
    }

    const goToStep1=()=>{
      step2.style.display='none'
      step1.style.display='block'
      userInput.value=''
      fb1.textContent=''
      setTimeout(()=>userInput.focus(),50)
    }

    const attemptLogin=()=>{
      fb2.textContent=''
      const pwd=passInput.value
      if(!pwd){fb2.textContent='Inserisci la password';passInput.focus();return}
      submitBtn.disabled=true;submitBtn.textContent='Verifica in corso...'
      setTimeout(()=>{
        const res=login(savedIdentity,pwd)
        if(!res.ok){
          submitBtn.disabled=false;submitBtn.textContent='Accedi'
          fb2.textContent=res.reason==='disabled'?'Account disabilitato. Contatta l\u2019amministratore.':'Credenziali non valide. Riprova.'
          passInput.value='';passInput.focus()
          return
        }
        submitBtn.textContent='Accesso effettuato'
        showWelcomeSplash(res.user||me())
      },260)
    }

    continueBtn.onclick=goToStep2
    backBtn.onclick=goToStep1
    submitBtn.onclick=attemptLogin
    userInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();goToStep2()}})
    passInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();attemptLogin()}})

    /* assemble */
    const stepsWrap=el('div',{class:'ln-steps'},step1,step2)
    card.append(stepsWrap)
    shell.append(logoWrap,card,footer)
    app.replaceChildren(shell)
    setTimeout(()=>userInput.focus(),50)
  }

  function showWelcomeSplash(user){
    const overlay=el('div',{class:'lg2-welcome-screen'})
    const logoEl=el('img',{src:LOGO_WHITE,alt:'UNITRANS',class:'lg2-welcome-logo'})
    const greeting=el('h2',{class:'lg2-welcome-title',style:'animation:lg2FadeUp .4s ease .2s both;opacity:0'},
      `${user?.gender==='female'?'Benvenuta':'Benvenuto'}, ${user?.name||user?.username||''}!`)
    const verBadge=el('span',{class:'lg2-welcome-badge',style:'animation:lg2FadeUp .4s ease .35s both;opacity:0'},'✓ Accesso verificato')
    const note=el('small',{class:'lg2-welcome-note',style:'animation:lg2FadeUp .4s ease .45s both;opacity:0'},'Caricamento in corso…')
    overlay.append(logoEl,el('div',{style:'height:24px'}),greeting,verBadge,note)
    app.replaceChildren(overlay)

    setTimeout(()=>{
      overlay.style.transition='opacity .3s ease'
