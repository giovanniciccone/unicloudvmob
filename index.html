  .ops-suite{display:grid;gap:14px}

  .ops-panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}

  .ops-list-item.active{border-color:rgba(var(--brand-rgb),.45);background:var(--brand-light);box-shadow:none}

  .ops-report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}

  .ops-preview{border:1px solid var(--border);border-radius:14px;background:var(--surface);padding:10px;overflow:auto}

  .inline-errors{

  /* ── DASHBOARD ── */
  .dboard-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:4px}

  /* ── VIAGGI ── */

  .vg-kpi-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .14s ease}

  .vgd-cliente{font-family:var(--font-display);font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .vgd-body{flex:1;overflow-y:auto;padding:16px 20px;display:grid;gap:16px;align-content:start}
  .vgd-section{display:grid;gap:10px}
  .vgd-slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding-bottom:5px;border-bottom:1px solid var(--border)}
  .vgd-percorso{display:grid;grid-template-columns:1fr auto 1fr;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}

  .vgd-p-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
  .vgd-p-main{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vgd-p-sub{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vgd-p-date{font-size:12px;color:var(--brand-2);font-weight:500}
  .vgd-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .vgd-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;display:grid;gap:3px}
  .vgd-clabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .vgd-cval{font-size:13px;font-weight:600;color:var(--text)}
  .vgd-spills{display:flex;gap:7px;flex-wrap:wrap}
  .vgd-spill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .13s ease}
  .vgd-spill:hover{border-color:rgba(var(--brand-rgb),.3);background:var(--brand-light)}
  .vgd-spill.active{border-color:rgba(var(--brand-rgb),.45);background:var(--brand-light);color:#fff;font-weight:600}
  .vgd-note{width:100%;min-height:76px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:inherit;font:inherit;font-size:13px;resize:vertical;transition:border .15s ease,box-shadow .15s ease;box-sizing:border-box}
  .vgd-note:focus{outline:none;border-color:rgba(var(--brand-rgb),.45);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.18)}
  .vgd-saved{font-size:11px;color:#22c55e;opacity:0;transition:opacity .3s ease;margin-top:3px;display:block}
  .vgd-saved.vis{opacity:1}
  .vgd-docs{display:grid;gap:6px}
  .vgd-att{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);transition:border-color .12s ease}
  .vgd-att:hover{border-color:var(--border)}
  .vgd-att-info{flex:1;min-width:0}
  .vgd-att-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vgd-att-meta{font-size:11px;color:var(--muted)}
  .vgd-ftr{flex:0 0 auto;padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface)}
  @media(max-width:600px){.vgd-drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:100vw;background:var(--surface);border-left:1px solid var(--border);z-index:1500;display:flex;flex-direction:column;transform:translateX(100%);box-shadow:var(--shadow-lg)}.vgd-grid2{grid-template-columns:1fr}}
  @media(max-width:1000px){.vg-exp-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:700px){.vg-exp-grid{grid-template-columns:1fr}}

  /* ── WIZARD VIAGGIO ── */
  .wiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1600;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
  .wiz-card{width:100%;max-width:740px;max-height:90vh;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
  .wiz-hdr{padding:20px 28px 0;flex:0 0 auto}
  .wiz-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:3px}
  .wiz-step-info{font-size:13px;color:var(--muted);margin-bottom:14px}
  .wiz-progress-bar{height:3px;background:var(--bg-secondary);border-radius:999px;overflow:hidden;margin-bottom:0}
  .wiz-progress-fill{height:100%;background:var(--brand);border-radius:999px;transition:width .3s ease}
  .wiz-body{flex:1;overflow-y:auto;padding:24px 28px;display:grid;gap:0;align-content:start}
  .wiz-body .step-wrap{display:grid;gap:18px}
  .wiz-err{padding:0 28px;flex:0 0 auto}
  .wiz-err-list{display:grid;gap:4px;padding:10px 14px;background:var(--red-bg);border:1px solid rgba(239,68,68,.3);border-radius:10px;margin-bottom:8px}
  .wiz-err-item{font-size:12px;color:var(--red)}
  .wiz-ftr{padding:14px 28px;border-top:1px solid var(--border);flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .wiz-ftr-l{display:flex;gap:8px;align-items:center}
  .wiz-ftr-r{display:flex;gap:8px;align-items:center}
  .wiz-sm{padding:6px 12px;font-size:12px;border-radius:8px}
  .wiz-field{display:grid;gap:5px}
  .wiz-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .wiz-hint{font-size:11px;color:var(--muted)}
  .wiz-route-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .wiz-route-col{display:grid;gap:14px}
  .wiz-route-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--brand);padding-bottom:8px;border-bottom:1px solid rgba(var(--brand-rgb),.2)}
  .wiz-2col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .wiz-2col > div{display:grid;gap:14px;align-content:start}
  .wiz-peso-row{display:flex;gap:8px;align-items:stretch}
  .wiz-peso-row .input{flex:1}
  .wiz-peso-row .dropdown{flex:0 0 80px}
  .wiz-importo-box{padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;justify-content:space-between;align-items:center}
  .wiz-importo-label{font-size:12px;color:var(--muted)}
  .wiz-importo-val{font-size:18px;font-weight:700;font-family:var(--font-display);color:var(--text)}
  .wiz-ac-wrap{position:relative}
  .wiz-ac-panel{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;z-index:500;box-shadow:var(--shadow-lg);display:none}
  .wiz-ac-panel.open{display:block}
  .wiz-ac-item{padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .1s ease}
  .wiz-ac-item:hover{background:var(--bg-secondary)}
  .wiz-ac-main{font-size:13px;font-weight:500;color:var(--text)}
  .wiz-ac-sub{font-size:11px;color:var(--muted);margin-top:1px}
  .wiz-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .wiz-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .wiz-sum-card-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface)}
  .wiz-sum-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .wiz-sum-card-body{padding:12px 14px;display:grid;gap:7px}
  .wiz-sum-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;font-size:13px}
  .wiz-sum-lbl{color:var(--muted);font-size:12px;flex-shrink:0}
  .wiz-sum-val{font-weight:500;text-align:right;overflow:hidden;text-overflow:ellipsis}
  .wiz-missing{padding:12px 16px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;margin-top:4px}
  .wiz-missing-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:3px}
  .wiz-missing-list{font-size:12px;color:var(--orange)}
  @media(max-width:640px){.wiz-card{width:100%;max-width:740px;max-height:90vh;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}.wiz-route-grid,.wiz-2col,.wiz-summary-grid{grid-template-columns:1fr}.wiz-hdr,.wiz-body,.wiz-err,.wiz-ftr{padding-left:16px;padding-right:16px}}

  /* ========== CLIENTI ========== */
  .cli-suite{display:grid;gap:16px}
  .cli-hero{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .cli-hero-left{display:grid;gap:4px}
  .cli-hero-title{font-family:var(--font-display);font-size:24px;font-weight:800;margin:0}
  .cli-hero-sub{color:var(--muted);font-size:13px;margin:0}
  .cli-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .cli-kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;display:grid;gap:4px}
  .cli-kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .cli-kpi-value{font-size:24px;font-weight:800;font-family:var(--font-display);line-height:1}
  .cli-split{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
  .cli-list{display:grid;gap:8px;max-height:70vh;overflow-y:auto;padding-right:4px}
  .cli-list-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:border-color .15s;display:flex;gap:12px;align-items:center}
  .cli-list-card:hover{border-color:rgba(var(--brand-rgb),.3)}
  .cli-list-card.active{border-color:rgba(var(--brand-rgb),.45);background:var(--brand-light)}
  .cli-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
  .cli-list-info{flex:1;display:grid;gap:2px;min-width:0}
  .cli-list-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cli-list-sub{font-size:12px;color:var(--muted)}
  .cli-detail{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:grid;gap:16px;max-height:70vh;overflow-y:auto}
  .cli-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px}
  .cli-tab{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s}
  .cli-tab:hover{color:var(--text)}
  .cli-tab.active{background:var(--brand);color:#fff}
  @media(max-width:1100px){.cli-split{grid-template-columns:1fr}.cli-list{max-height:none}}

  /* ========== FATTURE ========== */
  .fat-suite{display:flex;flex-direction:column;gap:0}

  /* ── FIC MONTHLY BAR ── */
  .fic-month-row{display:flex;align-items:center;border-bottom:1px solid #d7d7d7;background:transparent;padding:0}
  .fic-month-bar{display:flex;flex:1;min-width:0;overflow-x:auto;user-select:none;-webkit-user-select:none}
  .fic-month-cell{flex:1 0 62px;padding:6px 4px;text-align:center;border-right:1px solid #d7d7d7;cursor:pointer;position:relative;min-width:62px;transition:background .1s}
  .fic-month-cell:last-child{border-right:none}
  .fic-month-cell:hover{background:#e8f4fc}
  .fic-month-cell.selected{background:#e0f0fa}
  .fic-month-cell.current::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#4caf50;border-radius:2px 2px 0 0}
  .fic-month-name{font-size:11px;font-weight:400;color:#6f6f6f;text-transform:capitalize}
  .fic-month-count{font-size:14px;color:#333;margin-top:4px}
  .fic-month-total{font-size:11px;font-weight:700;color:#0d97d5;margin-top:1px}
  .fic-sel-all{flex:0 0 auto;padding:6px 14px;margin-left:4px;border:1px solid #d0dde9;border-radius:4px;background:#fff;color:#313d4c;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter UI','Inter',sans-serif;align-self:center;transition:background .12s}
  .fic-sel-all:hover{background:#f0f4f8}

  /* ── FIC TAB STRIP ── */
  .fic-tab-strip{display:flex;justify-content:flex-end;gap:0;padding:16px 20px 0;flex-wrap:nowrap}
  .fic-tab{padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #d0dde9;background:transparent;color:#313d4c;transition:all .12s;margin-left:-1px;font-family:'Inter UI','Inter',sans-serif;white-space:nowrap;height:30px}
  .fic-tab:first-child{border-radius:4px 0 0 4px;margin-left:0}
  .fic-tab:last-child{border-radius:0 4px 4px 0}
  .fic-tab:hover{background:#f0f4f8}
  .fic-tab.active{color:#a8b5c7;border-color:#d0dde9;background:transparent;z-index:1;box-shadow:rgba(0,0,0,.2) 0 1px 0 0 inset}

  /* ── FIC FILTER BAR ── */
  .fic-filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;padding:14px 20px}
  .fic-filter-sep{width:1px;height:20px;background:#d7d7d7;flex:0 0 1px;margin:0 4px}
  .fic-filter-spacer{flex:1;min-width:0}
  .fic-select{height:28px;border:1px solid #cfdde8;border-radius:4px;font-size:12px;color:#444;padding:0 8px;background:linear-gradient(to top,#f3f3f3,#fff 50%);cursor:pointer;font-family:'Inter UI','Inter',sans-serif;flex:0 0 auto;width:auto;line-height:26px}
  .fic-select:focus{border-color:var(--brand);outline:none}
  .fic-search-wrap{position:relative;flex:0 0 auto}

  .fic-search:focus{border-color:var(--brand);outline:none}
  .fic-search::placeholder{color:#a8b5c7}
  .fic-search-icon{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#a8b5c7;pointer-events:none}
  .fic-btn-new{padding:7px 14px;background:var(--brand);color:#fff;border:1px solid rgba(51,51,51,.16);border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Inter UI','Inter',sans-serif;transition:background .12s;flex:0 0 auto;box-shadow:rgba(51,51,51,.08) 0 1px 2px 0;margin-left:12px;line-height:15px;display:inline-block}
  .fic-btn-new:hover{background:var(--brand-hover)}
  .fic-content{min-height:300px;padding:0 20px}

  /* ── FIC EMPTY STATE ── */
  .fic-empty{text-align:center;padding:80px 24px;color:#313d4c;font-size:18px;line-height:1.6}
  .fic-empty-sub{font-size:14px;color:#8899aa;display:block;margin-top:4px}

  /* ── keep old styles for compat ── */
  .fat-hero{display:none}
  .fat-tabs{display:none}
  .fat-content{min-height:300px}
  .fat-year-sel{display:flex;align-items:center;gap:10px}
  .fat-year-sel button{background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
  .fat-year-sel button:hover{border-color:var(--brand)}
  .fat-year-sel span{font-family:var(--font-display);font-size:18px;font-weight:700;min-width:60px;text-align:center}
  .fat-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .fat-kpi{background:#fff;border:1px solid var(--border-strong);border-radius:12px;padding:18px 16px;display:grid;gap:10px;box-shadow:var(--shadow-sm)}
  .fat-kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);line-height:1.3}
  .fat-kpi-value{font-size:26px;font-weight:800;font-family:var(--font-display);line-height:1.15;color:var(--text)}
  .fat-kpi.warn{border-color:var(--orange-border);background:#fff8f0;box-shadow:var(--shadow-sm)}
  .fat-kpi.warn .fat-kpi-value{color:var(--orange)}
  .fat-kpi.danger{border-color:var(--orange-border);background:#fff8f0;box-shadow:var(--shadow-sm)}
  .fat-kpi.danger .fat-kpi-value{color:var(--orange)}
  .fat-pills{display:flex;gap:8px;flex-wrap:wrap}
  .fat-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;background:var(--bg-secondary);border:1px solid var(--border)}
  .fat-pill b{font-weight:800}
  .fat-chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;overflow-x:auto}

  .fat-chart-legend i{display:inline-block;width:12px;height:12px;border-radius:3px}
  .fat-chart-tooltip{position:absolute;background:var(--surface);color:var(--text);padding:8px 12px;border-radius:8px;font-size:12px;pointer-events:none;z-index:100;white-space:nowrap;line-height:1.6;border:1px solid var(--border);box-shadow:var(--shadow-md)}
  .fat-month-table{width:100%;border-collapse:collapse}
  .fat-month-table th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--border)}
  .fat-month-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
  .fat-month-table tfoot td{font-weight:700;border-top:2px solid var(--border)}
  .fat-month-table .right{text-align:right}
  .fat-month-table .positive{color:var(--green)}
  .fat-month-table .negative{color:var(--red)}
  .fat-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .fat-toolbar .input{min-width:160px}
  .fat-toolbar-right{margin-left:auto;display:flex;gap:8px}
  .fat-table-wrap{overflow-x:auto}
  .fat-table-wrap:has(table){border:1px solid var(--border);border-radius:14px}
  .fat-table{width:100%;border-collapse:collapse;table-layout:fixed}
  .fat-table th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:12px 10px;border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.03em}
  .fat-table td{padding:10px;border-bottom:1px solid var(--border);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fat-table tbody tr{cursor:pointer;transition:background .12s}
  .fat-table tbody tr:hover{background:var(--surface)}
  .fat-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}

  .fat-badge.emessa{background:var(--blue-bg);color:var(--blue)}
  .fat-badge.pagata{background:var(--green-bg);color:var(--green)}
  .fat-badge.scaduta{background:var(--red-bg);color:var(--red)}
  .fat-badge.nota_credito{background:var(--purple-bg);color:var(--purple)}
  .fat-badge.da_pagare{background:var(--orange-bg);color:var(--orange)}
  .fat-badge.lg{padding:6px 16px;font-size:13px}
  .fat-actions-wrap{position:relative;display:inline-block}
  .fat-actions-trigger{background:none;border:1px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:border-color .15s}
  .fat-actions-trigger:hover{border-color:var(--brand);color:var(--text)}
  .fat-actions-menu{position:absolute;right:0;top:100%;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;min-width:180px;z-index:50;box-shadow:var(--shadow-lg)}

  .fat-actions-menu button.red{color:var(--red)}

  /* ================================================================
     RESPONSIVE — layout adattivo mobile / tablet / desktop
     Blocco consolidato — ordine decrescente di breakpoint.
     ================================================================ */

  /* Hamburger — nascosto su desktop, visibile su mobile/tablet */
  .app-hamburger{
    display:none;background:transparent;border:none;
    width:40px;height:40px;align-items:center;justify-content:center;
    border-radius:8px;cursor:pointer;color:#fff;flex-shrink:0;padding:0;
  }

  /* Overlay sidebar drawer */
  .sidebar-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299;
    backdrop-filter:blur(2px);animation:fade .2s ease;
  }

  /* ── 1024px — tablet landscape ── */
  @media(max-width:1024px){
    .sidebar{width:200px}
    .dboard-widget:not([data-cols]){grid-column:span 6}
    .dboard-widget[data-cols="4"]{grid-column:span 6}
    .dboard-widget[data-cols="8"]{grid-column:span 12}
  }

  /* ── 768px — tablet portrait e mobile ── */
  @media(max-width:768px){
    /* Sidebar → drawer laterale */
    .sidebar{
      position:fixed;top:0;left:0;height:100dvh;
      width:280px;max-width:85vw;z-index:300;
      transform:translateX(-100%);
      transition:transform .25s ease;
      box-shadow:none;
    }
    .sidebar.sidebar-open{
      transform:translateX(0);
      box-shadow:4px 0 24px rgba(0,0,0,.15);
    }
    /* Main occupa tutta la larghezza */
    .app-body{overflow-y:auto}
    #main.card.padded{padding:14px 16px}
    /* Hamburger visibile */
    .app-hamburger{display:flex}
    /* Anno selector nascosto in header */
    .app-year-wrap{display:none}
    /* Notifiche dropdown adattiva */
    .notif-dropdown{width:calc(100vw - 32px);right:16px}
    /* Split layouts → colonna singola */
    .fl-split,.aut-split,.cli-split,.fl2-split{grid-template-columns:1fr}
    .fl-list2,.fl-detail,.aut-list,.aut-detail,.cli-list,.cli-detail{max-height:none}
  }

  /* ── 600px — mobile ── */
  @media(max-width:600px){
    header.app{padding:0 12px;gap:8px}
    /* KPI strip → 2 colonne */
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    /* Tabelle → scroll orizzontale */
    table{min-width:480px}
    .table-card{overflow-x:auto;-webkit-overflow-scrolling:touch}
    /* Filtri viaggi → verticale */
    .vg-filters-pills{flex-direction:column}
    .vg-filters-pills .dropdown,.vg-filters-pills .date-field{max-width:none;width:100%}
    /* Form grid → 1 colonna */
    .form-grid{grid-template-columns:1fr}
    /* Trip drawer → larghezza piena */
    .vgd-drawer{width:100vw!important;max-width:100vw}
    /* Wizard → full screen */
    .wiz-card{width:100vw;max-width:100vw;height:100dvh;max-height:100dvh;border-radius:0;margin:0}
    /* Modal → sheet dal basso (iOS style) */
    .modal-backdrop{align-items:flex-end}
    .modal-card{max-width:100%;width:100%;margin:0;border-radius:16px 16px 0 0}
    /* Grafici full-width */
    .dboard-chart-wrap,.summary-chart-canvas{width:100%;overflow:hidden}
    /* Tap targets minimi 44px */
    .btn{min-height:44px}
    .nav a,.nav-subitem{min-height:44px}
    /* Login card */
    .ln-card{width:calc(100% - 32px);padding:24px 20px}
    /* lg2 hero panel nascosto */
    .lg2-login-hero{display:none!important}
    .lg2-login-form{padding:32px 24px}
  }

  /* ── 380px — mobile piccolo ── */
  @media(max-width:380px){
    .dboard-kpi-row{grid-template-columns:1fr}
    .kpi-grid{grid-template-columns:1fr}
    .fl-kpi-row{grid-template-columns:1fr}
    .fl2-kpi-strip{grid-template-columns:1fr}
    header.app{padding:0 8px}
  }

  /* Hover solo su dispositivi con puntatore (no flash su touch) */
  @media(hover:hover){
    .nav a:hover{background:#f0f0f0;color:var(--text)}
    .dboard-kpi-card:hover{border-color:rgba(var(--brand-rgb),.3)}
    .btn:hover{background:var(--border)}
    .btn.brand:hover{background:var(--brand-hover)}
  }

  /* Rimuovi tap highlight iOS */
  *{-webkit-tap-highlight-color:transparent}

<body>
  <div id="app"></div>
  <script>
  'use strict';
  // ====== CONFIG & CONSTANTS ======
  const KEY='unitrans-suite-data'
  const SESSION='unitrans-session'
  const ADMIN_ID='u-admin'
  const TRIP_DRAFTS_KEY='unitrans-trip-drafts'
  const PLACES_BOOK_KEY='unitrans-places-book'
  const STORAGE_SCHEMA_VERSION=2
  const LOGO_WHITE='assets/logo.svg'
  const APP_CONFIG={
    ...(window.APP_CONFIG||{}),
    googlePlacesApiKey:(window.APP_CONFIG?.googlePlacesApiKey||'').trim()
  }
  const APP_STATE={
    shell:null,
    currentRoute:'dashboard',
    routeContext:{customerPrefill:''}
  }
  const el=(t,a={},...c)=>{const n=document.createElement(t);for(const k in a){if(k==='class')n.className=a[k];else if(k==='style')n.setAttribute('style',a[k]);else if(k.startsWith('on'))n[k]=a[k];else n.setAttribute(k,a[k])} for(const x of c.flat()){if(x==null)continue;n.append(x.nodeType?x:document.createTextNode(x))}return n}
  const qs=(sel,root=document)=>root.querySelector(sel)
  const qsa=(sel,root=document)=>Array.from(root.querySelectorAll(sel))
  const escapeHtml=(str)=>String(str??'').replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]))
  const icon=(d)=>{const s=document.createElementNS('http://www.w3.org/2000/svg','svg');s.setAttribute('viewBox','0 0 24 24');s.setAttribute('class','icon');const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('fill','none');p.setAttribute('stroke','currentColor');p.setAttribute('stroke-width','1.6');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');p.setAttribute('d',d);s.appendChild(p);return s}
  const icons={dashboard:'M3 9.5L12 2l9 7.5V20a2 2 0 01-2 2H5a2 2 0 01-2-2V9.5zM9 22V12h6v10',truck:'M3 7h11v7h4l3 3v3h-2a3 3 0 11-6 0H9a3 3 0 11-6 0H1V9a2 2 0 012-2z',invoice:'M6 2h12l2 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2zm3 6h8M9 12h8M9 16h6',fleet:'M3 18h18l-2-8H5l-2 8zm3-10h12l-1-4H7l-1 4z',user:'M12 12a5 5 0 100-10 5 5 0 000 10zm-9 9a9 9 0 1118 0H3z',clients:'M7 11a4 4 0 110-8 4 4 0 010 8zM1 22a6 6 0 1112 0H1zM17 13a4 4 0 110-8 4 4 0 010 8zM13 22a6 6 0 1112 0h-6',bell:'M12 22a2 2 0 002-2H10a2 2 0 002 2zm6-6V9a6 6 0 10-12 0v7L4 18v2h16v-2l-2-2z',report:'M5 3h14v18H5z M9 7h6M9 11h6M9 15h6',file:'M6 2h7l5 5v13a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z',shield:'M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z',payroll:'M3 7h18M7 3v8M17 3v8M5 12h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z'}
  const ROLE_LABELS={admin:'Amministratore',operatore:'Operatore'}
  const PERMISSION_DEFS=[
    {id:'dashboard.view',label:'Accesso dashboard'},
    {id:'viaggi.manage',label:'Gestione viaggi'},
    {id:'fatture.manage',label:'Gestione fatture'},
    {id:'flotta.manage',label:'Gestione flotta'},
    {id:'drivers.manage',label:'Gestione autisti'},
    {id:'clienti.manage',label:'Gestione clienti'},
    {id:'spese.manage',label:'Gestione spese'},
    {id:'notifiche.manage',label:'Gestione notifiche'},
    {id:'files.manage',label:'Gestione file'},
    {id:'reports.view',label:'Accesso report'},
    {id:'payroll.manage',label:'Gestione paghe'},
    {id:'security.manage',label:'Gestione sicurezza',adminOnly:true}
  ]
  const ROLE_PRESETS={
    admin: PERMISSION_DEFS.map(p=>p.id),
    operatore: PERMISSION_DEFS.map(p=>p.id).filter(id=>id!=='security.manage' && id!=='payroll.manage')
  }
  const permissionsForRole=(role)=> ROLE_PRESETS[role]? [...ROLE_PRESETS[role]]:[]
  const setActive=(id)=>{
    qsa('.nav a').forEach(a=>{a.classList.remove('active');a.classList.remove('expanded')})
    qsa('.nav-subitem').forEach(s=>s.classList.remove('active'))
    const e=qs(`#nav-${id}`)
    if(e) e.classList.add('active')
    qsa('.nav-subitems').forEach(s=>s.classList.remove('open'))
    qsa('.nav-caret').forEach(c=>c.classList.remove('open'))
    if(id==='fatture'){
      const subs=qs('.nav-subitems');if(subs) subs.classList.add('open')
      const fatLink=qs('#nav-fatture');if(fatLink){fatLink.classList.remove('active');fatLink.classList.add('expanded')}
      const caret=fatLink?.querySelector('.nav-caret');if(caret) caret.classList.add('open')
    }
  }
  const navigateTo=(hashOrId)=>{
    const cleaned=String(hashOrId||'dashboard').replace(/^#/,'').trim()||'dashboard'
    window.history.replaceState({},'',`#${cleaned}`)
    return cleaned
  }
  const routeTo=(id)=>navigateTo(id)

  // ====== STORAGE (load/save/migrate) ======
  const storageLoad=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return{}}}
  const storageSave=(value)=>localStorage.setItem(KEY, JSON.stringify(value))
  const seedOnce=()=>{
    const d=storageLoad()
    if(d._seed) return
    storageSave({
      _seed:true,
      schemaVersion:STORAGE_SCHEMA_VERSION,
      users:[{id:ADMIN_ID,name:'Administrator',username:'admin',email:'admin@unitrans.local',gender:'male',pass:'admin',role:'admin',permissions:ROLE_PRESETS.admin,active:true,lastLogin:null,forceChange:false,createdAt:new Date().toISOString()}],
      trips:[],
      invoices:[],
      fleet:[],
      drivers:[],
      customers:[],
      notifications:[],
      files:[],
      payroll:[],
      logs:[]
    })
  }
  const storageMigrate=()=>{
    const data=storageLoad()
    let changed=false
    const collections=['users','trips','invoices','purchases','ddt','fleet','drivers','customers','notifications','files','payroll','logs','expenses']
    collections.forEach((key)=>{
      if(!Array.isArray(data[key])){
        data[key]=[]
        changed=true
      }
    })
    if(!data._seed){
      data._seed=true
      changed=true
    }
    data.files=(data.files||[]).map((entry)=>{
      const tags=Array.isArray(entry?.tags)? entry.tags.filter(Boolean).map(v=>String(v).trim()).filter(Boolean):[]
      if(!Array.isArray(entry?.tags)){changed=true}
      return {...entry,tags}
    })
    data.payroll=(data.payroll||[]).map((entry)=>{
      const status=entry?.status||'Bozza'
      const visibility=entry?.visibility||'admin_only'
      const netto=Number(entry?.netto||0)
      const safeNetto=Number.isFinite(netto)?netto:0
      const createdAt=entry?.createdAt||entry?.updatedAt||new Date().toISOString()
      const updatedAt=entry?.updatedAt||entry?.createdAt||createdAt
      if(!entry?.status || !entry?.visibility || !Number.isFinite(netto) || !entry?.createdAt || !entry?.updatedAt){changed=true}
      return {...entry,status,visibility,netto:safeNetto,createdAt,updatedAt}
    })
    if(data.schemaVersion!==STORAGE_SCHEMA_VERSION){
      data.schemaVersion=STORAGE_SCHEMA_VERSION
      changed=true
    }
    if(changed) storageSave(data)
  }
  const get=()=>storageLoad()
  const set=(value)=>storageSave(value)

  // ====== AUTH & PERMISSIONS ======
  const enforceAdminGuard=()=>{
    const data=get()
    data.users=data.users||[]
    const requiredPerms=ROLE_PRESETS.admin
    let changed=false
    let adminIndex=data.users.findIndex(u=>u.id===ADMIN_ID)
    if(adminIndex===-1){
      adminIndex=data.users.findIndex(u=>u.email==='admin@unitrans.local')
    }
    if(adminIndex===-1){
      data.users.push({id:ADMIN_ID,name:'Administrator',username:'admin',email:'admin@unitrans.local',gender:'male',pass:'admin',role:'admin',permissions:[...requiredPerms],active:true,lastLogin:null,forceChange:false})
      changed=true
    }else{
      const admin={...data.users[adminIndex]}
      if(admin.id!==ADMIN_ID){ admin.id=ADMIN_ID; changed=true }
      if(admin.role!=='admin'){ admin.role='admin'; changed=true }
      if(admin.active===false){ admin.active=true; changed=true }
      if(!admin.name){ admin.name='Administrator'; changed=true }
      if(!admin.username){ admin.username='admin'; changed=true }
      if(!admin.email){ admin.email='admin@unitrans.local'; changed=true }
      if(!admin.gender){ admin.gender='male'; changed=true }
      if(admin.forceChange){ admin.forceChange=false; changed=true }
      const samePerms=Array.isArray(admin.permissions)&&admin.permissions.length===requiredPerms.length&&requiredPerms.every(p=>admin.permissions.includes(p))
      if(!samePerms){
        admin.permissions=[...requiredPerms]
        changed=true
      }
      data.users[adminIndex]=admin
    }
    if(changed) set(data)
  }
  const login=(identity,pass)=>{
    const credential=(identity||'').trim().toLowerCase()
    const d=get(); const users=d.users||[]
    const found=users.find(u=>{
      const uname=(u.username||'').toLowerCase()
      const mail=(u.email||'').toLowerCase()
      return credential && (uname===credential || mail===credential)

          source:'recent',
          label:entry.label||entry.address,
          address:entry.address,
          city:entry.city||'',
          province:entry.province||'',
          meta:[entry.city,entry.province].filter(Boolean).join(', ')
        }))
    }
    const closePanel=()=>{
      panel.classList.remove('visible')
      panel.replaceChildren()
      menuItems=[]
      activeIndex=-1
      manualRecentOpen=false
      unbindOutsidePointerClose()
    }
    const appendHighlightedText=(target,text,term)=>{
      const safe=String(text||'')
      const query=String(term||'').trim().toLowerCase()
      target.replaceChildren()
      if(!query){
        target.textContent=safe
        return
      }
      const idx=safe.toLowerCase().indexOf(query)
      if(idx===-1){
        target.textContent=safe
        return
      }
      target.append(document.createTextNode(safe.slice(0,idx)))
      target.append(el('strong',{},safe.slice(idx,idx+query.length)))
      target.append(document.createTextNode(safe.slice(idx+query.length)))
    }
    const updateActiveRow=()=>{
      panel.querySelectorAll('.suggest-item[data-index]').forEach((row)=>{
        const isActive=Number(row.dataset.index)===activeIndex
        row.classList.toggle('active', isActive)
        row.setAttribute('aria-selected', isActive?'true':'false')
      })
    }
    const pickItem=(item)=>{
      if(!item || item.disabled) return
      inputEl.value=item.address||item.label||''
      onPick?.(item)
      closePanel()
    }
    const renderGrouped=(query='')=>{
      panel.replaceChildren()
      menuItems=[]
      const appendSection=(title,list=[])=>{
        if(!list.length) return
        panel.append(el('div',{class:'suggest-section-label'},title))
        list.forEach((item)=>{
          const rowIndex=menuItems.length
          menuItems.push(item)
          const row=el('div',{class:`suggest-item${item.disabled?' disabled':''}`,role:'option','aria-selected':'false','data-index':String(rowIndex)})
          const main=el('div',{class:'suggest-item-main'})
          const line=el('span',{})
          appendHighlightedText(line,item.label||item.address||'',query)
          main.append(line)
          if(item.meta) main.append(el('small',{},item.meta))
          row.append(main, item.source && item.source!=='recent' ? el('span',{class:'suggest-source'}, item.source==='google'?'Google':item.source==='company'?'Rubrica':'OSM'):null)
          row.onmouseenter=()=>{
            if(item.disabled || activeIndex===rowIndex) return
            activeIndex=rowIndex
            updateActiveRow()
          }
          row.addEventListener('pointerdown',(event)=>{
            event.preventDefault()
            event.stopPropagation()
            pickItem(item)
          })
          row.addEventListener('mousedown',(event)=>event.preventDefault())
          panel.append(row)
        })
      }
      appendSection('Recenti',grouped.recents)
      appendSection('Suggerimenti',grouped.suggestions)
      if(!menuItems.length){
        closePanel()
        return
      }
      if(activeIndex<0 || !menuItems[activeIndex] || menuItems[activeIndex].disabled){
        activeIndex=menuItems.findIndex((item)=>!item.disabled)
      }
      updateActiveRow()
      if(scrollContainer) ensureInView(inputEl,scrollContainer,{margin:18,extraBottom:250})
      panel.classList.add('visible')
      bindOutsidePointerClose()
    }
    const showRecentOnly=(term='')=>{
      grouped={recents:resolveRecents(term),suggestions:[]}
      activeIndex=grouped.recents.findIndex((item)=>!item.disabled)
      renderGrouped(term)
    }
    const moveActive=(delta)=>{
      const enabled=menuItems.map((item,idx)=>({item,idx})).filter((entry)=>!entry.item.disabled)
      if(!enabled.length) return
      const currentEnabledIdx=enabled.findIndex((entry)=>entry.idx===activeIndex)
      const nextEnabled=enabled[(currentEnabledIdx+delta+enabled.length)%enabled.length]
      activeIndex=nextEnabled.idx
      updateActiveRow()
    }
    const showFallbackSuggestions=async(query)=>{
      const trimmed=(query||'').trim()
      if(trimmed.length<2){
        if(manualRecentOpen) showRecentOnly('')
        else closePanel()
        return
      }
      const ticket=++requestToken
      const recents=resolveRecents(trimmed)
      const endpoint=`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=7&countrycodes=it&q=${encodeURIComponent(trimmed)}`
      try{
        const response=await fetch(endpoint,{headers:{Accept:'application/json'}})
        if(ticket!==requestToken || destroyed) return
        if(!response.ok) throw new Error(`http ${response.status}`)
        const data=await response.json()
        if(ticket!==requestToken || destroyed) return
        const fromApi=Array.isArray(data)?data:[]
        const italianOnly=fromApi.filter((entry)=>String(entry?.address?.country_code||'').toLowerCase()==='it')
        const mapped=italianOnly.map((entry)=>({
          id:`OSM-${entry.place_id||crypto.randomUUID()}`,
          source:'osm',
          label:entry.display_name||trimmed,
          address:entry.display_name||trimmed,
          city:entry.address?.city || entry.address?.town || entry.address?.village || '',
          province:entry.address?.state || entry.address?.county || '',
          meta:[entry.address?.city || entry.address?.town || entry.address?.village || '', entry.address?.state || entry.address?.county || ''].filter(Boolean).join(', ')
        }))
        const seenRecents=new Set(recents.map((entry)=>lower(entry.address||entry.label)))
        const seenSuggestions=new Set()
        const suggestions=mapped.filter((entry)=>{
          const key=lower(entry.address||entry.label)
          if(!key || seenRecents.has(key) || seenSuggestions.has(key)) return false
          seenSuggestions.add(key)
          return true
        }).slice(0,6)
        grouped={
          recents,
          suggestions:suggestions.length ? suggestions : [{id:'none',label:'Nessun suggerimento',address:'',source:'osm',disabled:true}]
        }
        manualRecentOpen=false
        activeIndex=[...grouped.recents,...grouped.suggestions].findIndex((item)=>!item.disabled)
        renderGrouped(trimmed)
      }catch{
        if(ticket!==requestToken || destroyed) return
        grouped={
          recents,
          suggestions:[{id:'none',label:'Nessun suggerimento',address:'',source:'osm',disabled:true}]
        }
        manualRecentOpen=false
        activeIndex=[...grouped.recents,...grouped.suggestions].findIndex((item)=>!item.disabled)
        renderGrouped(trimmed)
      }
    }
    const onInput=()=>{
      const query=(inputEl.value||'').trim()
      if(mode==='google'){
        if(query.length>=2){
          closePanel()
          return
        }
        if(manualRecentOpen) showRecentOnly('')
        else closePanel()
        return
      }
      if(debounceTimer) clearTimeout(debounceTimer)
      if(query.length>=2){
        manualRecentOpen=false
        debounceTimer=setTimeout(()=>showFallbackSuggestions(query),280)
        return
      }
      if(manualRecentOpen) showRecentOnly('')
      else closePanel()
    }
    const onFocus=()=>{
      if(scrollContainer) ensureInView(inputEl,scrollContainer,{margin:18,extraBottom:250})
    }
    const onBlur=()=>setTimeout(()=>{
      if(!wrapper.contains(document.activeElement)) closePanel()
    },120)
    const onKeydown=(event)=>{
      if(event.key==='Escape' && panel.classList.contains('visible')){
        event.preventDefault()
        event.stopPropagation()
        closePanel()
        return
      }
      if(event.key==='ArrowDown'){
        if(!panel.classList.contains('visible')){
          event.preventDefault()
          manualRecentOpen=true
          showRecentOnly('')
          return
        }
        event.preventDefault()
        moveActive(1)
        return
      }
      if(event.key==='ArrowUp' && panel.classList.contains('visible')){
        event.preventDefault()
        moveActive(-1)
        return
      }
      if(event.key==='Enter' && panel.classList.contains('visible')){
        const item=menuItems[activeIndex] || menuItems.find((entry)=>!entry.disabled)
        if(item && !item.disabled){
          event.preventDefault()
          pickItem(item)
        }
      }
    }
    inputEl.addEventListener('input', onInput)
    inputEl.addEventListener('focus', onFocus)
    inputEl.addEventListener('blur', onBlur)
    inputEl.addEventListener('keydown', onKeydown)
    loadGooglePlacesLibrary().then((ready)=>{
      if(destroyed || !ready || !window.google?.maps?.places) return
      mode='google'
      googleAutocomplete=new window.google.maps.places.Autocomplete(inputEl,{
        componentRestrictions:{country:['it']},
        fields:['formatted_address','address_components','geometry'],
        types:['geocode']
      })
      googleListener=googleAutocomplete.addListener('place_changed',()=>{
        const place=googleAutocomplete.getPlace()
        const parsed=parseGooglePlaceResult(place,(inputEl.value||'').trim())
        if(parsed.address){
          inputEl.value=parsed.address
          onPick?.(parsed)
          closePanel()
        }
      })
    }).catch(()=>{})
    return {
      destroy:()=>{
        destroyed=true
        requestToken+=1
        if(debounceTimer) clearTimeout(debounceTimer)
        inputEl.removeEventListener('input', onInput)
        inputEl.removeEventListener('focus', onFocus)
        inputEl.removeEventListener('blur', onBlur)
        inputEl.removeEventListener('keydown', onKeydown)
        if(googleListener?.remove) googleListener.remove()
        if(googleAutocomplete?.unbindAll) googleAutocomplete.unbindAll()
        closePanel()
      }
    }
  }

  // ---------- FatturaPA XML parse (basic) ----------
  const SALE_TYPES=new Set(['TD01','TD02','TD03','TD04','TD05','TD06','TD24'])
  const PURCHASE_TYPES=new Set(['TD10','TD11','TD12','TD13','TD16','TD17','TD18','TD19'])
  const detectInvoiceCategory=(tipo)=>{
    const code=(tipo||'').toUpperCase()
    if(PURCHASE_TYPES.has(code)) return 'acquisto'
    if(SALE_TYPES.has(code)) return 'vendita'
    return 'vendita'
  }
  function parseFatturaPAXML(xmlText){
    const doc=new DOMParser().parseFromString(xmlText,'text/xml')
    if(doc.querySelector('parsererror')){
      return {ok:false,error:'File XML non valido o non leggibile.'}
    }
    const pick=(sel)=>(doc.querySelector(sel)?.textContent||'').trim()
    const numero=pick('DatiGeneraliDocumento > Numero')
    const data=pick('DatiGeneraliDocumento > Data')
    const totaleRaw=pick('DatiGeneraliDocumento > ImportoTotaleDocumento')
    const totale=parseFloat((totaleRaw||'0').replace(',','.'))||0
    const valuta=pick('DatiGeneraliDocumento > Divisa') || 'EUR'
    const tipo=pick('DatiGeneraliDocumento > TipoDocumento')
    const categoria=detectInvoiceCategory(tipo)

    const clienteDen=pick('CessionarioCommittente > DatiAnagrafici > Anagrafica > Denominazione')
      || [pick('CessionarioCommittente > DatiAnagrafici > Anagrafica > Nome'),pick('CessionarioCommittente > DatiAnagrafici > Anagrafica > Cognome')].filter(Boolean).join(' ')
    const clientePI=pick('CessionarioCommittente > DatiAnagrafici > IdFiscaleIVA > IdCodice')
    const clienteCF=pick('CessionarioCommittente > DatiAnagrafici > CodiceFiscale')

    const fornitoreDen=pick('CedentePrestatore > DatiAnagrafici > Anagrafica > Denominazione')
      || [pick('CedentePrestatore > DatiAnagrafici > Anagrafica > Nome'),pick('CedentePrestatore > DatiAnagrafici > Anagrafica > Cognome')].filter(Boolean).join(' ')
    const fornitorePI=pick('CedentePrestatore > DatiAnagrafici > IdFiscaleIVA > IdCodice')
    const fornitoreCF=pick('CedentePrestatore > DatiAnagrafici > CodiceFiscale')

    return {
      ok:true,
      numero,
      data,
      totale,
      valuta,
      tipo,
      categoria,
      clienteDen,
      clientePI,
      clienteCF,
      fornitoreDen,
      fornitorePI,
      fornitoreCF
    }
  }

  // ====== SECTIONS (one function per section) ======

  const Dashboard=()=>{
    const now=new Date()
    const currentYear=now.getFullYear()
    const currentMonth=now.getMonth()
    const todayIso=toLocalISO(now).slice(0,10)
    const monthLabels=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']
    const monthShort=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic']

    const trips=(list('trips')||[]).filter(t=>!t.draft)
    const drivers=list('drivers')||[]
    const fleet=list('fleet')||[]
    const expenses=list('expenses')||[]
    const invoices=list('invoices')||[]

    // ── KPI ──────────────────────────────────────────────────────────────
    const activeTrips=trips.filter(t=>t.stato==='In corso')
    const monthlyTrips=trips.filter(t=>{const d=new Date(t.dataCarico||t.createdAt||'');return d.getMonth()===currentMonth&&d.getFullYear()===currentYear})
    const completedMonth=monthlyTrips.filter(t=>t.stato==='Completato')
    const monthlyRevenue=completedMonth.reduce((s,t)=>s+estimateTripRevenue(t),0)
    const yearlyRevenue=trips.filter(t=>{const d=new Date(t.dataCarico||t.createdAt||'');return d.getFullYear()===currentYear&&t.stato==='Completato'}).reduce((s,t)=>s+estimateTripRevenue(t),0)
    const unpaidTrips=trips.filter(t=>t.stato==='Completato'&&!t.pagato)
    const pendingRevenue=unpaidTrips.reduce((s,t)=>s+estimateTripRevenue(t),0)
    const monthlyExp=(expenses||[]).filter(e=>{const d=new Date(e.data||e.createdAt||'');return d.getMonth()===currentMonth&&d.getFullYear()===currentYear}).reduce((s,e)=>s+(e.importo||0),0)
    const margin=monthlyRevenue-monthlyExp
    const completionRate=monthlyTrips.length>0?Math.round(completedMonth.length/monthlyTrips.length*100):0
    const nextTrip=trips.filter(t=>['Da fare','In attesa'].includes(t.stato||'Da fare')&&(t.dataCarico||'')>=todayIso).sort((a,b)=>(a.dataCarico||'').localeCompare(b.dataCarico||''))[0]

    // ── HELPER ───────────────────────────────────────────────────────────
    const card=(cls,children)=>{
      const c=el('div',{class:`db-card ${cls||''}`})
      children.forEach(ch=>{if(ch) c.append(ch)})
      return c
    }
    const section=(title,badge,content,extra)=>{
      const h=el('div',{class:'db-section-hdr'},el('div',{class:'db-section-title'},title))
      if(badge!=null) h.append(el('span',{class:'db-section-badge'},String(badge)))
      if(extra) h.append(extra)
      const s=el('div',{class:'db-section'})
      s.append(h,content)
      return s
    }
    const kpiCard=(label,value,meta,opts={})=>{
      const c=el('div',{class:'db-kpi-card'})
      const lbl=el('div',{class:'db-kpi-label'})
      if(opts.dot) lbl.append(el('span',{class:'db-kpi-dot',style:`background:${opts.dot}`}))
      lbl.append(label)
      c.append(lbl)
      c.append(el('div',{class:'db-kpi-value',style:opts.color?`color:${opts.color}`:''},value))
      c.append(el('div',{class:'db-kpi-meta'},meta))
      if(opts.progress!=null){
        c.append(el('div',{class:'db-progress-wrap'},el('div',{class:'db-progress-bar',style:`width:${opts.progress}%`})))
      }
      return c
    }
    const daysDiff=dateStr=>{
      if(!dateStr) return null
      const d=new Date(dateStr.includes('T')?dateStr:`${dateStr}T00:00:00`)
      if(isNaN(d.getTime())) return null
      return Math.ceil((d-now)/(1000*60*60*24))
    }

    // ── RIGA 1: KPI STRIP ────────────────────────────────────────────────
    const kpiRow=el('div',{class:'db-kpi-row'})
    ;[
      kpiCard('Viaggi attivi', String(activeTrips.length), 'in movimento oggi', {dot:activeTrips.length>0?'#22c55e':'#94a3b8'}),
      kpiCard('Fatturato mese', fmtMoney(monthlyRevenue), monthLabels[currentMonth]+' '+currentYear),
      kpiCard('Fatturato anno', fmtMoney(yearlyRevenue), 'anno '+currentYear),
      kpiCard('Crediti', fmtMoney(pendingRevenue), fmtCount(unpaidTrips.length,'viaggio','viaggi')+' non pagati', {color:pendingRevenue>0?'#fbbf24':null}),
      kpiCard('Spese mese', fmtMoney(monthlyExp), 'spese '+monthLabels[currentMonth]),
      kpiCard('Margine', fmtMoney(margin), 'ricavi - spese', {color:margin>0?'#22c55e':margin<0?'#ef4444':null}),
      kpiCard('Completati', completedMonth.length+' / '+monthlyTrips.length, 'questo mese', {progress:completionRate}),
      kpiCard('Autisti', String(drivers.filter(d=>!d.disabilitato).length), 'operativi'),
      kpiCard('Camion', String(fleet.filter(f=>f.tipo!=='rimorchio'&&!f.fuoriServizio).length), 'disponibili'),
      kpiCard('Prossimo carico', nextTrip?fmtDateDisplay(nextTrip.dataCarico):'—', nextTrip?nextTrip.cliente||'—':'nessun carico')
    ].forEach(c=>kpiRow.append(c))

    // ── RIGA 2: VIAGGI IN CORSO (sinistra) + AGENDA (destra) ─────────────
    // Viaggi in corso
    const viaggiList=el('div',{style:'display:grid;gap:7px'})
    const active8=activeTrips.slice(0,8)
    if(!active8.length){
      viaggiList.append(el('div',{class:'db-empty'},'Nessun viaggio in corso al momento'))
    } else {
      active8.forEach(trip=>{
        const drv=drivers.find(d=>d.id===trip.autista)
        const veh=fleet.find(f=>f.id===trip.camion)
        const init=(trip.cliente||'??').slice(0,2).toUpperCase()
        const row=el('div',{class:'db-trip-row'},
          el('div',{class:'db-trip-avatar'},init),
          el('div',{class:'db-trip-info'},
            el('div',{class:'cell-main'},trip.cliente||'—'),
            el('div',{class:'cell-sub'},`${trip.origine||'-'} → ${trip.arrivo||'-'}`)
          ),
          el('div',{class:'db-trip-meta'},
            el('div',{style:'font-size:12px;font-weight:500'},drv?.name||'-'),
            el('div',{class:'cell-sub'},veh?.targa||'-')
          ),
          el('div',{class:'db-trip-meta',style:'text-align:right'},
            el('div',{style:'font-size:12px'},fmtDateDisplay(trip.dataCarico)||'-'),
            el('div',{style:'font-size:11px;color:var(--muted)'},fmtMoney(estimateTripRevenue(trip)))
          ),
          el('button',{class:'btn ghost',style:'padding:4px 10px;font-size:12px',type:'button',onclick:()=>window._openTripDrawer?.(trip.id)},'→')
        )
        viaggiList.append(row)
      })
      if(activeTrips.length>8){
        const lnk=el('a',{href:'#viaggi',style:'color:var(--brand);text-decoration:none;font-size:12px;text-align:center;display:block;padding:8px'},'Vedi tutti i viaggi →')
        lnk.onclick=e=>{e.preventDefault();location.hash='viaggi'}
        viaggiList.append(lnk)
      }
    }
    const secViaggI=section('Viaggi in corso',activeTrips.length,viaggiList)

    // Agenda
    const upcoming=trips.filter(t=>['Da fare','In attesa'].includes(t.stato||'Da fare')&&(t.dataCarico||'')>=todayIso).sort((a,b)=>(a.dataCarico||'').localeCompare(b.dataCarico||'')).slice(0,6)
    const agendaList=el('div',{style:'display:grid;gap:6px'})
    if(!upcoming.length){
      agendaList.append(el('div',{class:'db-empty'},'Nessun carico programmato'))
    } else {
      upcoming.forEach(trip=>{
        const d=new Date(trip.dataCarico)
        const day=isNaN(d)?'?':d.getDate()
        const mon=isNaN(d)?'—':monthShort[d.getMonth()]
        agendaList.append(el('div',{class:'db-agenda-row'},
          el('div',{class:'db-agenda-date'},
            el('div',{class:'db-agenda-day'},String(day)),
            el('div',{class:'db-agenda-mon'},mon)
          ),
          el('div',{class:'db-agenda-sep'}),
          el('div',{style:'flex:1;min-width:0'},
            el('div',{class:'cell-main'},trip.cliente||'—'),
            el('div',{class:'cell-sub'},`${trip.origine||'-'} → ${trip.arrivo||'-'}`)
          ),
          trip.oraCarico?el('span',{class:'badge',style:'font-size:10px;flex-shrink:0'},trip.oraCarico):null
        ))
      })
    }
    const secAgenda=section('Agenda',null,agendaList)

    const row2=el('div',{class:'db-row-2'},
      el('div',{class:'db-col-8'},secViaggI),
      el('div',{class:'db-col-4'},secAgenda)
    )

    // ── RIGA 3: GRAFICI ───────────────────────────────────────────────────
    const mkSVGChart=(months,getVal,barColor,formatLabel)=>{
      const maxVal=Math.max(...months.map(getVal),1)
      const hasData=months.some(m=>getVal(m)>0)
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg')
      svg.setAttribute('viewBox','0 0 540 170')
      svg.setAttribute('width','100%')
      svg.setAttribute('style','display:block')
      const mk=(tag,attrs,txt)=>{
        const e=document.createElementNS('http://www.w3.org/2000/svg',tag)
        Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v))
        if(txt!==undefined) e.textContent=txt
        return e
      }
      svg.append(mk('line',{x1:'0',y1:'148',x2:'540',y2:'148',stroke:'#f3f4f6','stroke-width':'1'}))
      if(!hasData){
        svg.append(mk('text',{x:'270',y:'85','text-anchor':'middle',fill:'#6b7280','font-size':'13px'},'Nessun dato disponibile'))
        return svg
      }
      const tooltip=el('div',{style:'position:fixed;padding:5px 10px;background:#ffffff;color:#1a1f2e;font-size:12px;border-radius:8px;border:1px solid #e8eaed;pointer-events:none;display:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.08)'})
      document.body.append(tooltip)
      months.forEach((m,i)=>{
        const bw=52,gap=18,x=14+i*(bw+gap)
        const h=(getVal(m)/maxVal)*130
        const y=148-h
        const bar=mk('rect',{x:String(x),y:String(y),width:String(bw),height:String(h),fill:barColor,rx:'4',style:'cursor:pointer;transition:opacity .15s ease'})
        bar.addEventListener('mouseenter',e=>{bar.style.opacity='.6';tooltip.style.display='block';tooltip.style.left=e.clientX+'px';tooltip.style.top=(e.clientY-40)+'px';tooltip.textContent=`${m.label}: ${formatLabel(getVal(m))}`})
        bar.addEventListener('mousemove',e=>{tooltip.style.left=e.clientX+'px';tooltip.style.top=(e.clientY-40)+'px'})
        bar.addEventListener('mouseleave',()=>{bar.style.opacity='1';tooltip.style.display='none'})
        svg.append(bar)
        if(getVal(m)>0) svg.append(mk('text',{x:String(x+bw/2),y:String(y-6),'text-anchor':'middle',fill:barColor,'font-size':'9px','font-weight':'600'},formatLabel(getVal(m))))
        svg.append(mk('text',{x:String(x+bw/2),y:'163','text-anchor':'middle',fill:'#6b7280','font-size':'11px'},m.label))
      })
      return svg
    }

    const buildMonths=()=>{
      const months=[]
      for(let i=5;i>=0;i--){
        const d=new Date(currentYear,currentMonth-i,1)
        months.push({label:monthShort[d.getMonth()],year:d.getFullYear(),month:d.getMonth(),revenue:0,count:0})
      }
      trips.filter(t=>t.stato==='Completato').forEach(t=>{
        const d=new Date(t.dataScarico||t.dataCarico||'')
        const m=months.find(m=>m.year===d.getFullYear()&&m.month===d.getMonth())
        if(m){m.revenue+=estimateTripRevenue(t);m.count++}
      })
      return months
    }
    const months=buildMonths()

    const secGrafFatt=section('Fatturato','ultimi 6 mesi',el('div',{style:'padding:4px 0'},mkSVGChart(months,m=>m.revenue,'var(--brand)',v=>fmtMoney(v))))

  const Fatture=()=>{
    const wrap=el('div',{class:'fat-suite'})

    /* ═══ constants ═══ */
    const COMPANY={name:'UNITRANS S.R.L.',subtitle:'Trasporti su Strada',piva:'IT04525570711',address:'San Severo (FG)',email:'segreteria@trasportiunitrans.it',pec:'unitranssrl24@pec.it'}
    const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']
    const MSHORT=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic']
    const today=new Date()
    const curYear=today.getFullYear()

    /* ═══ data helpers ═══ */
    const inv_stato=(i)=>i.stato||(i.paid?'pagata':(i.dataScadenza&&new Date(i.dataScadenza)<today?'scaduta':(i.data?'emessa':'bozza')))
    const inv_tot=(i)=>Number(i.totale||i.total||i.amount||0)
    const inv_imp=(i)=>{if(i.imponibile!=null)return Number(i.imponibile);const r=i.righe||[];return r.length?r.reduce((s,x)=>s+Number(x.importo||0),0):inv_tot(i)/1.22}
    const inv_iva=(i)=>i.iva!=null?Number(i.iva):inv_imp(i)*(i.aliquotaIVA||22)/100
    const inv_cli=(i)=>i.clienteNome||i.clienteDen||i.counterparty||i.cliente||'-'
    const inv_num=(i)=>i.numero||i.number||('DOC-'+(i.id||'').slice(0,8))
    const inv_data=(i)=>i.data||i.date||i.createdAt||''
    const inv_scad=(i)=>i.dataScadenza||i.dueDate||''
    const inv_pag=(i)=>i.dataPagamento||i.paidDate||''
    const inv_righe=(i)=>i.righe||i.rows||[]
    const inv_trips=(i)=>i.tripIds||i.trips||[]
    const pur_stato=(p)=>p.stato||(p.dataPagamento?'pagata':(p.dataScadenza&&new Date(p.dataScadenza)<today?'scaduta':'da_pagare'))
    const pur_tot=(p)=>Number(p.totale||0)
    const badgeLabel=(s)=>{const m={'bozza':'Bozza','emessa':'Emessa','pagata':'Pagata','scaduta':'Scaduta','nota_credito':'Nota di credito','da_pagare':'Da pagare'};return m[s]||s}

    const buildInvoiceNumber=(anno)=>{
      const existing=(list('invoices')||[]).filter(i=>i.anno===anno&&i.tipo!=='nota_credito').map(i=>parseInt((i.numero||'').split('-')[2]||'0')).filter(n=>!isNaN(n))
      const next=existing.length?Math.max(...existing)+1:1
      return 'FAT-'+anno+'-'+String(next).padStart(3,'0')
    }

    /* auto-update scadute */
    const autoExpire=()=>{
      const now=new Date();let count=0
      ;(list('invoices')||[]).forEach(i=>{if(i.stato==='emessa'&&i.dataScadenza&&new Date(i.dataScadenza)<now){put('invoices',i.id,{stato:'scaduta'});count++}})
      ;(list('purchases')||[]).forEach(p=>{if(p.stato==='da_pagare'&&p.dataScadenza&&new Date(p.dataScadenza)<now){put('purchases',p.id,{stato:'scaduta'});count++}})
      return count
    }

    /* ═══ state ═══ */
    const fatTabMap={fatture:0,ricevute:1,ddt:2}
    const initialTab=(window.FAT_TAB&&fatTabMap[window.FAT_TAB]!=null)?fatTabMap[window.FAT_TAB]:0
    window.FAT_TAB=null
    const useYear=window.APP_YEAR||curYear
    const S={
      tab:initialTab,
      dashYear:useYear,
      aSearch:'',aStato:'',aCliente:'',aMese:'',
      pSearch:'',pMese:'',
      dSearch:'',dMese:'',
      selMonths:null /* null=all, or Set of month indices (-1=Preced,0-11=months,12=Success.) */
    }

    /* ═══════════════════════════════════════════
       MAIN RENDER
       ═══════════════════════════════════════════ */
    const render=()=>{
      wrap.innerHTML=''

      /* ── monthly summary bar with drag-select ── */
      const invoices=(list('invoices')||[])
      const purchases=(list('purchases')||[])
      const yr=useYear
      const monthRow=el('div',{class:'fic-month-row'})
      const monthBar=el('div',{class:'fic-month-bar'})
      const monthNames=['Preced.','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre','Success.']
      const curMonth=today.getMonth()
      const cells=[]
      let dragStart=null,dragging=false

      const countForMonth=(mIdx)=>{
        const all=[...invoices,...purchases]
        if(mIdx===-1) return all.filter(i=>new Date(inv_data(i)).getFullYear()<yr)
        if(mIdx===12) return all.filter(i=>new Date(inv_data(i)).getFullYear()>yr)
        return all.filter(i=>{const d=new Date(inv_data(i));return d.getFullYear()===yr&&d.getMonth()===mIdx})
      }

      const updateCellSelection=()=>{
        cells.forEach((c,i)=>{
          const mIdx=i-1
          if(S.selMonths&&S.selMonths.has(mIdx)) c.classList.add('selected')
          else c.classList.remove('selected')
        })
      }

      const buildRange=(a,b)=>{
        const lo=Math.min(a,b),hi=Math.max(a,b)
        const s=new Set()
        for(let i=lo;i<=hi;i++) s.add(i)
        return s
      }

      monthNames.forEach((mName,mi)=>{
        const mIdx=mi-1
        const items=countForMonth(mIdx)
        const count=items.length
        const total=items.reduce((s,i)=>s+inv_tot(i),0)
        const isSel=S.selMonths?S.selMonths.has(mIdx):false
        const cell=el('div',{class:'fic-month-cell'+(mIdx===curMonth?' current':'')+(isSel?' selected':'')},
          el('div',{class:'fic-month-name'},mName),
          el('div',{class:'fic-month-count'},count+' doc'),
          el('div',{class:'fic-month-total'},fmtMoney(total))
        )
        cell.addEventListener('mousedown',(e)=>{
          e.preventDefault()
          dragStart=mIdx;dragging=true
          S.selMonths=new Set([mIdx])
          updateCellSelection()
        })
        cell.addEventListener('mouseenter',()=>{
          if(dragging&&dragStart!==null){
            S.selMonths=buildRange(dragStart,mIdx)
            updateCellSelection()
          }
        })
        cells.push(cell)
        monthBar.append(cell)
      })

      document.addEventListener('mouseup',function onUp(){
        if(dragging){dragging=false;render()}
        document.removeEventListener('mouseup',onUp)
      },{once:true})

      /* Seleziona tutto button */

    }

    /* ═══════════════════════════════════════════

    const renderRiepilogo=(container)=>{

      const yrPur=purchases.filter(p=>new Date(p.data||p.createdAt||'').getFullYear()===yr)
      const fatNetto=yrInv.reduce((s,i)=>s+inv_imp(i),0)
      const ivaDebito=yrInv.reduce((s,i)=>s+inv_iva(i),0)

      const debiti=purchases.filter(p=>{const s=pur_stato(p);return s==='da_pagare'||s==='scaduta'}).reduce((s,p)=>s+pur_tot(p),0)

    /* ═══════════════════════════════════════════
       TAB 1 — FATTURE ATTIVE
       ═══════════════════════════════════════════ */
    const renderFatture=(container)=>{

      const bN=el('button',{},'\u203A');bN.onclick=()=>{S.scadMonth++;if(S.scadMonth>11){S.scadMonth=0;S.scadYear++};render()}
      mNav.append(bP,el('span',{},MONTHS[S.scadMonth]+' '+S.scadYear),bN)

      const ddTipo=createDropdown({value:S.scadTipo,options:[{value:'entrambe',label:'Entrambe'},{value:'attive',label:'Attive'},{value:'passive',label:'Passive'}],placeholder:'Tipo',onSelect:v=>{S.scadTipo=v;render()},allowEmpty:false})
      nav.append(mNav,ddTipo)
      container.append(nav)

      /* alert */
      if(expired>0){
        container.append(el('div',{class:'fat-alert warn'},'\u26A0\uFE0F '+expired+' fattur'+(expired===1?'a scaduta':'e scadute')+' \u2014 verifica il tuo scadenzario'))
      }

      /* collect all deadlines for selected month */
      const ym=S.scadYear,mm=S.scadMonth
      const items=[]
      if(S.scadTipo==='entrambe'||S.scadTipo==='attive'){
        (list('invoices')||[]).forEach(i=>{
          const scad=inv_scad(i);if(!scad)return
          const d=new Date(scad);if(d.getMonth()!==mm||d.getFullYear()!==ym)return
          const stato=inv_stato(i)
          if(stato==='bozza')return
          items.push({type:'attiva',id:i.id,collection:'invoices',nome:inv_cli(i),numero:inv_num(i),totale:inv_tot(i),scadenza:scad,stato,pagata:stato==='pagata',dataPagamento:inv_pag(i)})
        })
      }
      if(S.scadTipo==='entrambe'||S.scadTipo==='passive'){
        (list('purchases')||[]).forEach(p=>{
          const scad=p.dataScadenza;if(!scad)return
          const d=new Date(scad);if(d.getMonth()!==mm||d.getFullYear()!==ym)return
          const stato=pur_stato(p)
          items.push({type:'passiva',id:p.id,collection:'purchases',nome:p.fornitoreNome||'-',numero:p.numero||'-',totale:pur_tot(p),scadenza:scad,stato,pagata:stato==='pagata',dataPagamento:p.dataPagamento||''})
        })
      }
      items.sort((a,b)=>new Date(a.scadenza)-new Date(b.scadenza))

      /* KPIs */
      const inScad=items.filter(x=>!x.pagata).reduce((s,x)=>s+x.totale,0)
      const giaScad=items.filter(x=>x.stato==='scaduta').reduce((s,x)=>s+x.totale,0)
      const pagMese=items.filter(x=>x.pagata).reduce((s,x)=>s+x.totale,0)
      const kGrid=el('div',{class:'fat-kpi-grid',style:'grid-template-columns:repeat(3,1fr);margin-bottom:16px'})
      kGrid.append(
        el('div',{class:'fat-kpi'},el('div',{class:'fat-kpi-label'},'In scadenza questo mese'),el('div',{class:'fat-kpi-value'},fmtMoney(inScad))),
        el('div',{class:'fat-kpi'+(giaScad>0?' danger':'')},el('div',{class:'fat-kpi-label'},'Gi\u00E0 scadute non pagate'),el('div',{class:'fat-kpi-value'},fmtMoney(giaScad))),
        el('div',{class:'fat-kpi'},el('div',{class:'fat-kpi-label'},'Pagate questo mese'),el('div',{class:'fat-kpi-value'},fmtMoney(pagMese)))
      )
      container.append(kGrid)

      if(!items.length){container.append(el('div',{class:'empty-state',style:'padding:32px'},'Nessuna scadenza in questo mese'));return}

      /* group by week */
      const weeks=new Map()
      items.forEach(item=>{
        const d=new Date(item.scadenza)
        const day=d.getDay()||7
        const monday=new Date(d);monday.setDate(d.getDate()-(day-1))
        const sunday=new Date(monday);sunday.setDate(monday.getDate()+6)
        const weekNum=Math.ceil((d.getDate()+(new Date(d.getFullYear(),d.getMonth(),1).getDay()||7)-1)/7)
        const key=monday.toISOString().slice(0,10)
        if(!weeks.has(key))weeks.set(key,{label:'Settimana '+weekNum+' \u2014 '+monday.getDate()+' '+MSHORT[monday.getMonth()]+' \u00B7 '+sunday.getDate()+' '+MSHORT[sunday.getMonth()],items:[]})
        weeks.get(key).items.push(item)
      })

      weeks.forEach(wk=>{
        const grp=el('div',{class:'fat-scad-group'})
        grp.append(el('div',{class:'fat-scad-header'},wk.label))
        wk.items.forEach(item=>{
          const d=new Date(item.scadenza),now=new Date()
          const diff=(d-now)/(86400000)
          let dotCls='green'
          if(item.stato==='scaduta')dotCls='red'
          else if(diff<=7)dotCls='orange'
          else if(diff<=30)dotCls='yellow'

          const row=el('div',{class:'fat-scad-item'})
          row.append(
            el('div',{class:'fat-scad-dot '+dotCls}),
            el('span',{class:'fat-badge lg '+(item.type==='attiva'?'emessa':'nota_credito')},item.type==='attiva'?'ATTIVA':'PASSIVA'),
            el('div',{class:'fat-scad-info'},
              el('div',{class:'fat-scad-main'},item.nome),
              el('div',{class:'fat-scad-sub'},item.numero+' \u2014 Scadenza: '+fmtDateDisplay(item.scadenza))
            ),
            el('div',{class:'fat-scad-amount'},fmtMoney(item.totale)),
            el('div',{class:'fat-scad-actions'},
              el('span',{class:'fat-badge '+item.stato},badgeLabel(item.stato))
            )
          )
          if(!item.pagata){
            if(item.stato==='scaduta'){
              row.querySelector('.fat-scad-actions').append(el('span',{style:'color:#fca5a5;font-weight:700;font-size:11px'},'SCADUTA'))
            }
            const bPay=el('button',{class:'btn brand',style:'padding:4px 10px;font-size:11px'},'Segna pagata')
            bPay.onclick=()=>openPaymentMini(item.id,item.collection)
            row.querySelector('.fat-scad-actions').append(bPay)
          }
          grp.append(row)
        })
        container.append(grp)
      })
    }
