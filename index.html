      if(inv.oggetto)oBox.append(el('p',{},el('strong',{},'Oggetto: '),inv.oggetto))
      if(inv.metodoPagamento)oBox.append(el('p',{},el('strong',{},'Metodo: '),inv.metodoPagamento))
      if(inv.noteBetalingTerms)oBox.append(el('p',{},el('strong',{},'Termini: '),inv.noteBetalingTerms))
      if(inv.note)oBox.append(el('p',{style:'color:var(--muted);white-space:pre-wrap'},inv.note))
      left.append(oBox)

      /* righe table */
      if(righe.length){
        const tbl=el('table',{class:'fat-righe-table'})
        const thead=el('thead',{},el('tr',{},el('th',{},'Descrizione'),el('th',{class:'right'},'Qt\u00E0'),el('th',{class:'right'},'Prezzo unit.'),el('th',{class:'right'},'Importo')))
        const tbody=el('tbody')
        righe.forEach(r=>{
          tbody.append(el('tr',{},
            el('td',{},r.desc||r.description||'-'),
            el('td',{class:'right'},String(r.qta||r.qty||1)),
            el('td',{class:'right'},fmtMoney(Number(r.unitPrice||r.price||0))),
            el('td',{class:'right'},fmtMoney(Number(r.importo||r.amount||0)))
          ))
        })
        tbl.append(thead,tbody)
        left.append(tbl)
      }

      /* totals */
      left.append(el('div',{class:'fat-totals'},
        el('div',{class:'fat-total-row'},el('span',{class:'fat-total-label'},'Imponibile'),el('span',{class:'fat-total-value'},fmtMoney(inv_imp(inv)))),
        el('div',{class:'fat-total-row'},el('span',{class:'fat-total-label'},'IVA '+(inv.aliquotaIVA||22)+'%'),el('span',{class:'fat-total-value'},fmtMoney(inv_iva(inv)))),
        el('div',{class:'fat-total-row grand'},el('span',{class:'fat-total-label'},'Totale'),el('span',{class:'fat-total-value'},fmtMoney(inv_tot(inv))))
      ))

      /* viaggi collegati */
      const tripIds=inv_trips(inv)
      if(tripIds.length){
        const tBox=el('div',{class:'fat-detail-box'})
        tBox.append(el('div',{class:'fat-detail-box-title'},'Trasporti inclusi'))
        const allTrips=list('trips')||[]
        tripIds.forEach(tid=>{
          const t=allTrips.find(x=>x.id===tid)
          if(t){
            tBox.append(el('div',{style:'display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid #e8eaed;font-size:13px'},
              el('span',{},fmtDateDisplay(t.dataCarico||'')),
              el('span',{style:'flex:1'},(t.origine||'-')+' \u2192 '+(t.arrivo||'-')),
              el('span',{},t.peso?t.peso+' t':''),
              el('strong',{},fmtMoney(estimateTripRevenue(t)))
            ))
          }else{
            tBox.append(el('div',{class:'muted',style:'font-size:12px;padding:4px 0'},'Viaggio '+tid.slice(0,8)+'\u2026'))
          }
        })
        left.append(tBox)
      }

      /* === RIGHT COLUMN === */
      const right=el('div',{class:'fat-detail-right'})

      /* payment status card */
      const pCard=el('div',{class:'fat-detail-box'})
      pCard.append(
        el('div',{class:'fat-detail-box-title'},'Stato pagamento'),
        el('div',{style:'margin:8px 0'},el('span',{class:'fat-badge lg '+stato},badgeLabel(isNc?'nota_credito':stato))),
        el('p',{},'Scadenza: '+(inv_scad(inv)?fmtDateDisplay(inv_scad(inv)):'-'))
      )
      if(stato==='pagata'){
        pCard.append(el('p',{},'Pagata il: '+fmtDateDisplay(inv_pag(inv))))
      }
      if(inv.metodoPagamento)pCard.append(el('p',{},'Metodo: '+inv.metodoPagamento))

      if(stato==='emessa'||stato==='scaduta'){
        const payForm=el('div',{style:'margin-top:12px;display:grid;gap:8px;padding-top:12px;border-top:1px solid var(--border)'})
        payForm.append(el('div',{style:'font-weight:600;font-size:13px'},'Segna come pagata'))
        let payDate=toLocalISO(new Date())
        const df=createDateField({value:payDate,placeholder:'Data pagamento',onChange:v=>{payDate=v}})
        payForm.append(df)
        const bConfirm=el('button',{class:'btn brand',style:'width:100%'},'Conferma pagamento')
        bConfirm.onclick=()=>{
          put('invoices',inv.id,{stato:'pagata',dataPagamento:payDate})
          logEvent('invoice_paid',{numero:inv_num(inv)},{targetId:inv.id})
          showToast({message:'Fattura segnata come pagata',type:'success'})
          modalRef.close();render()
        }
        payForm.append(bConfirm)
        pCard.append(payForm)
      }
      right.append(pCard)

      /* credit notes card */
      if(!isNc){
        const cnotes=(list('invoices')||[]).filter(i=>i.tipo==='nota_credito'&&i.fatturaCollegataId===inv.id)
        if(cnotes.length){
          const cnBox=el('div',{class:'fat-detail-box'})
          cnBox.append(el('div',{class:'fat-detail-box-title'},'Note di credito collegate'))
          cnotes.forEach(nc=>{
            cnBox.append(el('div',{style:'display:flex;justify-content:space-between;padding:4px 0;font-size:13px'},
              el('span',{},inv_num(nc)),
              el('strong',{},fmtMoney(inv_tot(nc)))
            ))
          })
          right.append(cnBox)
        }
      }

      /* quick actions card */
      const aBox=el('div',{class:'fat-detail-box'})
      aBox.append(el('div',{class:'fat-detail-box-title'},'Azioni'))
      if(stato==='bozza'){
        const bEdit=el('button',{class:'btn ghost',style:'width:100%;margin-bottom:6px'},'Modifica');bEdit.onclick=()=>{modalRef.close();openNewInvoiceModal(inv)};aBox.append(bEdit)
        const bEmit=el('button',{class:'btn brand',style:'width:100%;margin-bottom:6px'},'Emetti fattura');bEmit.onclick=async()=>{if(await askConfirm({title:'Emetti fattura',message:'Confermi emissione di '+inv_num(inv)+'?',confirmLabel:'Emetti',tone:'brand'})){put('invoices',inv.id,{stato:'emessa',data:inv.data||toLocalISO(new Date())});logEvent('invoice_emit',{numero:inv_num(inv)},{targetId:inv.id});showToast({message:'Fattura emessa',type:'success'});modalRef.close();render()}};aBox.append(bEmit)
        const bDel=el('button',{class:'btn red',style:'width:100%'},'Elimina');bDel.onclick=async()=>{if(await askConfirm({title:'Elimina fattura',message:'Eliminare '+inv_num(inv)+'? Azione irreversibile.',confirmLabel:'Elimina',tone:'danger'})){remove('invoices',inv.id);logEvent('invoice_delete',{numero:inv_num(inv)},{targetId:inv.id});showToast({message:'Fattura eliminata',type:'success'});modalRef.close();render()}};aBox.append(bDel)
      }
      if(stato==='emessa'||stato==='pagata'){
        const bNc=el('button',{class:'btn ghost',style:'width:100%;margin-bottom:6px'},'Crea nota di credito');bNc.onclick=()=>{modalRef.close();openNewInvoiceModal(null,{tipo:'nota_credito',fatturaCollegataId:inv.id,clienteId:inv.clienteId,clienteNome:inv_cli(inv),clientePIVA:inv.clientePIVA||inv.clientePI||'',clienteCF:inv.clienteCF||'',clienteIndirizzo:inv.clienteIndirizzo||'',clientePEC:inv.clientePEC||'',clienteSDI:inv.clienteSDI||'',righe:inv_righe(inv),imponibile:inv_imp(inv),iva:inv_iva(inv),totale:inv_tot(inv)})};aBox.append(bNc)
      }
      const bPdf=el('button',{class:'btn ghost',style:'width:100%;margin-bottom:6px'},'Stampa / PDF');bPdf.onclick=()=>{modalRef.close();openPdfPreview(inv)};aBox.append(bPdf)
      const bDup=el('button',{class:'btn ghost',style:'width:100%'},'Duplica');bDup.onclick=()=>{
        const dup={...inv,id:'INV-'+crypto.randomUUID(),numero:buildInvoiceNumber(curYear),anno:curYear,stato:'bozza',dataPagamento:null,data:toLocalISO(new Date()),dataScadenza:toLocalISO(new Date(Date.now()+30*86400000)),createdAt:new Date().toISOString()}
        add('invoices',dup);showToast({message:'Fattura duplicata come bozza',type:'success'});modalRef.close();render()
      };aBox.append(bDup)
      right.append(aBox)

      body.append(left,right)

      /* header with number + badge + date */
      const hdr=el('div',{style:'display:flex;align-items:center;gap:12px;flex-wrap:wrap'},
        el('strong',{style:'font-size:18px'},inv_num(inv)),
        el('span',{class:'fat-badge lg '+(isNc?'nota_credito':stato)},badgeLabel(isNc?'nota_credito':stato)),
        el('span',{class:'muted',style:'font-size:13px'},'Emessa il '+fmtDateDisplay(inv_data(inv)))
      )

      const footer=el('div',{style:'display:flex;justify-content:flex-end;gap:8px'})
      const bClose=el('button',{class:'btn ghost'},'Chiudi');bClose.onclick=()=>modalRef.close();footer.append(bClose)

      const modalRef=uiModalOpen({title:'',body:el('div',{},hdr,body),footer,closeOnOverlay:true})
      if(modalRef.modal)modalRef.modal.style.maxWidth='800px'
    }

    /* ═══════════════════════════════════════════
       NEW / EDIT INVOICE MODAL (3-step wizard)
       ═══════════════════════════════════════════ */
    const openNewInvoiceModal=(editInv,presets)=>{
      const isEdit=!!editInv
      const customers=list('customers')||[]
      const wiz={
        step:1,
        clienteId:editInv?.clienteId||presets?.clienteId||'',
        clienteNome:editInv?inv_cli(editInv):presets?.clienteNome||'',
        clientePIVA:editInv?.clientePIVA||editInv?.clientePI||presets?.clientePIVA||'',
        clienteCF:editInv?.clienteCF||presets?.clienteCF||'',
        clienteIndirizzo:editInv?.clienteIndirizzo||presets?.clienteIndirizzo||'',
        clientePEC:editInv?.clientePEC||presets?.clientePEC||'',
        clienteSDI:editInv?.clienteSDI||presets?.clienteSDI||'',
        oggetto:editInv?.oggetto||'Servizi di trasporto',
        tipo:presets?.tipo||editInv?.tipo||'fattura',
        fatturaCollegataId:presets?.fatturaCollegataId||editInv?.fatturaCollegataId||'',
        formatoEmissione:editInv?.formatoEmissione||'pdf',
        metodoPagamento:editInv?.metodoPagamento||'Bonifico bancario',
        terminiPag:editInv?.noteBetalingTerms||'Pagamento a 30gg data fattura',
        tripMonth:today.getMonth(),
        tripYear:curYear,
        selectedTrips:editInv?inv_trips(editInv).slice():[],
        manualRows:editInv?inv_righe(editInv).map(r=>({desc:r.desc||r.description||'',qta:r.qta||r.qty||1,unitPrice:Number(r.unitPrice||r.price||0)})):(presets?.righe?presets.righe.map(r=>({desc:r.desc||'',qta:r.qta||1,unitPrice:Number(r.unitPrice||0)})):[{desc:'',qta:1,unitPrice:0}]),
        numero:editInv?inv_num(editInv):buildInvoiceNumber(curYear),
        data:editInv?inv_data(editInv):toLocalISO(new Date()),
        dataScadenza:editInv?inv_scad(editInv):toLocalISO(new Date(Date.now()+30*86400000)),
        aliquotaIVA:editInv?.aliquotaIVA||22,
        note:editInv?.note||''
      }
      let modalRef=null

      const renderWiz=()=>{
        const body=el('div',{class:'fat-modal-body'})

        /* step indicator */
        const steps=el('div',{class:'fat-steps'})
        for(let i=1;i<=3;i++){
          if(i>1)steps.append(el('div',{class:'fat-step-line'}))
          steps.append(el('div',{class:'fat-step'+(i===wiz.step?' active':'')+(i<wiz.step?' done':'')},String(i)))
        }
        body.append(steps)

        const footer=el('div',{style:'display:flex;justify-content:flex-end;gap:8px'})

        /* ──── STEP 1 ──── */
        if(wiz.step===1){
          /* customer autocomplete */
          const custDD=createDropdown({
            value:wiz.clienteId,
            options:customers.map(c=>({value:c.id,label:c.name||c.id})),
            placeholder:'Seleziona cliente\u2026',
            onSelect:v=>{
              wiz.clienteId=v
              const c=customers.find(x=>x.id===v)
              if(c){
                wiz.clienteNome=c.name||''
                wiz.clientePIVA=c.vat||c.piva||''
                wiz.clienteCF=c.cf||''
                wiz.clienteIndirizzo=[c.address,c.city,c.province].filter(Boolean).join(', ')
                wiz.clientePEC=c.pec||''
                wiz.clienteSDI=c.sdi||''
              }
              renderWiz()
            },allowEmpty:false
          })
          body.append(field('Cliente',custDD))

          /* inline new customer */
          const btnNewCli=el('button',{class:'btn ghost',style:'font-size:12px'},'+ Nuovo cliente al volo')
          let inlineOpen=false
          const inlineWrap=el('div',{style:'display:none;gap:8px;padding:12px;border:1px solid var(--border);border-radius:10px;margin-top:8px'})
          const ncName=el('input',{class:'input',placeholder:'Ragione sociale'})
          const ncVat=el('input',{class:'input',placeholder:'P.IVA'})
          const ncCf=el('input',{class:'input',placeholder:'Codice Fiscale'})
          const ncAddr=el('input',{class:'input',placeholder:'Indirizzo'})
          const ncPec=el('input',{class:'input',placeholder:'PEC'})
          const ncSdi=el('input',{class:'input',placeholder:'Codice SDI'})
          const ncSave=el('button',{class:'btn brand'},'Salva cliente')
          ncSave.onclick=()=>{
            if(!ncName.value.trim()){showToast({message:'Inserisci la ragione sociale',type:'error'});return}
            const id='CUST-'+crypto.randomUUID()
            add('customers',{id,name:ncName.value.trim(),vat:ncVat.value.trim(),cf:ncCf.value.trim(),address:ncAddr.value.trim(),pec:ncPec.value.trim(),sdi:ncSdi.value.trim()})
            wiz.clienteId=id;wiz.clienteNome=ncName.value.trim();wiz.clientePIVA=ncVat.value.trim();wiz.clienteCF=ncCf.value.trim();wiz.clienteIndirizzo=ncAddr.value.trim();wiz.clientePEC=ncPec.value.trim();wiz.clienteSDI=ncSdi.value.trim()
            showToast({message:'Cliente creato',type:'success'});renderWiz()
          }
          inlineWrap.append(
            el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:8px'},ncName,ncVat,ncCf,ncAddr,ncPec,ncSdi),
            ncSave
          )
          btnNewCli.onclick=()=>{inlineOpen=!inlineOpen;inlineWrap.style.display=inlineOpen?'grid':'none'}
          body.append(btnNewCli,inlineWrap)

          /* selected customer info */
          if(wiz.clienteId){
            body.append(el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;font-size:13px'},
              el('div',{},el('div',{class:'muted',style:'font-size:11px'},'P.IVA'),el('div',{},wiz.clientePIVA||'-')),
              el('div',{},el('div',{class:'muted',style:'font-size:11px'},'C.F.'),el('div',{},wiz.clienteCF||'-')),
              el('div',{},el('div',{class:'muted',style:'font-size:11px'},'PEC'),el('div',{},wiz.clientePEC||'-')),
              el('div',{},el('div',{class:'muted',style:'font-size:11px'},'SDI'),el('div',{},wiz.clienteSDI||'-')),
              el('div',{style:'grid-column:1/-1'},el('div',{class:'muted',style:'font-size:11px'},'Indirizzo'),el('div',{},wiz.clienteIndirizzo||'-'))
            ))
          }

          const oggettoInp=el('input',{class:'input',value:wiz.oggetto,placeholder:'Oggetto fattura'})
          oggettoInp.oninput=()=>{wiz.oggetto=oggettoInp.value}
          body.append(field('Oggetto',oggettoInp))

          /* tipo */
          const ddTipo=createDropdown({value:wiz.tipo,options:[{value:'fattura',label:'Fattura'},{value:'nota_credito',label:'Nota di credito'}],placeholder:'Tipo',onSelect:v=>{wiz.tipo=v;renderWiz()},allowEmpty:false})
          body.append(field('Tipo documento',ddTipo))

          if(wiz.tipo==='nota_credito'){
            const invOpts=(list('invoices')||[]).filter(i=>{const s=inv_stato(i);return(s==='emessa'||s==='pagata')&&(wiz.clienteId?i.clienteId===wiz.clienteId:true)}).map(i=>({value:i.id,label:inv_num(i)+' \u2014 '+fmtMoney(inv_tot(i))}))
            const ddFatColl=createDropdown({value:wiz.fatturaCollegataId,options:invOpts,placeholder:'Fattura collegata',onSelect:v=>{wiz.fatturaCollegataId=v},allowEmpty:true})
            body.append(field('Fattura collegata',ddFatColl))
          }

          /* formato */
          const ddFmt=createDropdown({value:wiz.formatoEmissione,options:[{value:'pdf',label:'PDF'},{value:'xml',label:'XML'},{value:'entrambi',label:'Entrambi'}],placeholder:'Formato',onSelect:v=>{wiz.formatoEmissione=v},allowEmpty:false})
          body.append(field('Formato emissione',ddFmt))

          /* metodo pagamento */
          const ddMet=createDropdown({value:wiz.metodoPagamento,options:[{value:'Bonifico bancario',label:'Bonifico bancario'},{value:'Assegno bancario',label:'Assegno bancario'}],placeholder:'Metodo',onSelect:v=>{wiz.metodoPagamento=v},allowEmpty:false})
          body.append(field('Metodo pagamento',ddMet))

          /* termini */
          const termInp=el('input',{class:'input',value:wiz.terminiPag,placeholder:'es. 30gg df'})
          termInp.oninput=()=>{wiz.terminiPag=termInp.value}
          body.append(field('Termini di pagamento',termInp))

          const btnNext=el('button',{class:'btn brand'},'Avanti \u2192')
          btnNext.disabled=!wiz.clienteId
          btnNext.onclick=()=>{wiz.step=2;renderWiz()}
          footer.append(btnNext)

        /* ──── STEP 2 ──── */
        }else if(wiz.step===2){
          /* A — trips accordion */
          const accTrips=el('div',{class:'fat-accordion'})
          const accHead=el('div',{class:'fat-accordion-head'},'Genera da viaggi',el('span',{},'\u25BC'))
          let accOpen=true
          const accBody=el('div',{class:'fat-accordion-body'})

          /* month/year */
          const monthSel=el('select',{class:'input',style:'width:auto'})
          MONTHS.forEach((m,i)=>{const o=el('option',{value:String(i)},m);if(i===wiz.tripMonth)o.selected=true;monthSel.append(o)})
          monthSel.onchange=()=>{wiz.tripMonth=parseInt(monthSel.value,10);wiz.selectedTrips=[];renderWiz()}
          const yearSel=el('input',{class:'input',type:'number',value:String(wiz.tripYear),style:'width:80px'})
          yearSel.onchange=()=>{wiz.tripYear=parseInt(yearSel.value,10);wiz.selectedTrips=[];renderWiz()}
          accBody.append(el('div',{style:'display:flex;gap:8px;align-items:center;margin-bottom:8px'},el('span',{},'Periodo:'),monthSel,yearSel))

          /* find eligible trips */
          const allTrips=list('trips')||[]
          const allInv=list('invoices')||[]
          const linkedIds=new Set();allInv.forEach(i=>{if(isEdit&&i.id===editInv?.id)return;(inv_trips(i)||[]).forEach(tid=>linkedIds.add(tid))})
          const custName=(wiz.clienteNome||'').toLowerCase().trim()
          const eligible=allTrips.filter(t=>{
            if(t.draft)return false
            if((t.stato||'').toLowerCase()!=='completato')return false
            if((t.cliente||'').toLowerCase().trim()!==custName)return false
            if(linkedIds.has(t.id))return false
            const d=new Date(t.dataCarico||t.dataScarico||t.createdAt||'')
            return!isNaN(d)&&d.getMonth()===wiz.tripMonth&&d.getFullYear()===wiz.tripYear
          })

          if(!eligible.length){
            accBody.append(el('div',{class:'empty-state',style:'padding:16px'},'Nessun viaggio completato disponibile'))
          }else{
            const selAll=el('button',{class:'btn ghost',style:'font-size:12px;margin-bottom:6px'},wiz.selectedTrips.length===eligible.length?'Deseleziona tutti':'Seleziona tutti')
            selAll.onclick=()=>{wiz.selectedTrips=wiz.selectedTrips.length===eligible.length?[]:eligible.map(t=>t.id);renderWiz()}
            accBody.append(selAll)
            let totalSel=0
            eligible.forEach(t=>{
              const checked=wiz.selectedTrips.includes(t.id)
              const rev=estimateTripRevenue(t)
              if(checked)totalSel+=rev
              const row=el('div',{class:'fat-trip-check'})
              const cb=el('input',{type:'checkbox'});cb.checked=checked
              cb.onchange=()=>{if(cb.checked){if(!wiz.selectedTrips.includes(t.id))wiz.selectedTrips.push(t.id)}else{wiz.selectedTrips=wiz.selectedTrips.filter(x=>x!==t.id)};renderWiz()}
              row.append(cb,el('div',{class:'fat-trip-check-info'},
                el('div',{},fmtDateDisplay(t.dataCarico||'')+' \u2014 '+(t.origine||'-')+' \u2192 '+(t.arrivo||'-')),
                el('strong',{},fmtMoney(rev))
              ))
              accBody.append(row)
            })
            accBody.append(el('div',{style:'text-align:right;font-weight:600;margin-top:8px'},'Totale selezionato: '+fmtMoney(totalSel)))
          }

          const btnAddToRows=el('button',{class:'btn brand',style:'margin-top:8px',disabled:!wiz.selectedTrips.length},'Aggiungi selezionati alle righe')
          btnAddToRows.onclick=()=>{
            wiz.selectedTrips.forEach(tid=>{
              const t=allTrips.find(x=>x.id===tid)
              if(t){
                const rev=estimateTripRevenue(t)
                wiz.manualRows.push({desc:'Trasporto '+(t.tipoMerce||'merci')+' da '+(t.origine||'-')+' a '+(t.arrivo||'-')+' del '+fmtDateDisplay(t.dataCarico||''),qta:1,unitPrice:rev})
              }
            })
            renderWiz()
          }
          accBody.append(btnAddToRows)

          accHead.onclick=()=>{accOpen=!accOpen;accBody.style.display=accOpen?'grid':'none';accHead.querySelector('span').textContent=accOpen?'\u25BC':'\u25B6'}
          accTrips.append(accHead,accBody)
          body.append(accTrips)

          /* B — manual rows (always visible) */
          body.append(el('div',{style:'font-weight:700;font-size:14px;margin-top:8px'},'Righe fattura'))
          /* header */
          body.append(el('div',{class:'fat-edit-row',style:'font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.03em'},
            el('div',{},'Descrizione'),el('div',{},'Qt\u00E0'),el('div',{},'Prezzo unit.'),el('div',{},'Importo'),el('div',{})
          ))
          wiz.manualRows.forEach((r,idx)=>{
            const row=el('div',{class:'fat-edit-row'})
            const descI=el('input',{class:'input',placeholder:'Descrizione',value:r.desc})
            descI.oninput=()=>{r.desc=descI.value}
            const qtaI=el('input',{class:'input',type:'number',value:String(r.qta),min:'0',step:'1'})
            qtaI.oninput=()=>{r.qta=Number(qtaI.value)||0;impSpan.textContent=fmtMoney(r.qta*r.unitPrice)}
            const priceI=el('input',{class:'input',type:'number',value:String(r.unitPrice),min:'0',step:'0.01'})
            priceI.oninput=()=>{r.unitPrice=Number(priceI.value)||0;impSpan.textContent=fmtMoney(r.qta*r.unitPrice)}
            const impSpan=el('div',{style:'font-weight:600;font-size:13px;text-align:right'},fmtMoney((r.qta||0)*(r.unitPrice||0)))
            const btnRm=el('button',{class:'btn red',style:'padding:4px 8px;font-size:14px'},'\u00D7')
            btnRm.onclick=()=>{wiz.manualRows.splice(idx,1);if(!wiz.manualRows.length)wiz.manualRows.push({desc:'',qta:1,unitPrice:0});renderWiz()}
            row.append(descI,qtaI,priceI,impSpan,btnRm)
            body.append(row)
          })
          const btnAddRow=el('button',{class:'btn ghost',style:'justify-self:start'},'+ Aggiungi riga')
          btnAddRow.onclick=()=>{wiz.manualRows.push({desc:'',qta:1,unitPrice:0});renderWiz()}
          body.append(btnAddRow)

          /* totals summary */
          const imp=wiz.manualRows.reduce((s,r)=>s+(r.qta||0)*(r.unitPrice||0),0)
          const iva=Math.round(imp*wiz.aliquotaIVA/100*100)/100
          const tot=Math.round((imp+iva)*100)/100
          body.append(el('div',{class:'fat-totals',style:'margin-top:12px'},
            el('div',{class:'fat-total-row'},el('span',{class:'fat-total-label'},'Imponibile'),el('span',{class:'fat-total-value'},fmtMoney(imp))),
            el('div',{class:'fat-total-row'},el('span',{class:'fat-total-label'},'IVA '+wiz.aliquotaIVA+'%'),el('span',{class:'fat-total-value'},fmtMoney(iva))),
            el('div',{class:'fat-total-row grand'},el('span',{class:'fat-total-label'},'TOTALE'),el('span',{class:'fat-total-value'},fmtMoney(tot)))
          ))

          const btnBack=el('button',{class:'btn ghost'},'\u2190 Indietro');btnBack.onclick=()=>{wiz.step=1;renderWiz()}
          const btnNext=el('button',{class:'btn brand'},'Avanti \u2192')
          btnNext.disabled=!wiz.manualRows.some(r=>r.desc&&r.unitPrice>0)
          btnNext.onclick=()=>{wiz.step=3;renderWiz()}
          footer.append(btnBack,btnNext)

        /* ──── STEP 3 ──── */
        }else if(wiz.step===3){
          /* compute final rows & totals */
          const righe=wiz.manualRows.filter(r=>r.desc).map(r=>({id:'R-'+crypto.randomUUID(),desc:r.desc,qta:r.qta||1,unitPrice:r.unitPrice||0,importo:Math.round((r.qta||1)*(r.unitPrice||0)*100)/100}))
          const imponibile=righe.reduce((s,r)=>s+r.importo,0)
          const iva=Math.round(imponibile*wiz.aliquotaIVA/100*100)/100
          const totale=Math.round((imponibile+iva)*100)/100

          /* numero */
          const numInp=el('input',{class:'input',value:wiz.numero})
          numInp.oninput=()=>{wiz.numero=numInp.value}
          body.append(field('Numero fattura',numInp))

          /* dates */
          const df1=createDateField({value:wiz.data,placeholder:'Data emissione',onChange:v=>{
            wiz.data=v
            /* auto-recalculate scadenza +30gg */
            const d=new Date(v);if(!isNaN(d)){d.setDate(d.getDate()+30);wiz.dataScadenza=toLocalISO(d)}
            renderWiz()
          }})
          body.append(field('Data emissione',df1))
          const df2=createDateField({value:wiz.dataScadenza,placeholder:'Data scadenza',onChange:v=>{wiz.dataScadenza=v}})
          body.append(field('Data scadenza',df2))

          /* IVA */
          body.append(field('Aliquota IVA',el('div',{style:'font-size:14px;font-weight:600;padding:8px 0'},wiz.aliquotaIVA+'%')))

          /* note */
          const noteArea=el('textarea',{class:'input',rows:'3',placeholder:'Note opzionali\u2026',style:'width:100%;resize:vertical'})
          noteArea.value=wiz.note;noteArea.oninput=()=>{wiz.note=noteArea.value}
          body.append(field('Note',noteArea))

          /* summary box */
          const sumBox=el('div',{class:'fat-detail-box',style:'margin-top:8px'})
          sumBox.append(
            el('div',{class:'fat-detail-box-title'},'Riepilogo finale'),
            el('p',{},el('strong',{},'Cliente: '),wiz.clienteNome),
            el('p',{},el('strong',{},'Oggetto: '),wiz.oggetto),
            el('p',{},el('strong',{},'N\u00B0 righe: '),String(righe.length)),
            el('p',{},el('strong',{},'Imponibile: '),fmtMoney(imponibile)),
            el('p',{},el('strong',{},'IVA '+wiz.aliquotaIVA+'%: '),fmtMoney(iva)),
            el('p',{style:'font-size:16px;font-weight:800;margin-top:4px'},el('strong',{},'Totale: '),fmtMoney(totale))
          )
          body.append(sumBox)

          /* save */
          const doSave=(stato)=>{
            const obj={
              id:isEdit?editInv.id:'INV-'+crypto.randomUUID(),
              numero:wiz.numero,
              anno:parseInt(wiz.data?.slice(0,4))||curYear,
              data:wiz.data,
              dataScadenza:wiz.dataScadenza,
              dataPagamento:null,
              clienteId:wiz.clienteId,
              clienteNome:wiz.clienteNome,
              clientePIVA:wiz.clientePIVA,
              clienteCF:wiz.clienteCF,
              clienteIndirizzo:wiz.clienteIndirizzo,
              clientePEC:wiz.clientePEC,
              clienteSDI:wiz.clienteSDI,
              oggetto:wiz.oggetto,
              righe,imponibile,aliquotaIVA:wiz.aliquotaIVA,iva,totale,stato,
              metodoPagamento:wiz.metodoPagamento,
              noteBetalingTerms:wiz.terminiPag,
              note:wiz.note,
              tripIds:wiz.selectedTrips,
              tipo:wiz.tipo,
              fatturaCollegataId:wiz.fatturaCollegataId||null,
              formatoEmissione:wiz.formatoEmissione,
              createdAt:isEdit?editInv.createdAt:new Date().toISOString()
            }
            if(isEdit){put('invoices',editInv.id,obj)}else{add('invoices',obj)}
            logEvent(isEdit?'invoice_update':'invoice_create',{numero:wiz.numero,stato},{actorId:me()?.id,targetId:obj.id})
            showToast({message:isEdit?'Fattura aggiornata':'Fattura '+(stato==='bozza'?'salvata come bozza':'emessa'),type:'success'})
            if(modalRef)modalRef.close();render()
          }

          const btnBack=el('button',{class:'btn ghost'},'\u2190 Indietro');btnBack.onclick=()=>{wiz.step=2;renderWiz()}
          const btnDraft=el('button',{class:'btn ghost'},'Salva come bozza');btnDraft.onclick=()=>doSave('bozza')
          const btnEmit=el('button',{class:'btn brand'},'Emetti fattura');btnEmit.onclick=()=>doSave('emessa')
          footer.append(btnBack,btnDraft,btnEmit)
        }

        if(modalRef)modalRef.close()
        modalRef=uiModalOpen({title:isEdit?'Modifica fattura':'Nuova fattura',body,footer,closeOnOverlay:true})
        if(modalRef.modal)modalRef.modal.style.maxWidth='760px'
      }
      renderWiz()
    }

        body.append(field('P.IVA',fPiva))

          const qI=el('input',{class:'input',type:'number',value:String(r.qta)});qI.oninput=()=>{r.qta=Number(qI.value)||0;renderPur()}
          const pI=el('input',{class:'input',type:'number',value:String(r.unitPrice),step:'0.01'});pI.oninput=()=>{r.unitPrice=Number(pI.value)||0;renderPur()}
          const impDiv=el('div',{style:'font-weight:600;font-size:13px;text-align:right'},fmtMoney((r.qta||0)*(r.unitPrice||0)))

        if(mRef.modal)mRef.modal.style.maxWidth='620px'
      }

    // ── STATO ──────────────────────────────────────────────────────────────
    const F={search:'',stato:'',autista:'',cliente:'',from:'',to:'',kpi:''}
    let sortCol='dataCarico', sortDir='desc'
    let page=1, PER_PAGE=20
    const expanded=new Set()
    let closeMenuFn=null

    const STATI=['Da fare','In corso','Completato','Annullato']
    const isAttesa=(s)=>!s||s==='Da fare'||s==='In attesa'

    const statoColor=(s)=>{
      if(!s||s==='Da fare'||s==='In attesa') return '#94a3b8'
      if(s==='In corso') return '#ff1744'
      if(s==='Completato') return '#22c55e'
      return '#475569'
    }
    const statoTextColor=(s)=>{
      if(!s||s==='Da fare'||s==='In attesa') return '#cbd5e1'
      if(s==='In corso') return '#fecdd3'
      if(s==='Completato') return '#bbf7d0'
      return '#94a3b8'
    }
    const calcImporto=(trip)=>{
      if(!trip.tariffa) return 0
      if(trip.tariffa.tipo==='A tonnellata') return Number(trip.tariffa.prezzoTonnellata||0)*Number(trip.peso||0)
      return Number(trip.tariffa.prezzo||0)
    }
    const descTariff=(t)=>{
      if(!t) return '-'
      if(t.tipo==='A tonnellata') return t.prezzoTonnellata!=null?`A tonn. · ${formatCurrencyValue(t.prezzoTonnellata)}/t`:'A tonnellata · da definire'
      return t.prezzo!=null?`A viaggio · ${formatCurrencyValue(t.prezzo)}`:'A viaggio · da definire'
    }

    // ── HEADER ──────────────────────────────────────────────────────────────
    const vgSub=el('div',{class:'vg-sub'},'0 viaggi')
    const btnNuovo=can('viaggi.manage')?el('button',{class:'btn brand',type:'button',onclick:()=>openTripWizard()},'+ Nuovo viaggio'):null
    // Dropdown "Altre azioni"
    const altreAzioniWrap=el('div',{style:'position:relative;display:inline-block'})
    const altreAzioniBtn=el('button',{class:'btn ghost',type:'button'},'Altre azioni \u25BE')
    const altreAzioniMenu=el('div',{class:'fat-actions-menu',style:'display:none;right:0;min-width:180px'})
    altreAzioniMenu.append(
      el('button',{type:'button',onclick:()=>{altreAzioniMenu.style.display='none';doExportCsv()}},'Esporta CSV'),
      el('button',{type:'button',onclick:()=>{altreAzioniMenu.style.display='none';showToast({message:'Export PDF in arrivo nelle prossime versioni',type:'info'})}},'Esporta PDF')
    )
    altreAzioniBtn.onclick=(e)=>{e.stopPropagation();const vis=altreAzioniMenu.style.display==='none';altreAzioniMenu.style.display=vis?'grid':'none';if(vis)setTimeout(()=>document.addEventListener('click',()=>{altreAzioniMenu.style.display='none'},{once:true}),0)}
    altreAzioniWrap.append(altreAzioniBtn,altreAzioniMenu)
    const vgHead=el('div',{class:'vg-head'},
      el('div',{},el('div',{class:'vg-title'},'Viaggi'),vgSub),
      el('div',{class:'vg-head-right'},...[altreAzioniWrap,btnNuovo].filter(Boolean))
    )

    // ── KPI STRIP ───────────────────────────────────────────────────────────
    const kpiNums=[el('span',{},'0'),el('span',{},'0'),el('span',{},'0'),el('span',{},'0')]
    const kpiDefs=[
      {key:'',label:'Tutti',color:'#94a3b8'},
      {key:'attesa',label:'In attesa',color:'#f59e0b'},
      {key:'In corso',label:'In corso',color:'#ff1744'},
      {key:'Completato',label:'Completato',color:'#22c55e'}
    ]
    const kpiBtns=kpiDefs.map((k,i)=>{
      const dot=el('span',{class:'vg-kpi-dot',style:`background:${k.color}`})
      const b=el('button',{class:'vg-kpi-btn',type:'button'},dot,kpiNums[i],' ',k.label)
      b.onclick=()=>{
        F.kpi=k.key; page=1; expanded.clear()
        kpiBtns.forEach(x=>x.classList.remove('active'))
        b.classList.add('active')
        renderList()
      }
      return b
    })
    kpiBtns[0].classList.add('active')
    const kpiRow=el('div',{class:'vg-kpi-row'},...kpiBtns)

    // ── FILTRI — una riga: ricerca + btn Filtra ──────────────────────────────
    const searchEl=el('input',{class:'input vg-search',type:'search',placeholder:'Cerca cliente, origine, arrivo...'})
    let searchT=null
    searchEl.addEventListener('input',()=>{
      clearTimeout(searchT)
      searchT=setTimeout(()=>{F.search=searchEl.value.trim().toLowerCase();page=1;expanded.clear();renderList()},300)
    })

    const statoDD=createDropdown({value:'',placeholder:'Stato',
      options:[{value:'',label:'Tutti gli stati'},{value:'Da fare',label:'Da fare'},{value:'In corso',label:'In corso'},{value:'Completato',label:'Completato'},{value:'Annullato',label:'Annullato'}],
      onSelect:(v)=>{F.stato=v||'';page=1;expanded.clear();renderList()}
    })
    const autistaDD=createDropdown({value:'',placeholder:'Autista',
      options:[{value:'',label:'Tutti gli autisti'}].concat((list('drivers')||[]).map(d=>({value:d.id,label:d.name||d.id}))),
      onSelect:(v)=>{F.autista=v||'';page=1;expanded.clear();renderList()}
    })
    const clienteDD=createDropdown({value:'',placeholder:'Cliente',
      options:[{value:'',label:'Tutti i clienti'}].concat((list('customers')||[]).map(c=>({value:c.id,label:c.name||c.id}))),
      onSelect:(v)=>{F.cliente=v||'';page=1;expanded.clear();renderList()}
    })
    const dalPicker=createDateField({value:'',placeholder:'Dal',onChange:(v)=>{F.from=v||'';page=1;expanded.clear();renderList()}})
    const alPicker=createDateField({value:'',placeholder:'Al',onChange:(v)=>{F.to=v||'';page=1;expanded.clear();renderList()}})

    const fCount=el('span',{class:'vg-fcount'})
    const btnAzzera=el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>{
      F.search='';F.stato='';F.autista='';F.cliente='';F.from='';F.to=''
      searchEl.value='';statoDD.setValue('');autistaDD.setValue('');clienteDD.setValue('');dalPicker.setValue('');alPicker.setValue('')
      page=1;expanded.clear();renderList()
    }},'Azzera')

    // (filters are now always visible in filtersRow, assembled below)

    // ── LISTA ────────────────────────────────────────────────────────────────
    const listEl=el('div',{class:'vg-list'})
    const pagEl=el('div',{class:'vg-pag',style:'display:none'})

    const doExportCsv=(tripId=null)=>{
      const drvs=list('drivers')||[], flt=list('fleet')||[]
      const trips=tripId?(list('trips')||[]).filter(t=>t.id===tripId):getFiltered()
      const hdr='Rif,Cliente,Società,Origine,Arrivo,DataCarico,DataScarico,Autista,Camion,Stato,Merce,Peso,TipoTariffa,Importo,Documento,Note'
      const rows=trips.map(t=>{
        const drv=drvs.find(d=>d.id===t.autista)?.name||''
        const cam=flt.find(f=>f.id===t.camion)?.targa||''
        const imp=calcImporto(t).toFixed(2)
        return [t.riferimento||(t.id||'').slice(-6)||'',t.cliente||'',t.azienda||'',t.origine||'',t.arrivo||'',t.dataCarico||'',t.dataScarico||'',drv,cam,t.stato||'',t.tipoTrasporto||'',t.peso!=null?`${t.peso}${t.pesoUnit||'t'}`:'',t.tariffa?.tipo||'',imp,`${t.documento?.tipo||''} ${t.documento?.numero||''}`.trim(),t.note||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')
      })
      const fname=tripId?`viaggio_${(trips[0]?.cliente||'nd').replace(/\s+/g,'_')}_${(trips[0]?.dataCarico||'').slice(0,10)||'nd'}.csv`:'viaggi.csv'
      blobDownload(new Blob([[hdr,...rows].join('\n')],{type:'text/csv;charset=utf-8'}),fname)
    }

    const getFiltered=()=>{
      const drvs=list('drivers')||[], flt=list('fleet')||[]
      let trips=(list('trips')||[]).filter(t=>!t.draft)
      if(F.kpi==='attesa') trips=trips.filter(t=>isAttesa(t.stato))
      else if(F.kpi) trips=trips.filter(t=>t.stato===F.kpi)
      if(F.stato) trips=trips.filter(t=>(t.stato||'Da fare')===F.stato)
      if(F.autista) trips=trips.filter(t=>t.autista===F.autista)
      if(F.cliente) trips=trips.filter(t=>{
        const cust=list('customers').find(c=>c.id===F.cliente)
        return cust&&(t.cliente===cust.name||t.clienteId===F.cliente)
      })
      if(F.from) trips=trips.filter(t=>(t.dataCarico||t.dataScarico||'')>=F.from)
      if(F.to) trips=trips.filter(t=>(t.dataCarico||t.dataScarico||'')<=F.to)
      if(F.search){
        const q=F.search
        trips=trips.filter(t=>(`${t.cliente||''} ${t.origine||''} ${t.arrivo||''} ${t.riferimento||''}`).toLowerCase().includes(q))
      }
      trips.sort((a,b)=>{
        if(sortCol==='importo'){return sortDir==='asc'?calcImporto(a)-calcImporto(b):calcImporto(b)-calcImporto(a)}
        const av=String(a[sortCol]||''),bv=String(b[sortCol]||'')
        const c=av.localeCompare(bv,'it',{sensitivity:'base'})
        return sortDir==='asc'?c:-c
      })
      return trips
    }

    const updateKpi=()=>{
      const all=(list('trips')||[]).filter(t=>!t.draft)
      kpiNums[0].textContent=all.length
      kpiNums[1].textContent=all.filter(t=>isAttesa(t.stato)).length
      kpiNums[2].textContent=all.filter(t=>t.stato==='In corso').length
      kpiNums[3].textContent=all.filter(t=>t.stato==='Completato').length
    }

    const renderList=()=>{
      if(closeMenuFn){closeMenuFn();closeMenuFn=null}
      const drvs=list('drivers')||[], flt=list('fleet')||[]
      const filtered=getFiltered()
      const total=filtered.length
      const totalPages=Math.max(1,Math.ceil(total/PER_PAGE))
      if(page>totalPages) page=totalPages
      const pageTrips=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE)

      vgSub.textContent=`${total} viaggio/i`
      fCount.textContent=(F.search||F.stato||F.autista||F.cliente||F.from||F.to)?`${total} trovati`:''
      updateKpi()

      listEl.replaceChildren()
      if(!pageTrips.length){
        listEl.append(el('div',{class:'vg-empty'},
          el('div',{class:'vg-empty-msg'},'Nessun viaggio registrato'),
          el('div',{class:'vg-empty-sub'},'Crea il primo viaggio per iniziare'),
          can('viaggi.manage')?el('button',{class:'btn brand',style:'margin-top:12px',type:'button',onclick:()=>openTripWizard()},'+ Nuovo viaggio'):''
        ))
      } else {
        pageTrips.forEach(trip=>{
          const isExp=expanded.has(trip.id)
          const drv=drvs.find(d=>d.id===trip.autista)?.name||trip.autista||'-'
          const cam=flt.find(f=>f.id===trip.camion)?.targa||trip.camion||'-'
          const stato=trip.stato||'Da fare'
          const imp=calcImporto(trip)

          // badge stato cliccabile
          const statoBadge=el('span',{
            class:'vg-stato-pill',
            style:`background:${statoColor(stato)}20;color:${statoTextColor(stato)};border:1px solid ${statoColor(stato)}50`
          },el('span',{style:`width:6px;height:6px;border-radius:50%;background:${statoColor(stato)};display:inline-block;flex-shrink:0`}),' ',stato)

          const statoWrap=el('div',{style:'position:relative;display:inline-flex'},statoBadge)
          if(can('viaggi.manage')){
            statoBadge.style.cursor='pointer'
            statoBadge.onclick=(e)=>{
              e.stopPropagation()
              if(statoWrap.querySelector('.vg-stato-dd')){statoWrap.querySelector('.vg-stato-dd').remove();return}
              const dd=el('div',{class:'vg-stato-dd'})
              STATI.filter(s=>s!==stato).forEach(s=>{
                const opt=el('div',{class:'vg-stato-opt'},el('span',{style:`width:7px;height:7px;border-radius:50%;background:${statoColor(s)};display:inline-block`}),' ',s)
                opt.onclick=(ev)=>{
                  ev.stopPropagation()
                  const old=stato
                  put('trips',trip.id,{stato:s,updatedAt:new Date().toISOString()})
                  logEvent('trip_status_changed',{tripId:trip.id,from:old,to:s},{actorId:me()?.id})
                  showToast({message:`Stato: ${s}`,type:'success'})
                  dd.remove(); renderList()
                }
                dd.append(opt)
              })
              statoWrap.append(dd)
              setTimeout(()=>document.addEventListener('click',()=>dd.remove(),{once:true}),0)
            }
          }

          // menu ⋯
          const menuBtn=el('button',{class:'menu-btn',type:'button'},'⋯')
          const menuPanel=el('div',{class:'menu-panel'},
            el('button',{class:'btn ghost',style:'justify-content:flex-start;font-size:12px;width:100%',type:'button',onclick:(e)=>{e.stopPropagation();closeMenuFn&&closeMenuFn();openTripWizard(trip)}},'Modifica'),
            el('button',{class:'btn ghost',style:'justify-content:flex-start;font-size:12px;width:100%',type:'button',onclick:(e)=>{
              e.stopPropagation();closeMenuFn&&closeMenuFn()
              const dup={...trip,id:'TRIP-'+crypto.randomUUID(),stato:'Da fare',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}
              delete dup.draft; add('trips',dup)
              showToast({message:'Viaggio duplicato',type:'success'}); renderList()
            }},'Duplica'),
            el('button',{class:'btn ghost',style:'justify-content:flex-start;font-size:12px;width:100%',type:'button',onclick:(e)=>{e.stopPropagation();closeMenuFn&&closeMenuFn();doExportCsv(trip.id)}},'Scarica CSV'),
            el('button',{class:'btn red',style:'justify-content:flex-start;font-size:12px;width:100%',type:'button',onclick:async(e)=>{
              e.stopPropagation();closeMenuFn&&closeMenuFn()
              const ok=await askConfirm({title:'Elimina viaggio',message:`Eliminare il viaggio per ${trip.cliente||'cliente'}?`,confirmLabel:'Elimina',cancelLabel:'Annulla',tone:'danger'})
              if(!ok) return
              remove('trips',trip.id); logEvent('trip_deleted',{tripId:trip.id},{actorId:me()?.id})
              showToast({message:'Viaggio eliminato',type:'success'}); renderList()
            }},'Elimina')
          )
          const menuWrap=el('div',{class:'menu-wrapper'},menuBtn,menuPanel)
          menuBtn.onclick=(e)=>{
            e.stopPropagation()
            if(menuWrap.classList.contains('open')){closeMenuFn&&closeMenuFn();return}
            if(closeMenuFn) closeMenuFn()
            menuWrap.classList.add('open')
            const detach=attachClickOutside(menuWrap,()=>{menuWrap.classList.remove('open');closeMenuFn=null})
            closeMenuFn=()=>{detach();menuWrap.classList.remove('open');closeMenuFn=null}
          }

          // riga compatta
          const toggleBtn=el('button',{
            class:`toggle-btn${isExp?' open':''}`,type:'button',
            onclick:(e)=>{e.stopPropagation();if(isExp)expanded.delete(trip.id);else expanded.add(trip.id);renderList()}
          },isExp?'▾':'▸')

          const compactRow=el('tr',{class:`vg-tr${isExp?' vg-tr-open':''}`},
            el('td',{class:'tight'},toggleBtn),
            el('td',{},
              el('div',{class:'cell-stack'},
                el('div',{class:'cell-main'},trip.cliente||'—'),
                el('div',{class:'cell-sub'},trip.azienda||'')
              )
            ),
            el('td',{},
              el('div',{class:'cell-stack'},
                el('div',{class:'cell-main'},`${trip.origine||'-'} → ${trip.arrivo||'-'}`)
              )
            ),
            el('td',{},
              el('div',{class:'cell-stack'},
                el('div',{class:'cell-main'},fmtDateDisplay(trip.dataCarico)||'-'),
                el('div',{class:'cell-sub'},trip.caricoAzienda||'')
              )
            ),
            el('td',{},
              el('div',{class:'cell-stack'},
                el('div',{class:'cell-main'},fmtDateDisplay(trip.dataScarico)||'-'),
                el('div',{class:'cell-sub'},trip.scaricoAzienda||'')
              )
            ),
            el('td',{},
              el('div',{class:'cell-stack'},
                el('div',{class:'cell-main'},drv),
                el('div',{class:'cell-sub'},cam)
              )
            ),
            el('td',{onclick:(e)=>e.stopPropagation()},statoWrap),
            el('td',{onclick:(e)=>e.stopPropagation()},
              el('div',{class:'vg-act'},
                el('button',{class:'btn ghost vg-btn-det',type:'button',onclick:()=>openVgDrawer(trip.id)},'Dettaglio →'),
                menuWrap
              )
            )
          )
          compactRow.style.cursor='pointer'
          compactRow.onclick=()=>openVgDrawer(trip.id)

          // pannello espanso
          const expandRow=el('tr',{class:'detail-row',style:isExp?'':'display:none'},
            el('td',{colspan:'8'},
              el('div',{class:'vg-exp-panel'},
                el('div',{class:'vg-exp-grid'},
                  el('div',{class:'vg-exp-col'},
                    el('div',{class:'vg-exp-item'},el('span',{class:'cell-label'},'Merce'),el('span',{class:'cell-main'},`${trip.tipoTrasporto||'-'}${trip.peso!=null?' · '+formatWeight(trip.peso,trip.pesoUnit):''}`)),
                    el('div',{class:'vg-exp-item'},el('span',{class:'cell-label'},'Documento'),el('span',{class:'cell-main'},`${trip.documento?.tipo||'-'} ${trip.documento?.numero||''}`.trim()||'-'))
                  ),
                  el('div',{class:'vg-exp-col'},
                    el('div',{class:'vg-exp-item'},el('span',{class:'cell-label'},'Tariffa'),el('span',{class:'cell-main'},descTariff(trip.tariffa))),
                    el('div',{class:'vg-exp-item'},el('span',{class:'cell-label'},'Importo'),el('span',{class:'cell-main'},imp>0?fmtMoney(imp):'-'))
                  ),
                  el('div',{class:'vg-exp-col'},
                    el('div',{class:'vg-exp-item'},el('span',{class:'cell-label'},'Note'),el('span',{class:'cell-main vg-exp-note'},trip.note||'-')),
                    el('div',{class:'vg-exp-item'},el('span',{class:'cell-label'},'Allegati'),el('span',{class:'cell-main'},fmtCount((trip.attachments||[]).length,'allegato','allegati')))
                  )
                ),
                el('div',{class:'vg-exp-actions'},
                  el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>openVgDrawer(trip.id)},'Apri dettaglio'),
                  el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>openTripWizard(trip)},'Modifica'),
                  el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>doExportCsv(trip.id)},'Scarica CSV')
                )
              )
            )
          )

          listEl.append(compactRow,expandRow)
        })
      }

      // paginazione
      if(totalPages>1){
        const btnP=el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>{page--;renderList()}},'← Indietro')
        btnP.disabled=page<=1
        const btnN=el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>{page++;renderList()}},'Avanti →')
        btnN.disabled=page>=totalPages
        pagEl.replaceChildren(btnP,el('span',{class:'vg-pag-info'},`Pagina ${page} di ${totalPages}`),btnN)
        pagEl.style.display='flex'
      } else {pagEl.replaceChildren();pagEl.style.display='none'}
    }

    // ── DRAWER ──────────────────────────────────────────────────────────────
    let _dEl=null,_dOv=null

    const closeVgDrawer=()=>{
      if(!_dEl) return
      _dEl.style.transform='translateX(100%)'
      _dEl.style.transition='transform .3s cubic-bezier(.4,0,.2,1)'
      if(_dOv){_dOv.style.opacity='0';_dOv.style.transition='opacity .3s ease'}
      setTimeout(()=>{_dEl?.remove();_dOv?.remove();_dEl=null;_dOv=null},320)
    }

    const openVgDrawer=(tripId)=>{
      closeVgDrawer()
      const trip=(list('trips')||[]).find(t=>t.id===tripId)
      if(!trip) return
      const drvs=list('drivers')||[], flt=list('fleet')||[]
      const drv=drvs.find(d=>d.id===trip.autista)
      const cam=flt.find(f=>f.id===trip.camion)
      const rim=flt.find(f=>f.id===trip.rimorchio)
      const imp=calcImporto(trip)
      const curS={value:trip.stato||'Da fare'}

      _dOv=el('div',{class:'vgd-overlay'})
      _dOv.onclick=closeVgDrawer
      _dEl=el('div',{class:'vgd-drawer'})

      // header
      const sBadge=el('span',{class:'vgd-sbadge',style:`background:${statoColor(curS.value)}20;color:${statoTextColor(curS.value)};border:1px solid ${statoColor(curS.value)}50`},curS.value)
      const dClose=el('button',{class:'vgd-close',type:'button',onclick:closeVgDrawer},'×')
      const dCliente=el('div',{class:'vgd-cliente'},trip.cliente||'Viaggio senza nome')
      const dEdit=can('viaggi.manage')?el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>{closeVgDrawer();openTripWizard(trip)}},'Modifica'):null
      const dPdf=el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>printTripPDF(trip)},'Stampa PDF')
      const dCsv=el('button',{class:'btn ghost vg-btn-sm',type:'button',onclick:()=>doExportCsv(trip.id)},'Scarica CSV')
      const dHdr=el('div',{class:'vgd-hdr'},
        el('div',{class:'vgd-hdr-r1'},dClose,dCliente,sBadge),
        el('div',{class:'vgd-hdr-r2'},...[dEdit,dPdf,dCsv].filter(Boolean))
      )

      const dBody=el('div',{class:'vgd-body'})

      // percorso
      dBody.append(el('div',{class:'vgd-section'},
        el('div',{class:'vgd-slabel'},'Percorso'),
        el('div',{class:'vgd-percorso'},
          el('div',{class:'vgd-p-side'},
            el('div',{class:'vgd-p-lbl'},'Partenza'),
            el('div',{class:'vgd-p-main'},trip.caricoAzienda||trip.origine||'-'),
            trip.caricoAzienda?el('div',{class:'vgd-p-sub'},trip.origine||''):null,
            el('div',{class:'vgd-p-date'},fmtDateDisplay(trip.dataCarico)||'Data non specificata')
          ),
          el('div',{class:'vgd-p-div'}),
          el('div',{class:'vgd-p-side'},
            el('div',{class:'vgd-p-lbl'},'Arrivo'),
            el('div',{class:'vgd-p-main'},trip.scaricoAzienda||trip.arrivo||'-'),
            trip.scaricoAzienda?el('div',{class:'vgd-p-sub'},trip.arrivo||''):null,
            el('div',{class:'vgd-p-date'},fmtDateDisplay(trip.dataScarico)||'Data non specificata')
          )
        )
      ))

      // dati
      const dg=el('div',{class:'vgd-grid2'})
      ;[['Autista',drv?.name||trip.autista||'-'],['Camion',cam?.targa||trip.camion||'-'],
        ...(rim?[['Rimorchio',rim.targa||'-']]:[]),

      // documenti

        const data=await fileToBase64(file)
        const c=(list('trips')||[]).find(t=>t.id===tripId);if(!c) return
        put('trips',tripId,{attachments:(c.attachments||[]).concat({id:'ATT-'+crypto.randomUUID(),tipo,titolo,file:{name:file.name,size:file.size,type:file.type,data}}),updatedAt:new Date().toISOString()})
        showToast({message:'Documento allegato',type:'success'});renderDocs()
      }},'+ Allega documento'):null

      <h1>UNITRANS S.R.L.</h1><div class="sub">Riepilogo viaggio — ${new Date().toLocaleDateString('it-IT')}</div>

      ${trip.note?`<div class="note"><strong>Note:</strong><br>${trip.note.replace(/\n/g,'<br>')}</div>`:''}

      win.document.close()

    }

    window._openTripDrawer=openVgDrawer

    // ── ASSEMBLA ─────────────────────────────────────────────────────────────
    const tblWrap=el('div',{class:'vg-tbl-wrap'})

    const thead=el('thead',{},el('tr',{},

    const filtersRow=el('div',{class:'vg-filters-row'})

    const statusBadge=(status)=>{
